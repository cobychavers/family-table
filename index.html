  <script>
    let db = null;
    function initFirebase(config) {
      try {
        if (firebase.apps.length === 0) firebase.initializeApp(config);
        db = firebase.firestore();
        db.enablePersistence({ synchronizeTabs: true }).catch(() => {});
        return true;
      } catch (e) { console.error("Firebase error:", e); return false; }
    }
    
    window.storage = {
      get: async (key, shared) => {
        if (!db) throw new Error("Not connected");
        const doc = await db.collection("data").doc(key).get();
        return doc.exists ? { key, value: doc.data().value, shared } : null;
      },
      set: async (key, value, shared) => {
        if (!db) throw new Error("Not connected");
        await db.collection("data").doc(key).set({ value, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
        return { key, value, shared };
      },
      delete: async (key, shared) => {
        if (!db) throw new Error("Not connected");
        await db.collection("data").doc(key).delete();
        return { key, deleted: true, shared };
      },
      list: async (prefix, shared) => {
        if (!db) throw new Error("Not connected");
        const snapshot = await db.collection("data").get();
        const keys = [];
        snapshot.forEach(doc => { if (!prefix || doc.id.startsWith(prefix)) keys.push(doc.id); });
        return { keys, prefix, shared };
      }
    };
    
    const savedConfig = localStorage.getItem("firebase_config");
    if (savedConfig) {
      try { initFirebase(JSON.parse(savedConfig)); } catch(e) { localStorage.removeItem("firebase_config"); }
    }
  </script>

// Simple QR Code generator component
function QRCode({data, size=200, darkColor="#000", lightColor="#fff"}){
  // Simple alphanumeric encoding - converts text to a visual pattern
  var text = (data||"").toUpperCase();
  var gridSize = 21; // QR-like grid
  var cellSize = size/gridSize;
  
  // Generate deterministic pattern from text
  function hashChar(str, i){
    var h=0;
    for(var j=0;j<str.length;j++){
      h=((h<<5)-h)+str.charCodeAt(j)+i;
      h=h&h;
    }
    return h;
  }
  
  var cells=[];
  
  // Finder patterns (corners)
  function addFinderPattern(x,y){
    for(var i=0;i<7;i++){
      for(var j=0;j<7;j++){
        var isBorder=(i===0||i===6||j===0||j===6);
        var isInner=(i>=2&&i<=4&&j>=2&&j<=4);
        if(isBorder||isInner){
          cells.push({x:x+j,y:y+i,dark:true});
        }
      }
    }
  }
  
  addFinderPattern(0,0);
  addFinderPattern(gridSize-7,0);
  addFinderPattern(0,gridSize-7);
  
  // Timing patterns
  for(var i=8;i<gridSize-8;i++){
    if(i%2===0){
      cells.push({x:i,y:6,dark:true});
      cells.push({x:6,y:i,dark:true});
    }
  }
  
  // Data area - encode the text
  var dataPositions=[];
  for(var y=0;y<gridSize;y++){
    for(var x=0;x<gridSize;x++){
      var inFinder=(x<8&&y<8)||(x>=gridSize-8&&y<8)||(x<8&&y>=gridSize-8);
      var inTiming=(x===6||y===6);
      if(!inFinder&&!inTiming){
        dataPositions.push({x:x,y:y});
      }
    }
  }
  
  // Fill data positions based on text hash
  for(var i=0;i<dataPositions.length;i++){
    var pos=dataPositions[i];
    var charIdx=i%text.length;
    var hash=hashChar(text,i);
    if((hash%3)!==0){
      cells.push({x:pos.x,y:pos.y,dark:true});
    }
  }
  
  return React.createElement("svg",{width:size,height:size,viewBox:"0 0 "+size+" "+size,style:{background:lightColor}},
    cells.map(function(cell,idx){
      return React.createElement("rect",{
        key:idx,
        x:cell.x*cellSize,
        y:cell.y*cellSize,
        width:cellSize,
        height:cellSize,
        fill:darkColor
      });
    })
  );
}

function formatIng(ing){if(typeof ing==="string")return ing;var q=ing.qty?ing.qty+" ":"";var u=ing.unit?ing.unit+" ":"";return q+u+ing.name}
function parseIng(str){
  if(typeof str==="object")return str;
  str=str.trim();
  if(!str)return{qty:"",unit:"",name:""};
  // Try to match: "2 cups flour", "1/2 tsp salt", "3 large eggs", "salt and pepper"
  var match=str.match(/^([\d.\/\s½¼¾⅓⅔⅛]+)?\s*(ct|oz|lb|lbs|g|kg|cup|cups|tbsp|tsp|teaspoon|teaspoons|tablespoon|tablespoons|ml|L|pkg|package|bag|can|cans|jar|jars|box|bunch|head|clove|cloves|slice|slices|piece|pieces|small|medium|large|sticks?|pounds?)?\s*[,.]?\s*(.+)$/i);
  if(match&&(match[1]||match[2])){
    var qty=(match[1]||"").trim();
    var unit=(match[2]||"").trim();
    var name=(match[3]||str).trim();
    // Clean up common issues
    if(name.startsWith("of "))name=name.substring(3);
    return{qty:qty,unit:unit,name:name};
  }
  return{qty:"",unit:"",name:str}
}

function detectRecipeType(recipe) {
  var name = (recipe.name || "").toLowerCase();
  var ings = (recipe.ingredients || []).map(function(i){return typeof i==="string"?i:i.name||""}).join(" ").toLowerCase();
  var combined = name + " " + ings;
  for (var type in RECIPE_TYPE_KEYWORDS) {
    if (RECIPE_TYPE_KEYWORDS[type].some(function(kw) { return combined.includes(kw); })) return type;
  }
  return "other";
}

function AuthScreen(p){
  var [mode,setMode]=useState("login"); // login, signup, forgot, reset
  var [username,setUsername]=useState("");
  var [email,setEmail]=useState("");
  var [password,setPassword]=useState("");
  var [confirm,setConfirm]=useState("");
  var [error,setError]=useState("");
  var [success,setSuccess]=useState("");
  var [resetCode,setResetCode]=useState("");
  var [generatedCode,setGeneratedCode]=useState("");
  var [resetUser,setResetUser]=useState("");

  function validateEmail(e){
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e);
  }

  function generateResetCode(){
    var chars="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
    var code="";
    for(var i=0;i<6;i++)code+=chars.charAt(Math.floor(Math.random()*chars.length));
    return code;
  }

  function handleSubmit(){
    setError("");
    setSuccess("");
    
    if(mode==="signup"){
      if(!username.trim()||!email.trim()||!password.trim()){setError("Please fill in all fields");return}
      if(!validateEmail(email.trim())){setError("Please enter a valid email address");return}
      if(password.length<6){setError("Password must be at least 6 characters");return}
      if(password!==confirm){setError("Passwords don't match");return}
      
      var uid=username.trim();
      var userEmail=email.trim().toLowerCase();
      
      window.storage.get("dm_users",true).then(function(r){
        var users=r?JSON.parse(r.value):{};
        
        // Check for duplicate username
        if(users[uid]){
          setError("Username '"+uid+"' is already taken. Please choose another.");
          return;
        }
        
        // Check for duplicate email
        var emailExists=Object.keys(users).some(function(u){return users[u].email===userEmail});
        if(emailExists){
          setError("An account with this email already exists. Try signing in or reset your password.");
          return;
        }
        
        users[uid]={passHash:hashPass(password),email:userEmail,created:Date.now()};
        return window.storage.set("dm_users",JSON.stringify(users),true);
      }).then(function(result){
        if(result)p.onLogin(uid);
      }).catch(function(e){
        setError("Error creating account: "+(e.message||"Please try again"));
      });
      
    }else if(mode==="login"){
      if(!username.trim()||!password.trim()){setError("Please fill in all fields");return}
      
      var typedUid=username.trim();
      
      // Try shared storage first, fall back to local
      window.storage.get("dm_users",true).catch(function(){
        return window.storage.get("dm_users");
      }).then(function(r){
        if(!r||!r.value){
          setError("No accounts exist yet. Please sign up first.");
          return;
        }
        var users;
        try{
          users=JSON.parse(r.value);
        }catch(e){
          setError("Error reading user data. Please try again.");
          return;
        }
        
        // Find user - try exact match first, then case-insensitive
        var uid=null;
        if(users[typedUid]){
          uid=typedUid;
        }else{
          // Try case-insensitive lookup
          var typedLower=typedUid.toLowerCase();
          Object.keys(users).forEach(function(u){
            if(u.toLowerCase()===typedLower)uid=u;
          });
        }
        
        if(!uid){
          setError("User not found. Check your username or sign up for a new account.");
          return;
        }
        if(users[uid].passHash!==hashPass(password)){
          setError("Incorrect password. Forgot your password?");
          return;
        }
        p.onLogin(uid); // Login with the actual stored username
      }).catch(function(e){
        setError("Could not connect to storage. Please refresh and try again.");
      });
      
    }else if(mode==="forgot"){
      if(!email.trim()){setError("Please enter your email address");return}
      if(!validateEmail(email.trim())){setError("Please enter a valid email address");return}
      
      var userEmail=email.trim().toLowerCase();
      
      window.storage.get("dm_users",true).then(function(r){
        if(!r){
          setError("No account found with this email address.");
          return;
        }
        var users=JSON.parse(r.value);
        var foundUser=null;
        Object.keys(users).forEach(function(u){
          if(users[u].email===userEmail)foundUser=u;
        });
        
        if(!foundUser){
          setError("No account found with this email address.");
          return;
        }
        
        // Generate reset code
        var code=generateResetCode();
        setGeneratedCode(code);
        setResetUser(foundUser);
        
        // Store reset code with expiry (15 minutes)
        users[foundUser].resetCode=code;
        users[foundUser].resetExpiry=Date.now()+15*60*1000;
        
        return window.storage.set("dm_users",JSON.stringify(users),true);
      }).then(function(result){
        if(result){
          setSuccess("Reset code generated! Your code is: "+generatedCode);
          setMode("reset");
        }
      }).catch(function(){
        setError("Error processing request. Please try again.");
      });
      
    }else if(mode==="reset"){
      if(!resetCode.trim()||!password.trim()){setError("Please fill in all fields");return}
      if(password.length<6){setError("Password must be at least 6 characters");return}
      if(password!==confirm){setError("Passwords don't match");return}
      
      window.storage.get("dm_users",true).then(function(r){
        if(!r){setError("Error resetting password");return}
        var users=JSON.parse(r.value);
        
        // Find user with this reset code
        var foundUser=null;
        Object.keys(users).forEach(function(u){
          if(users[u].resetCode===resetCode.trim().toUpperCase()){
            if(users[u].resetExpiry&&users[u].resetExpiry>Date.now()){
              foundUser=u;
            }
          }
        });
        
        if(!foundUser){
          setError("Invalid or expired reset code. Please request a new one.");
          return;
        }
        
        // Update password and clear reset code
        users[foundUser].passHash=hashPass(password);
        delete users[foundUser].resetCode;
        delete users[foundUser].resetExpiry;
        
        return window.storage.set("dm_users",JSON.stringify(users),true);
      }).then(function(result){
        if(result){
          setSuccess("Password reset successfully! You can now sign in.");
          setMode("login");
          setPassword("");
          setConfirm("");
          setResetCode("");
          setUsername(resetUser);
        }
      }).catch(function(){
        setError("Error resetting password. Please try again.");
      });
    }
  }

        React.createElement("input",{style:inp,type:"password",placeholder:"Confirm Password",value:confirm,onChange:function(e){setConfirm(e.target.value);setError("")}})
      ):null,

      error?React.createElement("div",{style:{color:"#e74c3c",fontSize:13,marginBottom:10,textAlign:"center",padding:"8px 12px",background:"#fdf2f2",borderRadius:8}},error):null,

  // Import grocery list from photo or text
  function parseGroceryText(text){
    // Normalize text: handle different line endings, tabs
    text = text.replace(/\r\n/g, "\n").replace(/\r/g, "\n").replace(/\t/g, " ");
    
    var lines=text.split(/\n+/);
    var items=[];
    
    lines.forEach(function(line){
      line=line.trim();
      if(!line||line.length<2)return;
      
      // Skip header-like lines (all caps, ends with colon, etc.)
      if(/^[A-Z\s]+:?$/.test(line) && line.length < 30) return;
      if(/^(grocery|groceries|shopping|list|items|notes|reminders):?$/i.test(line)) return;
      
      // Remove common list prefixes: bullets, dashes, checkboxes, numbers
      var cleaned = line.replace(/^[\s\-\*\[\]]+/, "").trim();
      // Remove leading numbers like "1." "1)" "1:"
      cleaned = cleaned.replace(/^\d+[\.\)\:]\s*/, "").trim();
      // Remove checkbox-style characters at start
      cleaned = cleaned.replace(/^[^\w\d]+/, "").trim();
      
      if(!cleaned || cleaned.length < 2) return;
      
      // Try to parse quantity at start: "2 lbs chicken" or "1/2 cup flour"
      var match = cleaned.match(/^([\d\/\.]+)\s*(oz|lb|lbs|kg|g|cups?|tbsp|tsp|gal|gallons?|liters?|l|ml|dozen|doz|pack|packs|ct|count|pcs?|pieces?|bunch|bunches|head|heads|bag|bags|box|boxes|can|cans|jar|jars|bottle|bottles)?\s+(.+)$/i);
      if(match && match[3]){
        items.push({name:match[3].trim(),qty:match[1],unit:(match[2]||"").toLowerCase()});
        return;
      }
      
      // Try quantity in parentheses at end: "Eggs (1 dozen)" or "Chicken (2 lbs)"
      var match2 = cleaned.match(/^(.+?)\s*\((\d+\.?\d*)\s*(oz|lb|lbs|kg|g|cups?|tbsp|tsp|dozen|doz|pack|packs|ct|count|pcs?|pieces?)?\)$/i);
      if(match2){
        items.push({name:match2[1].trim(),qty:match2[2],unit:(match2[3]||"").toLowerCase()});
        return;
      }
      
      // Try quantity after dash/colon: "Chicken breast - 2 lbs" or "Milk: 1 gal"
      var match3 = cleaned.match(/^(.+?)\s*[-–:x]\s*(\d+\.?\d*)\s*(oz|lb|lbs|kg|g|cups?|tbsp|tsp|gal|gallons?|liters?|l|ml|dozen|doz|pack|packs|ct|count|pcs?|pieces?)?$/i);
      if(match3){
        items.push({name:match3[1].trim(),qty:match3[2],unit:(match3[3]||"").toLowerCase()});
        return;
      }
      
      // Try "Nx item" format: "2x Avocados" or "3x Bananas"
      var match4 = cleaned.match(/^(\d+)\s*x\s+(.+)$/i);
      if(match4){
        items.push({name:match4[2].trim(),qty:match4[1],unit:"ct"});
        return;
      }

            ]}]

          setImportGroceryLoading(false);
        }).catch(function(){

          alert("Failed to process image. Please try pasting the text instead.");
        });

      reader.readAsDataURL(file);
    }else if(isPDF){

        var base64=ev.target.result;
        fetch("https://api.anthropic.com/v1/messages",{

  useEffect(function(){

      if(savedSession){setUser(savedSession)}
    }catch(e){}
    setAuthChecked(true);
  },[]);

  // Load user data
  useEffect(function(){
    if(!authChecked)return;
    var userIdLower=userId.toLowerCase();
    
    // Helper to load from storage, trying both exact and lowercase keys
    function loadWithFallback(keyPrefix,setter,isShared){
      var shared=isShared!==false;
      var exactKey=keyPrefix+userId;
      var lowerKey=keyPrefix+userIdLower;
      
      window.storage.get(exactKey,shared).then(function(r){
        if(r&&r.value){
          setter(JSON.parse(r.value));
        }
      }).catch(function(){
        // Exact key not found, try lowercase
        if(exactKey!==lowerKey){
          window.storage.get(lowerKey,shared).then(function(r2){
            if(r2&&r2.value){
              setter(JSON.parse(r2.value));
            }
          }).catch(function(){});
        }
      });
    }
    
    window.storage.get("dm_meals_"+userId,true).catch(function(){return null}).then(function(r){
      if(r&&r.value){setMeals(JSON.parse(r.value))}
      else{
        window.storage.get("dm_meals_"+userIdLower,true).catch(function(){return null}).then(function(r2){
          if(r2&&r2.value)setMeals(JSON.parse(r2.value));
        });
      }
    });
    
    // Load recipes - try exact, then lowercase, then personal storage
    window.storage.get("dm_recipes_"+userId,true).catch(function(){return null}).then(function(r){
      if(r&&r.value){
        setRecipes(JSON.parse(r.value));
      }else{
        window.storage.get("dm_recipes_"+userIdLower,true).catch(function(){return null}).then(function(r2){
          if(r2&&r2.value){
            setRecipes(JSON.parse(r2.value));
          }else{
            // Try personal storage
            window.storage.get("dm_recipes_"+userId).catch(function(){return null}).then(function(r3){
              if(r3&&r3.value)setRecipes(JSON.parse(r3.value));
            });
          }
        });
      }
    });
    
    loadWithFallback("dm_favorites_",setFavorites,true);
    
    window.storage.get("dm_storeprefs_"+userId,true).catch(function(){return null}).then(function(r){
      if(r&&r.value){var p=JSON.parse(r.value);setStorePrefs(p.items||{});setDefStore(p.defaultStore||"walmart")}
    });
    window.storage.get("dm_customstores_"+userId,true).catch(function(){return null}).then(function(r){if(r&&r.value)setCustomStores(JSON.parse(r.value))});
    window.storage.get("dm_region_"+userId,true).catch(function(){return null}).then(function(r){if(r&&r.value)setRegion(r.value)});
    window.storage.get("dm_shared_recipes",true).catch(function(){return null}).then(function(r){if(r&&r.value)setSharedRecipes(JSON.parse(r.value))});
    window.storage.get("dm_ghidden_"+userId,true).catch(function(){return null}).then(function(r){if(r&&r.value)setGroceryHidden(JSON.parse(r.value))});
    
    // Load social data with fallback
    loadWithFallback("dm_inbox_",setUserInbox,true);
    loadWithFallback("dm_following_",setFollowing,true);
    loadWithFallback("dm_followers_",setFollowers,true);
    loadWithFallback("dm_followrequests_",setFollowRequests,true);
    loadWithFallback("dm_mypending_",setMyPendingRequests,true);
    
    // Load all users for search and suggestions
    window.storage.get("dm_users",true).then(function(r){
      if(r&&r.value){

    });

  // Generate friend suggestions when data changes
  useEffect(function(){
    if(!user||Object.keys(allUsers).length===0)return;
    
    var suggestions=[];
    var followingNames=following.map(function(f){return typeof f==="string"?f:f.username});
    var followerNames=followers.map(function(f){return typeof f==="string"?f:f.username});
    
    // Get users who have shared recipes with me (from inbox)
    var sharedWithMe={};
    userInbox.forEach(function(item){
      if(item.fromUser&&item.fromUser!==userId){
        sharedWithMe[item.fromUser]=(sharedWithMe[item.fromUser]||0)+1;
      }
    });
    
    // Build suggestions
    Object.keys(allUsers).forEach(function(username){
      if(username.toLowerCase()===userId.toLowerCase())return; // Skip self (case-insensitive)
      if(username==="guest")return; // Skip guest
      if(followingNames.includes(username))return; // Already following
      if(myPendingRequests.includes(username))return; // Already requested
      
      var score=0;
      var reason="";
      
      // Priority 1: Users who shared recipes with me
      if(sharedWithMe[username]){
        score+=10*sharedWithMe[username];
        reason="Shared "+sharedWithMe[username]+" recipe"+(sharedWithMe[username]>1?"s":"")+" with you";
      }
      
      // Priority 2: Users who follow me but I don't follow back
      if(followerNames.includes(username)&&!followingNames.includes(username)){
        score+=5;
        reason=reason||"Follows you";
      }
      
      // Priority 3: Recently created accounts (active users)
      var userInfo=allUsers[username];
      if(userInfo&&userInfo.created){
        var daysSinceCreated=(Date.now()-userInfo.created)/(1000*60*60*24);
        if(daysSinceCreated<30){
          score+=2;
          reason=reason||"New to Family Table";
        }
      }
      
      // Add to suggestions if there's a reason
      if(score>0){
        suggestions.push({
          username:username,
          profilePic:userInfo?userInfo.profilePic:null,
          score:score,
          reason:reason
        });
      }
    });
    
    // Sort by score and take top 5
    suggestions.sort(function(a,b){return b.score-a.score});
    setSuggestedFriends(suggestions.slice(0,5));
  },[user,allUsers,following,followers,userInbox,myPendingRequests,userId]);

  // Search for users
  function searchFriends(query){
    if(!query.trim()){
      setFriendSearchResults([]);
      return;
    }
    if(!allUsers||Object.keys(allUsers).length===0){
      console.log("searchFriends: No users loaded, allUsers=",allUsers);
      setFriendSearchResults([]);
      return;
    }
    if(!user){
      setFriendSearchResults([]);
      return;
    }
    setFriendSearching(true);
    var q=query.trim().toLowerCase().replace(/^@/,"");
    var followingNames=following.map(function(f){return typeof f==="string"?f:f.username});
    var myUsernameLower=userId.toLowerCase();
    
    console.log("searchFriends: query=",q,"userId=",userId,"allUsers keys=",Object.keys(allUsers));
    
    var results=[];
    Object.keys(allUsers).forEach(function(username){
      // Skip self - check both exact and lowercase
      if(username===userId||username.toLowerCase()===myUsernameLower)return;
      if(username==="guest")return;
      if(username.toLowerCase().includes(q)){
        var isFollowing=followingNames.some(function(f){return f===username||f.toLowerCase()===username.toLowerCase()});
        var isPending=myPendingRequests.includes(username);
        results.push({
          username:username,
          profilePic:allUsers[username]?allUsers[username].profilePic:null,
          isFollowing:isFollowing,
          isPending:isPending
        });
      }
    });
    
    console.log("searchFriends: results=",results);
    
    // Sort exact matches first
    results.sort(function(a,b){
      if(a.username.toLowerCase()===q)return -1;
      if(b.username.toLowerCase()===q)return 1;
      return a.username.localeCompare(b.username);
    });
    
    setFriendSearchResults(results.slice(0,10));
    setFriendSearching(false);
  }

  // Send follow request to another user
  // Follow a user (instant, no approval needed)
  function followUser(targetUsername){
    if(!user){setFollowStatus("error:Please sign in first");return}
    var target=targetUsername.trim().replace(/^@/,"");
    if(!target){setFollowStatus("error:Please enter a username");return}
    // Check for self-follow (case-insensitive)
    var targetLower=target.toLowerCase();
    if(targetLower===userId.toLowerCase()){setFollowStatus("error:You can't follow yourself");return}
    if(following.some(function(f){var uname=typeof f==="string"?f:f.username;return uname.toLowerCase()===targetLower})){setFollowStatus("error:You already follow @"+target);return}
    
    // Check if user exists first
    window.storage.get("dm_users",true).then(function(usersR){
      if(!usersR){
        setFollowStatus("error:No users found");
        return;
      }
      var users=JSON.parse(usersR.value);
      
      // Find user (case-insensitive lookup)
      var foundUser=null;
      if(users[target]){
        foundUser=target;
      }else{
        Object.keys(users).forEach(function(u){
          if(u.toLowerCase()===targetLower)foundUser=u;
        });
      }
      
      if(!foundUser){
        setFollowStatus("error:User @"+target+" not found");
        return;
      }
      
      // Double-check not following self (in case foundUser resolves to current user)
      if(foundUser.toLowerCase()===userId.toLowerCase()){
        setFollowStatus("error:You can't follow yourself");
        return;
      }
      
      // Add to my following list
      var newFollowingEntry={
        username:foundUser,
        profilePic:users[foundUser].profilePic||null,
        followedAt:Date.now()
      };
      var newFollowing=following.concat([newFollowingEntry]);
      setFollowing(newFollowing);
      window.storage.set("dm_following_"+userId,JSON.stringify(newFollowing),true).catch(function(){});
      
      // Add me to their followers list
      var followerKey="dm_followers_"+foundUser;
      window.storage.get(followerKey,true).then(function(r){
        var theirFollowers=r&&r.value?JSON.parse(r.value):[];
        if(!theirFollowers.some(function(f){return f.username===userId||f.username.toLowerCase()===userId.toLowerCase()})){
          theirFollowers.push({
            username:userId,
            profilePic:userProfilePic,
            followedAt:Date.now()
          });
          window.storage.set(followerKey,JSON.stringify(theirFollowers),true).then(function(){
            console.log("Added to followers of "+foundUser);
          }).catch(function(e){
            console.error("Failed to save followers:",e);
          });
        }
      }).catch(function(){
        // Key doesn't exist yet, create it
        var theirFollowers=[{
          username:userId,
          profilePic:userProfilePic,
          followedAt:Date.now()
        }];
        window.storage.set(followerKey,JSON.stringify(theirFollowers),true).then(function(){
          console.log("Created followers list for "+foundUser);
        }).catch(function(e){
          console.error("Failed to create followers:",e);
        });
      });
      
      setFollowStatus("success:You are now following @"+foundUser+"!");
      setFollowRequestUser("");
      
      // Update search results
      setFriendSearchResults(function(prev){
        return prev.map(function(r){
          if(r.username===foundUser){
            return Object.assign({},r,{isFollowing:true,isPending:false});
          }
          return r;
        });
      });
      
      // Remove from suggested friends
      setSuggestedFriends(function(prev){
        return prev.filter(function(s){return s.username!==foundUser});
      });
      
      setTimeout(function(){setFollowStatus("")},3000);
    }).catch(function(){
      setFollowStatus("error:Failed to follow user");
    });
  }
  
  // Accept a follow request
  function acceptFollowRequest(request){
    // Check if already a follower (prevent duplicates)
    if(followers.some(function(f){return f.username===request.fromUser})){
      // Already a follower, just remove the request
      var newRequests=followRequests.filter(function(req){return req.id!==request.id});
      setFollowRequests(newRequests);
      window.storage.set("dm_followrequests_"+userId,JSON.stringify(newRequests),true).catch(function(){});
      return;
    }
    
    // Add to my followers
    var newFollower={
      username:request.fromUser,
      profilePic:request.fromProfilePic,
      followedAt:Date.now()
    };
    var newFollowers=followers.concat([newFollower]);
    setFollowers(newFollowers);
    window.storage.set("dm_followers_"+userId,JSON.stringify(newFollowers),true).catch(function(){});
    
    // Add me to their following list - try both exact and lowercase keys
    var fromUser=request.fromUser;
    var fromUserLower=fromUser.toLowerCase();
    
    // Try to get their existing following list
    window.storage.get("dm_following_"+fromUser,true).catch(function(){return null}).then(function(r){
      if(r&&r.value){
        return {key:fromUser,data:JSON.parse(r.value)};
      }
      // Try lowercase
      return window.storage.get("dm_following_"+fromUserLower,true).catch(function(){return null}).then(function(r2){
        if(r2&&r2.value){
          return {key:fromUserLower,data:JSON.parse(r2.value)};
        }
        // No existing data, use the fromUser key
        return {key:fromUser,data:[]};
      });
    }).then(function(result){
      var theirFollowing=result.data;
      var storageKey=result.key;
      // Only add if not already following
      if(!theirFollowing.some(function(f){return f.username===userId||f.username===userId.toLowerCase()})){
        theirFollowing.push({
          username:userId,
          profilePic:userProfilePic,
          followedAt:Date.now()
        });
        return window.storage.set("dm_following_"+storageKey,JSON.stringify(theirFollowing),true);
      }
    }).then(function(){
      // Remove from their pending requests - try both keys
      return window.storage.get("dm_mypending_"+fromUser,true).catch(function(){return null}).then(function(r){
        if(r&&r.value){
          return {key:fromUser,data:JSON.parse(r.value)};
        }
        return window.storage.get("dm_mypending_"+fromUserLower,true).catch(function(){return null}).then(function(r2){
          if(r2&&r2.value){
            return {key:fromUserLower,data:JSON.parse(r2.value)};
          }
          return null;
        });
      });
    }).then(function(result){
      if(result){
        var theirPending=result.data.filter(function(u){return u!==userId&&u!==userId.toLowerCase()});
        return window.storage.set("dm_mypending_"+result.key,JSON.stringify(theirPending),true);
      }
    }).catch(function(){});
    
    // Remove from my follow requests
    var newRequests=followRequests.filter(function(req){return req.id!==request.id});
    setFollowRequests(newRequests);
    window.storage.set("dm_followrequests_"+userId,JSON.stringify(newRequests),true).catch(function(){});
    
    // Also check if I had a pending request to them - if so, clear it
    if(myPendingRequests.includes(request.fromUser)){
      var newPending=myPendingRequests.filter(function(u){return u!==request.fromUser});
      setMyPendingRequests(newPending);
      window.storage.set("dm_mypending_"+userId,JSON.stringify(newPending),true).catch(function(){});
    }
  }

  // Recipe scanning
  function handleScanPhoto(ev) {
    var files = ev.target.files;
    if (!files || files.length === 0) return;
    ev.target.value = "";
    setAiScanLoading(true);
    setAiScanStatus("Reading " + files.length + " image" + (files.length > 1 ? "s" : "") + "...");
    
    // Read all files as base64
    var filePromises = [];
    var photoDataArray = [];
    
    for (var i = 0; i < files.length; i++) {
      (function(file, index) {
        filePromises.push(new Promise(function(resolve, reject) {
          var rd = new FileReader();
          rd.onerror = function() { reject(new Error("Could not read image " + (index + 1))); };
          rd.onload = function(e) {
            var base64 = e.target.result.split(",")[1];
            var mediaType = file.type || "image/jpeg";
            photoDataArray[index] = e.target.result; // Store full data URL for photo
            resolve({ type: "image", source: { type: "base64", media_type: mediaType, data: base64 } });
          };
          rd.readAsDataURL(file);
        }));
      })(files[i], i);
    }
    
    Promise.all(filePromises).then(function(imageContents) {
      setAiScanStatus("Analyzing " + imageContents.length + " image" + (imageContents.length > 1 ? "s" : "") + "...");
      
      // Build content array with all images plus the prompt
      var content = imageContents.slice(); // Copy array
      content.push({ 
        type: "text", 
        text: imageContents.length > 1 
          ? "These images show different parts of the same recipe (e.g. front and back of a recipe card). Extract the complete recipe combining information from all images. Return ONLY JSON: {\"name\":\"Name\",\"emoji\":\"🍽️\",\"time\":\"30 min\",\"ingredients\":[{\"qty\":\"2\",\"unit\":\"cup\",\"name\":\"flour\"}],\"notes\":\"Instructions\",\"recipeType\":\"other\"} recipeType: chicken/beef/pork/seafood/pasta/mexican/asian/soup/salad/vegetarian/breakfast/dessert/other"
          : "Extract the recipe. Return ONLY JSON: {\"name\":\"Name\",\"emoji\":\"🍽️\",\"time\":\"30 min\",\"ingredients\":[{\"qty\":\"2\",\"unit\":\"cup\",\"name\":\"flour\"}],\"notes\":\"Instructions\",\"recipeType\":\"other\"} recipeType: chicken/beef/pork/seafood/pasta/mexican/asian/soup/salad/vegetarian/breakfast/dessert/other"
      });
      
      return fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 2000,
          messages: [{ role: "user", content: content }]
        })
      });
    })
    .then(function(response) { return response.json().then(function(data) { return { ok: response.ok, data: data }; }); })
    .then(function(result) {
      if (!result.ok || result.data.error) throw new Error(result.data.error?.message || "API error");
      var text = result.data.content && result.data.content[0] && result.data.content[0].text || "";
      var cleaned = text.replace(/```json\s*/gi, "").replace(/```\s*/g, "").trim();
      var jsonMatch = cleaned.match(/\{[\s\S]*\}/);
      if (!jsonMatch) throw new Error("No JSON found");
      var parsed = JSON.parse(jsonMatch[0]);
      
      setAiScanStatus("Recipe found!");
      var newRecipe = {
        id: Date.now(),
        name: parsed.name || "Untitled",
        emoji: parsed.emoji || "🍽️",
        time: parsed.time || "",
        ingredients: (parsed.ingredients || []).map(function(i) { return typeof i === "string" ? parseIng(i) : i; }),
        notes: parsed.notes || "",
        recipeType: parsed.recipeType || "other",
        photo: photoDataArray[0], // Use first photo as the recipe photo
        credit: "Scanned from " + photoDataArray.length + " photo" + (photoDataArray.length > 1 ? "s" : "")
      };
      setEditRecipe(newRecipe);
      setAiScanLoading(false);
      setAiScanStatus("");
    })
    .catch(function(err) {
      setAiScanLoading(false);
      setAiScanStatus("");
      alert("Scan failed: " + err.message);
    });
  }

  // Import recipe from URL (website, Instagram, TikTok, Facebook)
  var RECIPE_PROXY_URL = "https://recipe-proxy.coby-chavers.workers.dev";
  
  function importFromUrl(url) {
    if (!url.trim()) return;
    setImportLoading(true);
    setImportStatus("Fetching recipe from URL...");
    
    var sourceType = "website";
    if (url.includes("instagram.com")) sourceType = "Instagram";
    else if (url.includes("tiktok.com")) sourceType = "TikTok";
    else if (url.includes("facebook.com") || url.includes("fb.com")) sourceType = "Facebook";
    
    fetch(RECIPE_PROXY_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ type: "url", url: url })
    })
    .then(function(response) { return response.json(); })
    .then(function(data) {
      if (data.error) throw new Error(data.error);
      if (!data.success || !data.recipe) throw new Error("Could not extract recipe from this URL");
      
      var parsed = data.recipe;
      setImportStatus("Recipe found!");
      
      var newRecipe = {
        id: Date.now(),
        name: parsed.name || "Imported Recipe",
        emoji: "🍽️",
        time: parsed.time || "",
        ingredients: (parsed.ingredients || []).map(function(i) { 
          if (typeof i === "string") return parseIng(i);
          return { qty: i.qty || "", unit: i.unit || "", name: i.name || "" };
        }),
        notes: parsed.notes || "",
        recipeType: parsed.recipeType || "other",
        credit: "Imported from " + sourceType + ": " + url.substring(0, 50) + (url.length > 50 ? "..." : "")
      };
      
      svR(recipes.concat([newRecipe]));
      setImportLoading(false);
      setImportStatus("");
      setImportUrl("");
      setShowImport(false);
      setExpR(newRecipe.id);
    })
    .catch(function(err) {
      setImportLoading(false);
      setImportStatus("");
      alert("Import failed: " + err.message);
    });
  }

  // Import recipe from PDF
  function importFromPdf(file) {
    if (!file) return;
    setImportLoading(true);
    setImportStatus("Reading PDF...");
    
    var reader = new FileReader();
    reader.onerror = function() {
      setImportLoading(false);
      setImportStatus("");
      alert("Could not read the PDF file.");
    };
    reader.onload = function(ev) {
      var base64 = ev.target.result.split(",")[1];
      setImportStatus("Extracting recipe from PDF...");
      
      fetch(RECIPE_PROXY_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ 
          type: "pdf", 
          imageData: base64, 
          mimeType: "application/pdf" 
        })
      })
      .then(function(response) { return response.json(); })
      .then(function(data) {
        if (data.error) throw new Error(data.error);
        if (!data.success || !data.recipe) throw new Error("Could not extract recipe from this PDF");
        
        var parsed = data.recipe;
        setImportStatus("Recipe found!");
        
        var newRecipe = {
          id: Date.now(),
          name: parsed.name || "Imported Recipe",
          emoji: "🍽️",
          time: parsed.time || "",
          ingredients: (parsed.ingredients || []).map(function(i) { 
            if (typeof i === "string") return parseIng(i);
            return { qty: i.qty || "", unit: i.unit || "", name: i.name || "" };
          }),
          notes: parsed.notes || "",
          recipeType: parsed.recipeType || "other",
          credit: "Imported from PDF: " + file.name
        };
        
        svR(recipes.concat([newRecipe]));
        setImportLoading(false);
        setImportStatus("");
        setShowImport(false);
        setExpR(newRecipe.id);
      })
      .catch(function(err) {
        setImportLoading(false);
        setImportStatus("");
        alert("Import failed: " + err.message);
      });
    };
    reader.readAsDataURL(file);
  }

          {/* Results count when filtering */}
          {(histSearch||histDateFrom||histDateTo)?
            <div style={{fontSize:13,fontWeight:600,color:C.dark,marginBottom:10}}>
              Found {filteredItems.length} meal{filteredItems.length!==1?"s":""}
              {histSearch?" matching \""+histSearch+"\"":""}
              {histDateFrom||histDateTo?" in date range":""}
            </div>
          :null}
          
          {/* Recent meals */}
          <div style={{fontSize:13,fontWeight:700,marginBottom:10}}>📅 {histSearch||histDateFrom||histDateTo?"Results":histFilter!=="all"?RECIPE_TYPES.find(function(t){return t.id===histFilter})?.label||histFilter:"Recent Meals"}</div>
          {filteredItems.length===0?<div style={{textAlign:"center",padding:20,opacity:.4,background:"#fff",borderRadius:12,border:"1px solid "+C.bdr}}>No meals found.</div>:null}
          <div style={{background:"#fff",borderRadius:12,border:"1px solid "+C.bdr,overflow:"hidden"}}>
            {filteredItems.slice(0,25).map(function(pair,idx){
              var k=pair[0],m=pair[1];
              var typeInfo=RECIPE_TYPES.find(function(t){return t.id===(m.recipeType||detectRecipeType(m))})||{icon:"🍽️",label:"Other"};
              var dateStr=new Date(k+"T12:00:00").toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});
              var count=cts[m.name]||1;
              // Find matching recipe
              var matchingRecipe=recipes.find(function(r){return r.name.toLowerCase()===m.name.toLowerCase()});
              return <div key={k+"-"+idx} onClick={function(){
                if(matchingRecipe){
                  // Open recipe in Recipes tab
                  setView("recipes");
                  setRecipeFilter("all");
                  setExpR(matchingRecipe.id);
                }else{
                  // Open in edit modal with this meal's data
                  setSelDate(k);
                  setEm(Object.assign({},m));
                  setEditIdx(idx);
                }
              }} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 16px",borderBottom:idx<Math.min(filteredItems.length,25)-1?"1px solid "+C.bdr:"none",cursor:"pointer"}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:14,fontWeight:600,color:C.dark,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{m.name}</div>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <span style={{fontSize:11,color:C.light}}>{dateStr}</span>
                    <span style={{fontSize:10,color:C.blushDark,background:C.blush,padding:"1px 6px",borderRadius:4}}>{typeInfo.icon} {typeInfo.label}</span>
                  </div>
                </div>
                {count>1?<span style={{fontSize:11,background:C.blushMed,borderRadius:6,padding:"3px 8px",color:C.dark,fontWeight:600}}>{count}x</span>:null}
                {matchingRecipe?<span style={{fontSize:11,color:C.light}}>📖</span>:<span style={{fontSize:11,color:C.light}}>✏️</span>}
              </div>
            })}
          </div>
          {filteredItems.length>25?<div style={{textAlign:"center",padding:12,fontSize:12,color:C.light}}>Showing 25 of {filteredItems.length} meals</div>:null}
        </div>;
      })()}

      {/* FOLLOWERS TAB */}
      {view==="followers"&&<div>
        {!user?<div style={{textAlign:"center",padding:40}}>
          <div style={{fontSize:48,marginBottom:16}}>👥</div>
          <div style={{fontSize:16,fontWeight:600,color:C.dark,marginBottom:8}}>Sign in to connect with others</div>
          <div style={{fontSize:13,color:C.light,marginBottom:16}}>Follow other Family Table users to share recipes</div>
          <button onClick={function(){setShowAuth(true)}} style={{padding:"12px 24px",borderRadius:10,border:"none",background:C.dark,color:"#fff",fontWeight:600,fontSize:14,cursor:"pointer"}}>Sign In</button>
        </div>:
        <div>
          {/* Add by Username */}
          <div style={{marginBottom:16}}>
            <button onClick={function(){setShowScanQR(true)}} style={{width:"100%",padding:"14px",borderRadius:12,border:"none",background:C.dark,cursor:"pointer",textAlign:"center"}}>
              <div style={{fontSize:24,marginBottom:4}}>🔍</div>
              <div style={{fontSize:13,fontWeight:600,color:"#fff"}}>Follow User</div>
              <div style={{fontSize:10,color:"rgba(255,255,255,0.7)"}}>Enter username</div>
            </button>
          </div>
          
          {/* Search for Users */}
          <div style={{background:"#fff",borderRadius:12,padding:16,marginBottom:16,border:"1px solid "+C.bdr}}>
            <div style={{fontSize:14,fontWeight:700,color:C.dark,marginBottom:12}}>🔍 Find Users</div>
            <input 
              value={friendSearch}
              onChange={function(e){setFriendSearch(e.target.value);searchFriends(e.target.value)}}
              placeholder="Search by username..."
              style={{width:"100%",padding:"12px 14px",borderRadius:10,border:"1px solid "+C.bdr,fontSize:14,outline:"none",boxSizing:"border-box"}}
            />
            
            {/* Search Results */}
            {friendSearch.trim()&&friendSearchResults.length>0?<div style={{marginTop:12,borderTop:"1px solid "+C.bdr,paddingTop:12}}>
              {friendSearchResults.map(function(result){return(
                <div key={result.username} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 0",borderBottom:"1px solid "+C.bdr}}>
                  {result.profilePic?
                    (result.profilePic.startsWith("data:")?
                      <img src={result.profilePic} style={{width:36,height:36,borderRadius:18,objectFit:"cover"}} alt=""/>
                    :
                      <span style={{width:36,height:36,borderRadius:18,background:C.blushMed,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>{result.profilePic}</span>
                    )
                  :
                    <span style={{width:36,height:36,borderRadius:18,background:C.blushMed,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:700,color:C.dark}}>{result.username.charAt(0).toUpperCase()}</span>
                  }
                  <div style={{flex:1}} onClick={function(){setViewProfileUser(result.username);setViewProfileData(result)}}>
                    <div style={{fontWeight:600,fontSize:14,color:C.dark,cursor:"pointer"}}>@{result.username}</div>
                  </div>
                  {result.isFollowing?
                    <span style={{padding:"6px 12px",borderRadius:8,background:C.blush,color:C.light,fontSize:12}}>Following</span>
                  :
                    <button onClick={function(){followUser(result.username)}} style={{padding:"6px 14px",borderRadius:8,border:"none",background:C.dark,color:"#fff",fontSize:12,fontWeight:600,cursor:"pointer"}}>Follow</button>
                  }
                </div>
              )})}
            </div>:null}
            
            {friendSearch.trim()&&friendSearchResults.length===0&&!friendSearching?<div style={{marginTop:12,textAlign:"center",padding:16,color:C.light,fontSize:13}}>No users found matching "{friendSearch}" <br/><span style={{fontSize:10,opacity:0.5}}>(Debug: {Object.keys(allUsers).length} users loaded: {Object.keys(allUsers).join(", ")})</span></div>:null}
          </div>
          
          {/* Suggested Users */}
          {suggestedFriends.length>0?<div style={{marginBottom:16}}>
            <div style={{fontSize:14,fontWeight:700,color:C.dark,marginBottom:10}}>✨ Suggested</div>
            <div style={{background:"linear-gradient(135deg, #fff 0%, "+C.blush+" 100%)",borderRadius:12,border:"1px solid "+C.bdr,overflow:"hidden"}}>
              {suggestedFriends.map(function(sug,i){return(
                <div key={sug.username} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",borderBottom:i<suggestedFriends.length-1?"1px solid "+C.bdr:"none",background:"rgba(255,255,255,0.7)"}}>
                  {sug.profilePic?
                    (sug.profilePic.startsWith("data:")?
                      <img src={sug.profilePic} style={{width:44,height:44,borderRadius:22,objectFit:"cover",border:"2px solid #fff"}} alt=""/>
                    :
                      <span style={{width:44,height:44,borderRadius:22,background:C.blushMed,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,border:"2px solid #fff"}}>{sug.profilePic}</span>
                    )
                  :
                    <span style={{width:44,height:44,borderRadius:22,background:C.blushMed,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,fontWeight:700,color:C.dark,border:"2px solid #fff"}}>{sug.username.charAt(0).toUpperCase()}</span>
                  }
                  <div style={{flex:1}}>
                    <div style={{fontWeight:600,fontSize:14,color:C.dark}}>@{sug.username}</div>
                    <div style={{fontSize:11,color:C.light}}>{sug.reason}</div>
                  </div>
                  <button onClick={function(){followUser(sug.username)}} style={{padding:"8px 16px",borderRadius:8,border:"none",background:C.dark,color:"#fff",fontSize:12,fontWeight:600,cursor:"pointer"}}>Follow</button>
                </div>
              )})}
            </div>
          </div>:null}
          
          {/* Stats */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
            <div onClick={function(){if(followers.length>0)setExpandedSection(expandedSection==="followers"?null:"followers")}} style={{background:expandedSection==="followers"?C.blushDeep:C.blushMed,borderRadius:12,padding:16,textAlign:"center",cursor:followers.length>0?"pointer":"default",transition:"background 0.2s"}}>
              <div style={{fontSize:28,fontWeight:800,color:C.dark}}>{followers.length}</div>
              <div style={{fontSize:12,color:C.light}}>Followers {followers.length>0?(expandedSection==="followers"?"▲":"▼"):""}</div>
            </div>
            <div onClick={function(){if(following.length>0)setExpandedSection(expandedSection==="following"?null:"following")}} style={{background:expandedSection==="following"?C.blushDeep:C.blushMed,borderRadius:12,padding:16,textAlign:"center",cursor:following.length>0?"pointer":"default",transition:"background 0.2s"}}>
              <div style={{fontSize:28,fontWeight:800,color:C.dark}}>{following.length}</div>
              <div style={{fontSize:12,color:C.light}}>Following {following.length>0?(expandedSection==="following"?"▲":"▼"):""}</div>
            </div>
          </div>
          
          {/* Followers List */}
          {expandedSection==="followers"&&followers.length>0?<div style={{marginBottom:16}}>
            <div style={{fontSize:14,fontWeight:700,color:C.dark,marginBottom:10}}>👥 Followers</div>
            <div style={{background:"#fff",borderRadius:12,border:"1px solid "+C.bdr,overflow:"hidden"}}>
              {followers.map(function(f,i){return(
                <div key={f.username} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",borderBottom:i<followers.length-1?"1px solid "+C.bdr:"none"}}>
                  <div onClick={function(){setViewProfileUser(f.username);setViewProfileData({username:f.username,profilePic:f.profilePic,isFollowing:following.some(function(x){return x.username===f.username}),isPending:myPendingRequests.includes(f.username)})}} style={{display:"flex",alignItems:"center",gap:12,flex:1,cursor:"pointer"}}>
                    {f.profilePic?
                      (f.profilePic.startsWith("data:")?
                        <img src={f.profilePic} style={{width:40,height:40,borderRadius:20,objectFit:"cover"}} alt=""/>
                      :
                        <span style={{width:40,height:40,borderRadius:20,background:C.blushMed,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>{f.profilePic}</span>
                      )
                    :
                      <span style={{width:40,height:40,borderRadius:20,background:C.blushMed,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontWeight:700,color:C.dark}}>{f.username.charAt(0).toUpperCase()}</span>
                    }
                    <div style={{fontWeight:600,fontSize:14,color:C.dark}}>@{f.username}</div>
                  </div>
                  <button onClick={function(){removeFollower(f.username)}} style={{padding:"6px 12px",borderRadius:6,border:"1px solid #ddd",background:"#fff",color:"#999",fontSize:11,cursor:"pointer"}}>Remove</button>
                </div>
              )})}
            </div>
          </div>:null}
          
          {/* Following List */}
          {expandedSection==="following"&&following.length>0?<div style={{marginBottom:16}}>
            <div style={{fontSize:14,fontWeight:700,color:C.dark,marginBottom:10}}>💫 Following</div>
            <div style={{background:"#fff",borderRadius:12,border:"1px solid "+C.bdr,overflow:"hidden"}}>
              {following.map(function(f,i){return(
                <div key={f.username} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",borderBottom:i<following.length-1?"1px solid "+C.bdr:"none"}}>
                  <div onClick={function(){setViewProfileUser(f.username);setViewProfileData({username:f.username,profilePic:f.profilePic,isFollowing:true,isPending:false})}} style={{display:"flex",alignItems:"center",gap:12,flex:1,cursor:"pointer"}}>
                    {f.profilePic?
                      (f.profilePic.startsWith("data:")?
                        <img src={f.profilePic} style={{width:40,height:40,borderRadius:20,objectFit:"cover"}} alt=""/>
                      :
                        <span style={{width:40,height:40,borderRadius:20,background:C.blushMed,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>{f.profilePic}</span>
                      )
                    :
                      <span style={{width:40,height:40,borderRadius:20,background:C.blushMed,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontWeight:700,color:C.dark}}>{f.username.charAt(0).toUpperCase()}</span>
                    }
                    <div style={{fontWeight:600,fontSize:14,color:C.dark}}>@{f.username}</div>
                  </div>
                  <button onClick={function(){unfollowUser(f.username)}} style={{padding:"6px 12px",borderRadius:6,border:"1px solid "+C.bdr,background:C.blush,color:C.dark,fontSize:11,cursor:"pointer"}}>Unfollow</button>
                </div>
              )})}
            </div>
          </div>:null}
          
          {/* Status message */}
          {followStatus?<div style={{textAlign:"center",padding:12,marginBottom:16,borderRadius:8,background:followStatus.startsWith("error")?"#fef2f2":"#f0fdf4"}}>
            <span style={{fontSize:13,fontWeight:600,color:followStatus.startsWith("error")?"#c0392b":"#27ae60"}}>{followStatus.startsWith("error")?followStatus.replace("error:","❌ "):followStatus.replace("success:","✓ ")}</span>
          </div>:null}
          
          {/* Empty state */}
          {followers.length===0&&following.length===0&&followRequests.length===0&&suggestedFriends.length===0?<div style={{textAlign:"center",padding:30,background:"#fff",borderRadius:12,border:"1px solid "+C.bdr}}>
            <div style={{fontSize:40,marginBottom:12}}>👋</div>
            <div style={{fontSize:14,fontWeight:600,color:C.dark,marginBottom:4}}>Connect with friends!</div>
            <div style={{fontSize:12,color:C.light}}>Search for users above or wait for suggestions</div>
          </div>:null}
        </div>}
      </div>}

      {/* EDIT MEAL MODAL */}
      {selDate&&em&&<div style={ovl} onClick={function(){setSelDate(null);setEm(null);setEditIdx(null)}}><div style={mdl} onClick={function(e){e.stopPropagation()}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div style={{fontWeight:700,fontSize:17}}>{typeof editIdx==="number"?"Edit":"Add"} Meal</div>
          <button onClick={function(){setSelDate(null);setEm(null);setEditIdx(null)}} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",opacity:.4}}>✕</button>
        </div>
        <div style={{position:"relative",marginBottom:12}}>
          {em.photo?<div style={{position:"relative"}}><img src={em.photo} style={{width:"100%",height:160,objectFit:"contain",background:C.blush,borderRadius:10}} alt=""/><button onClick={function(){fileRef.current&&fileRef.current.click()}} style={Object.assign({},btn("rgba(0,0,0,0.6)"),{position:"absolute",bottom:8,right:8,fontSize:11,padding:"4px 10px"})}>📷</button></div>:<div onClick={function(){fileRef.current&&fileRef.current.click()}} style={{width:"100%",height:120,borderRadius:10,border:"2px dashed #ddd",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:"pointer",background:"#fafafe"}}><span style={{fontSize:28}}>📷</span><span style={{fontSize:13,opacity:.5,marginTop:4}}>Add photo</span></div>}
          <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={function(e){handlePhoto(e,setEm)}}/>
        </div>
        <div style={{marginBottom:10}}><label style={{fontSize:12,fontWeight:600,opacity:.6}}>Name *</label><input style={inp} placeholder="e.g. Mom's Chicken Parm" value={em.name} onChange={function(e){setEm(function(m){return Object.assign({},m,{name:e.target.value})})}}/></div>
        <div style={{marginBottom:10}}><label style={{fontSize:12,fontWeight:600,opacity:.6}}>Time</label><input style={inp} placeholder="e.g. 45 min" value={em.time} onChange={function(e){setEm(function(m){return Object.assign({},m,{time:e.target.value})})}}/></div>
        <div style={{marginBottom:10}}><label style={{fontSize:12,fontWeight:600,opacity:.6}}>Ingredients</label>
          {em.ingredients.map(function(g,i){return <div key={i} style={{display:"flex",alignItems:"center",gap:6,padding:"4px 0",fontSize:13}}><span style={{flex:1}}>{formatIng(g)}</span><button onClick={function(){setEm(function(m){return Object.assign({},m,{ingredients:m.ingredients.filter(function(_,j){return j!==i})})})} } style={{background:"none",border:"none",cursor:"pointer",opacity:.4,fontSize:14}}>✕</button></div>})}
          <div style={{display:"flex",gap:4,marginTop:4}}>
            <input style={{width:50,padding:"8px 6px",borderRadius:8,border:"1px solid #ddd",fontSize:13,textAlign:"center"}} placeholder="Qty" value={nqty2} onChange={function(e){setNqty2(e.target.value)}}/>
            <select style={{padding:"8px 4px",borderRadius:8,border:"1px solid #ddd",fontSize:12}} value={nunit2} onChange={function(e){setNunit2(e.target.value)}}>{UNITS.map(function(u){return React.createElement("option",{key:u,value:u},u||"unit")})}</select>
            <input style={Object.assign({},inp,{flex:1})} placeholder="Ingredient" value={ni2} onChange={function(e){setNi2(e.target.value)}} onKeyDown={function(e){if(e.key==="Enter")addI()}}/>
            <button onClick={addI} style={btn(C.dark)}>Add</button>
          </div>
        </div>
        <div style={{marginBottom:10}}><label style={{fontSize:12,fontWeight:600,opacity:.6}}>Instructions</label><textarea style={Object.assign({},inp,{minHeight:50,resize:"vertical"})} placeholder="Cooking instructions..." value={em.notes} onChange={function(e){setEm(function(m){return Object.assign({},m,{notes:e.target.value})})}}/></div>
        <div style={{marginBottom:14}}><label style={{fontSize:12,fontWeight:600,opacity:.6}}>Recipe Source / Credit</label><input style={inp} placeholder="e.g. Grandma's recipe, AllRecipes.com, @foodblogger" value={em.credit||""} onChange={function(e){setEm(function(m){return Object.assign({},m,{credit:e.target.value})})}}/></div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          <button onClick={saveM} style={Object.assign({},btn(C.dark),{flex:1})}>💾 Save</button>
          {em.name.trim()?<button onClick={function(){svR(recipes.concat([Object.assign({},em,{id:Date.now()})]))}} style={btn(C.blushMed,C.dark)}>📖 Recipe</button>:null}
          {typeof editIdx==="number"?<button onClick={delM} style={btn("#ffe0e0","#c0392b")}>🗑️</button>:null}
        </div>
      </div></div>}

      {/* RECIPE PICKER */}
      {rpick&&<div style={ovl} onClick={function(){setRpick(null)}}><div style={mdl} onClick={function(e){e.stopPropagation()}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}><div style={{fontWeight:700,fontSize:17}}>Add Meal for {new Date(rpick+"T12:00:00").toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"})}</div><button onClick={function(){setRpick(null)}} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",opacity:.4}}>✕</button></div>
        <button onClick={function(){openEdit(rpick);setRpick(null)}} style={{width:"100%",padding:12,marginBottom:14,borderRadius:10,border:"1px dashed "+C.bdr,background:"transparent",cursor:"pointer",fontSize:14,fontWeight:600,color:C.dark}}>+ Create New Meal</button>
        {favorites.length>0?<div style={{marginBottom:12}}><div style={{fontSize:12,fontWeight:700,color:C.blushDark,marginBottom:6}}>❤️ Favorites</div>{recipes.filter(function(r){return favorites.includes(r.id)}).map(function(r){return <div key={r.id} onClick={function(){var u=Object.assign({},meals);var list=getMealsForDay(rpick).slice();list.push(Object.assign({},r));u[rpick]=list;svM(u);setRpick(null)}} style={{display:"flex",alignItems:"center",gap:10,padding:10,borderRadius:10,border:"1px solid #eee",marginBottom:6,cursor:"pointer",background:"#F5EBE6"}}><div><div style={{fontWeight:600,fontSize:14}}>{r.name}</div>{r.time?<div style={{fontSize:11,opacity:.5}}>{r.time}</div>:null}</div></div>})}</div>:null}
        {recipes.length===0?<div style={{textAlign:"center",padding:20,opacity:.4}}>No saved recipes yet. Create one in the Recipes tab!</div>:null}
        {recipes.length>0?<div style={{fontSize:12,fontWeight:700,color:C.light,marginBottom:6}}>All Recipes</div>:null}
        {recipes.filter(function(r){return!favorites.includes(r.id)}).map(function(r){return <div key={r.id} onClick={function(){var u=Object.assign({},meals);var list=getMealsForDay(rpick).slice();list.push(Object.assign({},r));u[rpick]=list;svM(u);setRpick(null)}} style={{display:"flex",alignItems:"center",gap:10,padding:10,borderRadius:10,border:"1px solid #eee",marginBottom:6,cursor:"pointer",background:"#fafaff"}}><div><div style={{fontWeight:600,fontSize:14}}>{r.name}</div>{r.time?<div style={{fontSize:11,opacity:.5}}>{r.time}</div>:null}</div></div>})}
      </div></div>}

      {/* ADD RECIPE */}
      {showRF&&<div style={ovl} onClick={function(){setShowRF(false)}}><div style={mdl} onClick={function(e){e.stopPropagation()}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}><div style={{fontWeight:700,fontSize:17}}>Add Recipe</div><button onClick={function(){setShowRF(false)}} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",opacity:.4}}>✕</button></div>
        <div style={{marginBottom:12}}>{rf.photo?<img src={rf.photo} style={{width:"100%",height:160,objectFit:"contain",background:C.blush,borderRadius:10}} alt=""/>:<div onClick={function(){rfRef.current&&rfRef.current.click()}} style={{width:"100%",height:100,borderRadius:10,border:"2px dashed #ddd",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:"pointer"}}><span style={{fontSize:28}}>📷</span></div>}<input ref={rfRef} type="file" accept="image/*" style={{display:"none"}} onChange={function(e){handlePhoto(e,setRf)}}/></div>

            <button onClick={function(){setShareMode("options")}} style={{width:"100%",padding:"16px",borderRadius:12,border:"none",background:C.dark,color:"#fff",fontWeight:600,fontSize:16,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
              📤 Share Recipe
            </button>
          </div>}
          
          {/* Options Menu */}
          {shareMode==="options"?<div style={{padding:"0 16px 16px"}}>
            <div style={{display:"flex",gap:10}}>
              {user?<button onClick={function(){setShareMode("user")}} style={{flex:1,padding:"16px",borderRadius:12,border:"1px solid "+C.bdr,background:"#fff",cursor:"pointer",textAlign:"center"}}>
                <div style={{fontSize:24,marginBottom:6}}>👤</div>
                <div style={{fontSize:13,fontWeight:600,color:C.dark}}>Send to User</div>
                <div style={{fontSize:11,color:C.light,marginTop:2}}>@username</div>
              </button>:null}
              <button onClick={function(){setShareMode("code");if(!shareCode){var newCode=Math.random().toString(36).substring(2,8).toUpperCase();var updated=Object.assign({},sharedRecipes);updated[newCode]={recipe:shareR,sharedBy:userId,sharedAt:Date.now()};setSharedRecipes(updated);window.storage.set("dm_shared_recipes",JSON.stringify(updated),true).catch(function(){});setShareCode(newCode)}}} style={{flex:1,padding:"16px",borderRadius:12,border:"1px solid "+C.bdr,background:"#fff",cursor:"pointer",textAlign:"center"}}>
                <div style={{fontSize:24,marginBottom:6}}>🔗</div>
                <div style={{fontSize:13,fontWeight:600,color:C.dark}}>Share Code</div>
                <div style={{fontSize:11,color:C.light,marginTop:2}}>6-character code</div>
              </button>
              <button onClick={function(){
                var t="🍽️ "+shareR.name+"\n\n"+(shareR.time?"⏱ "+shareR.time+"\n\n":"")+"INGREDIENTS:\n"+shareR.ingredients.map(function(i){return"• "+formatIng(i)}).join("\n")+(shareR.notes?"\n\nINSTRUCTIONS:\n"+shareR.notes:"")+(shareR.credit?"\n\nSource: "+shareR.credit:"")+"\n\n— The Family Table 🐝";
                if(navigator.share){
                  navigator.share({title:shareR.name,text:t}).catch(function(){});
                }else{
                  var el=document.createElement("textarea");
                  el.value=t;
                  el.style.position="absolute";
                  el.style.left="-9999px";
                  document.body.appendChild(el);
                  el.select();
                  document.execCommand("copy");
                  document.body.removeChild(el);
                  setCopyFeedback("text");
                  setTimeout(function(){setCopyFeedback("")},2000);
                }
              }} style={{flex:1,padding:"16px",borderRadius:12,border:"1px solid "+C.bdr,background:copyFeedback==="text"?"#d4edda":"#fff",cursor:"pointer",textAlign:"center"}}>
                <div style={{fontSize:24,marginBottom:6}}>{copyFeedback==="text"?"✓":"📋"}</div>
                <div style={{fontSize:13,fontWeight:600,color:copyFeedback==="text"?"#155724":C.dark}}>{copyFeedback==="text"?"Copied!":"Copy Text"}</div>
                <div style={{fontSize:11,color:C.light,marginTop:2}}>Full recipe</div>
              </button>
            </div>
          </div>:null}
        </div>
      </div></div>}

      {/* IMPORT RECIPE */}
      {showImport&&<div style={ovl} onClick={function(){if(!importLoading){setShowImport(false);setImportUrl("");setImportCode("");setImportStatus("");setImportPasteName("");setImportPasteIngredients("");setImportPasteDirections("")}}}><div style={Object.assign({},mdl,{maxWidth:440,padding:0,overflow:"hidden",maxHeight:"90vh",display:"flex",flexDirection:"column"})} onClick={function(e){e.stopPropagation()}}>
        {/* Header */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"16px 20px",borderBottom:"1px solid "+C.bdr,flexShrink:0}}>
          <div style={{fontWeight:700,fontSize:17,color:C.dark}}>📥 Import Recipe</div>
          <button onClick={function(){if(!importLoading){setShowImport(false);setImportUrl("");setImportCode("");setImportStatus("");setImportPasteName("");setImportPasteIngredients("");setImportPasteDirections("")}}} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",opacity:.4}}>✕</button>
        </div>
        
        {/* Tabs */}
        <div style={{display:"flex",borderBottom:"1px solid "+C.bdr,flexShrink:0}}>
          {[["text","📝 Text"],["url","🌐 URL"],["pdf","📄 PDF"]].map(function(t){
            var active=importTab===t[0];
            return <button key={t[0]} onClick={function(){setImportTab(t[0])}} style={{flex:1,padding:"12px",border:"none",borderBottom:active?"2px solid "+C.dark:"2px solid transparent",background:active?C.blush:"#fff",cursor:"pointer",fontSize:13,fontWeight:active?700:500,color:active?C.dark:C.light}}>{t[1]}</button>
          })}
        </div>
        
        <div style={{padding:20,overflowY:"auto",flex:1}}>
          {/* Loading state */}
          {importLoading?<div style={{textAlign:"center",padding:30}}>
            <div style={{fontSize:32,marginBottom:12}}>⏳</div>
            <div style={{fontSize:14,fontWeight:600,color:C.dark,marginBottom:4}}>Importing Recipe...</div>
            <div style={{fontSize:12,color:C.light}}>{importStatus}</div>
          </div>:null}
          
          {/* Text/Paste Tab */}
          {!importLoading&&importTab==="text"?<div>
            <div style={{fontSize:13,color:C.light,marginBottom:16,lineHeight:1.5}}>
              Copy and paste a recipe name, ingredients, and directions from any source.
            </div>
            <div style={{marginBottom:14}}>
              <label style={{fontSize:12,fontWeight:600,color:C.dark,marginBottom:6,display:"block"}}>Recipe Name</label>
              <input 
                value={importPasteName} 
                onChange={function(e){setImportPasteName(e.target.value)}} 
                placeholder="e.g., Grandma's Chocolate Chip Cookies" 
                style={{width:"100%",padding:"12px 14px",borderRadius:10,border:"1px solid "+C.bdr,fontSize:14,boxSizing:"border-box"}}
              />
            </div>
            <div style={{marginBottom:14}}>
              <label style={{fontSize:12,fontWeight:600,color:C.dark,marginBottom:6,display:"block"}}>Ingredients</label>
              <textarea 
                value={importPasteIngredients} 
                onChange={function(e){setImportPasteIngredients(e.target.value)}} 
                placeholder="Paste ingredients here, one per line...&#10;&#10;Example:&#10;2 cups flour&#10;1 cup sugar&#10;1/2 cup butter" 
                style={{width:"100%",padding:"12px 14px",borderRadius:10,border:"1px solid "+C.bdr,fontSize:13,boxSizing:"border-box",minHeight:120,resize:"vertical",fontFamily:"inherit",lineHeight:1.5}}
              />
            </div>
            <div style={{marginBottom:16}}>
              <label style={{fontSize:12,fontWeight:600,color:C.dark,marginBottom:6,display:"block"}}>Directions</label>
              <textarea 
                value={importPasteDirections} 
                onChange={function(e){setImportPasteDirections(e.target.value)}} 
                placeholder="Paste directions/instructions here..." 
                style={{width:"100%",padding:"12px 14px",borderRadius:10,border:"1px solid "+C.bdr,fontSize:13,boxSizing:"border-box",minHeight:120,resize:"vertical",fontFamily:"inherit",lineHeight:1.5}}
              />
            </div>
            <button 
              onClick={function(){
                if(!importPasteName.trim())return;
                // Parse ingredients - one per line, using parseIng function
                var ingList=importPasteIngredients.split("\n").filter(function(line){return line.trim()}).map(function(line){
                  return parseIng(line.trim());
                });
                var newRecipe={
                  id:Date.now(),
                  name:importPasteName.trim(),
                  emoji:"🍽️",
                  ingredients:ingList,
                  notes:importPasteDirections.trim(),
                  recipeType:"other",
                  isPublic:true
                };
                svR(recipes.concat([newRecipe]));
                setShowImport(false);
                setImportPasteName("");
                setImportPasteIngredients("");
                setImportPasteDirections("");
                setExpR(newRecipe.id);
              }} 
              disabled={!importPasteName.trim()} 
              style={{width:"100%",padding:"14px",borderRadius:10,border:"none",background:importPasteName.trim()?C.dark:"#ccc",color:"#fff",fontSize:14,fontWeight:600,cursor:importPasteName.trim()?"pointer":"not-allowed"}}
            >
              Save Recipe
            </button>
          </div>:null}
          
          {/* URL Tab */}
          {!importLoading&&importTab==="url"?<div>
            <div style={{fontSize:13,color:C.light,marginBottom:16,lineHeight:1.5}}>
              Paste a recipe URL from any website, Instagram, TikTok, or Facebook post.
            </div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:16}}>
              {[["🌐","Website"],["📸","Instagram"],["🎵","TikTok"],["📘","Facebook"]].map(function(s){
                return <span key={s[1]} style={{fontSize:11,padding:"4px 10px",borderRadius:12,background:C.blush,color:C.dark}}>{s[0]} {s[1]}</span>
              })}
            </div>
            <input 
              type="url" 
              value={importUrl} 
              onChange={function(e){setImportUrl(e.target.value)}} 
              placeholder="https://..." 
              style={{width:"100%",padding:"14px 16px",borderRadius:10,border:"1px solid "+C.bdr,fontSize:14,boxSizing:"border-box",marginBottom:12}}
            />
            <button 
              onClick={function(){importFromUrl(importUrl)}} 
              disabled={!importUrl.trim()} 
              style={{width:"100%",padding:"14px",borderRadius:10,border:"none",background:importUrl.trim()?C.dark:"#ccc",color:"#fff",fontSize:14,fontWeight:600,cursor:importUrl.trim()?"pointer":"not-allowed"}}
            >
              Import from URL
            </button>
          </div>:null}
          
          {/* PDF Tab */}
          {!importLoading&&importTab==="pdf"?<div>
            <div style={{fontSize:13,color:C.light,marginBottom:16,lineHeight:1.5}}>
              Upload a PDF containing a recipe. Works great with recipe cards, cookbook pages, or printed recipes.
            </div>
            <input 
              ref={pdfImportRef}
              type="file" 
              accept=".pdf,application/pdf" 
              style={{display:"none"}} 
              onChange={function(e){var f=e.target.files&&e.target.files[0];if(f)importFromPdf(f);e.target.value=""}}
            />
            <div 
              onClick={function(){pdfImportRef.current&&pdfImportRef.current.click()}}
              style={{width:"100%",padding:"40px 20px",borderRadius:12,border:"2px dashed "+C.bdr,background:C.blush,textAlign:"center",cursor:"pointer"}}
            >
              <div style={{fontSize:40,marginBottom:8}}>📄</div>
              <div style={{fontSize:14,fontWeight:600,color:C.dark,marginBottom:4}}>Click to upload PDF</div>
              <div style={{fontSize:12,color:C.light}}>or drag and drop</div>
            </div>
          </div>:null}
        </div>
      </div></div>}
    </div>
  );
}

var CONFIG_BEE = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='48' fill='%23F5EBE6' stroke='%23A08679' stroke-width='2'/%3E%3Cg transform='translate(50,50)'%3E%3Cellipse cx='-18' cy='-12' rx='14' ry='9' fill='none' stroke='%23A08679' stroke-width='1.5' transform='rotate(-25)'/%3E%3Cellipse cx='18' cy='-12' rx='14' ry='9' fill='none' stroke='%23A08679' stroke-width='1.5' transform='rotate(25)'/%3E%3Cellipse cx='0' cy='8' rx='12' ry='18' fill='none' stroke='%23A08679' stroke-width='2'/%3E%3Cline x1='-8' y1='0' x2='8' y2='0' stroke='%23A08679' stroke-width='1.5'/%3E%3Cline x1='-10' y1='8' x2='10' y2='8' stroke='%23A08679' stroke-width='1.5'/%3E%3Cline x1='-8' y1='16' x2='8' y2='16' stroke='%23A08679' stroke-width='1.5'/%3E%3Ccircle cx='0' cy='-18' r='7' fill='none' stroke='%23A08679' stroke-width='2'/%3E%3Cpath d='M-4,-24 Q-5,-32 -8,-34' fill='none' stroke='%23A08679' stroke-width='1.5' stroke-linecap='round'/%3E%3Cpath d='M4,-24 Q5,-32 8,-34' fill='none' stroke='%23A08679' stroke-width='1.5' stroke-linecap='round'/%3E%3C/g%3E%3C/svg%3E";

function ConfigScreen(props) {
  var onDone = props.onDone;
  var _txt = useState("");
  var txt = _txt[0];
  var setTxt = _txt[1];
  var _err = useState("");
  var err = _err[0];
  var setErr = _err[1];
  var _busy = useState(false);
  var busy = _busy[0];
  var setBusy = _busy[1];
  
  function submit() {
    setErr(""); setBusy(true);
    try {
      var t = txt.trim();
      var match = t.match(/\{[\s\S]*\}/);
      if (match) t = match[0];
      var cfg;
      try { cfg = JSON.parse(t); } catch(e) { cfg = JSON.parse(t.replace(/([{,]\s*)(\w+)\s*:/g,'$1"$2":').replace(/'/g,'"').replace(/,(\s*[}\]])/g,'$1')); }
      if (!cfg.apiKey) throw new Error("Missing apiKey");
      if (initFirebase(cfg)) {
        db.collection("data").doc("_test").set({t:Date.now()}).then(function() {
          localStorage.setItem("firebase_config", JSON.stringify(cfg));
          setBusy(false); onDone();
        }).catch(function(e) { setErr("Write failed: "+e.message); setBusy(false); });
      } else throw new Error("Init failed");
    } catch(e) { setErr(e.message); setBusy(false); }
  }
  
  function reset() {
    localStorage.removeItem("firebase_config");
    location.reload();
  }
  
  return React.createElement("div",{style:{maxWidth:500,margin:"0 auto",padding:"40px 20px",textAlign:"center"}},
    React.createElement("img",{src:CONFIG_BEE,style:{width:80,height:80,marginBottom:20}}),
    React.createElement("h1",{style:{fontSize:28,color:"#8B7355",marginBottom:10}},"The Family Table"),
    React.createElement("p",{style:{color:"#A69485",marginBottom:30}},"One-time Firebase setup"),
    React.createElement("div",{style:{background:"#fff",borderRadius:12,padding:20,textAlign:"left",border:"1px solid rgba(139,115,85,0.2)"}},
      err?React.createElement("div",{style:{background:"#FEE",color:"#C00",padding:12,borderRadius:8,marginBottom:16}},err):null,
      React.createElement("textarea",{value:txt,onChange:function(e){setTxt(e.target.value)},placeholder:"Paste Firebase config...",style:{width:"100%",height:180,padding:12,border:"1px solid #ddd",borderRadius:8,fontFamily:"monospace",fontSize:12,marginBottom:16}}),
      React.createElement("button",{onClick:submit,disabled:!txt.trim()||busy,style:{width:"100%",padding:16,background:txt.trim()&&!busy?"#8B7355":"#ccc",color:"#fff",border:"none",borderRadius:10,fontSize:16,fontWeight:600,cursor:txt.trim()&&!busy?"pointer":"not-allowed"}},busy?"Connecting...":"Connect"),
      React.createElement("button",{onClick:reset,style:{width:"100%",padding:12,background:"transparent",color:"#999",border:"1px solid #ddd",borderRadius:10,fontSize:14,marginTop:10,cursor:"pointer"}},"Reset")
    )
  );
}

function AppWrapper() {
  var _ready = useState(!!localStorage.getItem("firebase_config") && db);
  var ready = _ready[0];
  var setReady = _ready[1];
  if (!ready) return React.createElement(ConfigScreen,{onDone:function(){setReady(true)}});
  return React.createElement(App);
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(AppWrapper));
  </script>
</body>
</html>
