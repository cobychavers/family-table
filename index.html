<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Family Table - Test</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Georgia, serif; background: #F5EBE6; min-height: 100vh; padding: 20px; }
    .container { max-width: 500px; margin: 0 auto; }
    h1 { color: #8B7355; text-align: center; margin-bottom: 20px; }
    .card { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
    button { width: 100%; padding: 14px; background: #8B7355; color: #fff; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 10px; }
    button:hover { background: #7a6349; }
    input, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; margin-bottom: 10px; }
    .error { background: #fee; color: #c00; padding: 12px; border-radius: 8px; margin-bottom: 10px; }
    .success { background: #efe; color: #070; padding: 12px; border-radius: 8px; margin-bottom: 10px; }
    .status { text-align: center; color: #666; margin: 20px 0; }
  </style>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>
  <div class="container">
    <h1>🐝 The Family Table</h1>
    
    <div id="config-section" class="card">
      <h3 style="margin-bottom:10px;color:#8B7355;">Firebase Setup</h3>
      <div id="config-status"></div>
      <textarea id="config-input" rows="6" placeholder='Paste your Firebase config here...'></textarea>
      <button onclick="connectFirebase()">Connect to Firebase</button>
      <button onclick="resetConfig()" style="background:#999;margin-top:5px;">Reset Config</button>
    </div>
    
    <div id="app-section" class="card" style="display:none;">
      <h3 style="margin-bottom:10px;color:#8B7355;">App Status</h3>
      <div id="app-status" class="success">Connected to Firebase!</div>
      
      <h3 style="margin:20px 0 10px;color:#8B7355;">Auth</h3>
      <input id="username" placeholder="Username" />
      <input id="password" type="password" placeholder="Password" />
      <button onclick="signup()">Sign Up</button>
      <button onclick="login()" style="background:#A69485;">Login</button>
      
      <div id="user-info" style="display:none;margin-top:20px;">
        <div id="welcome" class="success"></div>
        <button onclick="logout()" style="background:#999;">Logout</button>
      </div>
    </div>
  </div>

  <script>
    let db = null;
    let currentUser = null;
    
    // Check for saved config on load
    window.onload = function() {
      const saved = localStorage.getItem("firebase_config");
      if (saved) {
        try {
          const config = JSON.parse(saved);
          if (initFirebase(config)) {
            showApp();
            checkSession();
          }
        } catch(e) {
          console.error(e);
          localStorage.removeItem("firebase_config");
        }
      }
    };
    
    function initFirebase(config) {
      try {
        if (firebase.apps.length === 0) {
          firebase.initializeApp(config);
        }
        db = firebase.firestore();
        return true;
      } catch(e) {
        console.error("Firebase init error:", e);
        showError("config-status", e.message);
        return false;
      }
    }
    
    function connectFirebase() {
      const input = document.getElementById("config-input").value.trim();
      try {
        let text = input;
        const match = text.match(/\{[\s\S]*\}/);
        if (match) text = match[0];
        
        let config;
        try {
          config = JSON.parse(text);
        } catch(e) {
          // Try to fix JS object notation
          let jsonStr = text.replace(/([{,]\s*)(\w+)\s*:/g, '$1"$2":').replace(/'/g, '"').replace(/,(\s*[}\]])/g, '$1');
          config = JSON.parse(jsonStr);
        }
        
        if (!config.apiKey || !config.projectId) {
          throw new Error("Missing apiKey or projectId");
        }
        
        if (initFirebase(config)) {
          // Test write
          db.collection("data").doc("_test").set({ test: true, time: Date.now() })
            .then(() => {
              localStorage.setItem("firebase_config", JSON.stringify(config));
              showApp();
            })
            .catch(err => {
              showError("config-status", "Write failed: " + err.message);
            });
        }
      } catch(e) {
        showError("config-status", "Invalid config: " + e.message);
      }
    }
    
    function resetConfig() {
      localStorage.removeItem("firebase_config");
      localStorage.removeItem("ft_session");
      location.reload();
    }
    
    function showApp() {
      document.getElementById("config-section").style.display = "none";
      document.getElementById("app-section").style.display = "block";
    }
    
    function showError(elementId, msg) {
      document.getElementById(elementId).innerHTML = '<div class="error">' + msg + '</div>';
    }
    
    function showSuccess(elementId, msg) {
      document.getElementById(elementId).innerHTML = '<div class="success">' + msg + '</div>';
    }
    
    function hashPass(p) {
      let h = 0;
      for (let i = 0; i < p.length; i++) {
        h = ((h << 5) - h) + p.charCodeAt(i);
        h = h & h;
      }
      return "h" + Math.abs(h).toString(36);
    }
    
    async function signup() {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      
      if (!username || !password) {
        showError("app-status", "Please enter username and password");
        return;
      }
      
      try {
        const doc = await db.collection("data").doc("dm_users").get();
        const users = doc.exists ? JSON.parse(doc.data().value) : {};
        
        if (users[username]) {
          showError("app-status", "Username already exists");
          return;
        }
        
        users[username] = { passHash: hashPass(password), created: Date.now() };
        await db.collection("data").doc("dm_users").set({ value: JSON.stringify(users) });
        
        currentUser = username;
        localStorage.setItem("ft_session", username);
        showLoggedIn();
        showSuccess("app-status", "Account created!");
      } catch(e) {
        showError("app-status", "Error: " + e.message);
      }
    }
    
    async function login() {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      
      if (!username || !password) {
        showError("app-status", "Please enter username and password");
        return;
      }
      
      try {
        const doc = await db.collection("data").doc("dm_users").get();
        if (!doc.exists) {
          showError("app-status", "No users exist. Please sign up.");
          return;
        }
        
        const users = JSON.parse(doc.data().value);
        
        // Case-insensitive lookup
        let foundUser = null;
        Object.keys(users).forEach(u => {
          if (u.toLowerCase() === username.toLowerCase()) foundUser = u;
        });
        
        if (!foundUser) {
          showError("app-status", "User not found");
          return;
        }
        
        if (users[foundUser].passHash !== hashPass(password)) {
          showError("app-status", "Incorrect password");
          return;
        }
        
        currentUser = foundUser;
        localStorage.setItem("ft_session", foundUser);
        showLoggedIn();
        showSuccess("app-status", "Logged in!");
      } catch(e) {
        showError("app-status", "Error: " + e.message);
      }
    }
    
    function logout() {
      currentUser = null;
      localStorage.removeItem("ft_session");
      document.getElementById("user-info").style.display = "none";
      document.getElementById("username").value = "";
      document.getElementById("password").value = "";
      showSuccess("app-status", "Logged out");
    }
    
    function checkSession() {
      const saved = localStorage.getItem("ft_session");
      if (saved) {
        currentUser = saved;
        showLoggedIn();
      }
    }
    
    function showLoggedIn() {
      document.getElementById("user-info").style.display = "block";
      document.getElementById("welcome").textContent = "Welcome, " + currentUser + "!";
    }
  </script>
</body>
</html>
