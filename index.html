  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    /* Theme tokens - light values match the app's original hardcoded palette
       exactly (zero visual change when data-theme is absent/"light"). Dark
       values are derived from the home-screen icon's own brown gradient
       (#3B2B1E - #7A5540) so dark mode reads as "the same app, dim lit"
       rather than a generic dark theme bolted on. */
    :root {
      --page: #F5EBE6;
      --surface: #FFFFFF;
      --blush: #F5EBE6;
      --blush-med: #E8DDD6;
      --blush-deep: #D4C4B8;
      --blush-accent: #B8A090;
      --blush-dark: #96806C;
      --dark: #6B4A32;
      --ink: #3A2A1D;
      --light: #8C7561;
      --gold: #B4823D;
      --border: rgba(58,42,29,0.10);
      --border-strong: #ddd;
      --disabled: #cccccc;
      --shadow-sm: 0 1px 3px rgba(58,42,29,0.08), 0 1px 2px rgba(58,42,29,0.06);
      --shadow-md: 0 4px 16px rgba(58,42,29,0.10), 0 2px 6px rgba(58,42,29,0.06);
      --shadow-lg: 0 12px 32px rgba(58,42,29,0.16);
      /* Bee mark. In dark this deliberately inverts to a warm brown disc with
         a cream bee - which is exactly the home-screen app icon - instead of
         staying a bright disc punched out of the dark header. */
      --logo-disc: #F5EBE6;
      --logo-line: #A08679;
      /* Chips floating over recipe photos (category tag, favorite heart).
         Must stay readable against an arbitrary photo, so it's a translucent
         scrim rather than a palette surface. */
      --overlay-chip: rgba(255,255,255,0.95);
      --overlay-chip-border: rgba(58,42,29,0.06);
      --overlay-chip-shadow: 0 2px 6px rgba(0,0,0,0.10);
      /* Not --ink/--dark: the chip sits on its own scrim, so its text tracks
         the scrim's lightness rather than the page's. */
      --overlay-chip-text: #6B4A32;
      /* Destructive/error red, and the softer rose used for favorite counts.
         Both lighten in dark mode - the light-mode reds are too dark to read
         against a dark surface. */
      --danger: #c0392b;
      --heart: #B5525F;
    }
    :root[data-theme="dark"] {
      --page: #1C140D;
      --surface: #2A1E14;
      --blush: #38281A;
      --blush-med: #46331F;
      --blush-deep: #5C4128;
      --blush-accent: #77552F;
      --blush-dark: #8F6B45;
      --dark: #B98B5E;
      --ink: #F7ECE3;
      --light: #B99B7C;
      --gold: #C99A52;
      --border: rgba(247,236,227,0.14);
      --border-strong: #4A3826;
      --disabled: #4A3A2A;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.35), 0 1px 2px rgba(0,0,0,0.25);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.40), 0 2px 6px rgba(0,0,0,0.25);
      --shadow-lg: 0 12px 32px rgba(0,0,0,0.55);
      --logo-disc: #4A3425;
      --logo-line: #EFE3D8;
      --overlay-chip: rgba(24,17,11,0.70);
      --overlay-chip-border: rgba(247,236,227,0.16);
      --overlay-chip-shadow: 0 2px 8px rgba(0,0,0,0.45);
      --overlay-chip-text: #F7ECE3;
      --danger: #EC7063;
      --heart: #D9838D;
    }
    body { font-family: 'Inter', -apple-system, sans-serif; background: var(--page); min-height: 100vh; }
    #root { min-height: 100vh; }
  </style>
  <script>

    try {

      if (savedTheme === "dark") document.documentElement.setAttribute("data-theme", "dark");
    } catch (e) {}

  <script>
    let db = null;
    let auth = null;
    let storage = null;
    let dbReady = false;

    function initFirebase(config) {
      try {
        if (firebase.apps.length === 0) firebase.initializeApp(config);
        db = firebase.firestore();
        auth = firebase.auth();
        // Non-fatal: this line sits after db/auth are live, so letting it
        // throw would abort init half-done and take the whole app out over an
        // optional feature. photoStore treats a null storage as "upload
        // unavailable" and callers fall back to inlining the photo, which is
        // exactly the old behaviour - so the app still works if Cloud Storage
        // isn't enabled on the project yet.
        try {
          storage = firebase.storage();
        } catch (e) {
          console.warn("Cloud Storage unavailable - photos will stay inline:", e.message);
          storage = null;
        }
        
        // Enable offline persistence
        db.enablePersistence({ synchronizeTabs: true })
          .then(function() {
            console.log("Firebase persistence enabled");
            dbReady = true;
          })
          .catch(function(err) {
            console.warn("Firebase persistence error:", err.code, err.message);
            // Still mark as ready even without persistence
            dbReady = true;
          });
        
        return true;
      } catch (e) { 
        console.error("Firebase init error:", e); 
        return false; 
      }
    }
    
    window.storage = {
      get: async (key, shared) => {
        if (!db) {
          console.error("Storage get failed - Firebase not connected");
          return null;
        }
        try {
          const doc = await db.collection("data").doc(key).get();
          if (doc.exists) {
            console.log("Storage get success:", key);
            return { key, value: doc.data().value, shared };
          } else {
            console.log("Storage get - key not found:", key);
            return null;
          }
        } catch (e) {
          console.error("Storage get error:", key, e);
          return null;
        }
      },
      // Documents in this collection are keyed like "dm_meals_<username>", but
      // the key cannot be used to prove ownership in security rules: usernames
      // may contain underscores, so "dm_meals_coby_chavers" is ambiguous about
      // where the name begins, and "dm_recipe_<user>_<id>" puts it in the
      // middle. Stamping the owner's uid as a field instead lets the rules
      // check ownership directly, with no parsing and no ambiguity.
      //
      // Social documents (followers/following/requests/inbox) are written by
      // *other* users by design - the rules carve those out by key prefix,
      // which is safe because the prefix match doesn't depend on the username.
      set: async (key, value, shared) => {
        if (!db) {
          console.error("Storage set failed - Firebase not connected");
          alert("Cannot save - Firebase not connected. Try refreshing the page.");
          return null;
        }
        try {
          const payload = {
            value,
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
          };
          const currentUid = auth && auth.currentUser && auth.currentUser.uid;
          if (currentUid) payload.ownerUid = currentUid;
          // merge:true so a write can never blank out ownerUid. The stored doc
          // only ever holds {value, updatedAt, ownerUid} and value is rewritten
          // in full each time, so merge changes nothing about the data - it
          // just stops a write that omitted ownerUid from stripping it, which
          // would otherwise lock the owner out under the owner-only rules.
          await db.collection("data").doc(key).set(payload, { merge: true });
          console.log("Storage set success:", key, "length:", value.length);
          return { key, value, shared };
        } catch (e) {
          console.error("Storage set error:", key, e);
          alert("Firebase write error: " + (e.code || "") + " " + (e.message || e));
          return null;
        }
      },
      delete: async (key, shared) => {
        if (!db) return null;
        try {
          await db.collection("data").doc(key).delete();
          return { key, deleted: true, shared };
        } catch (e) {
          console.error("Storage delete error:", key, e);
          return null;
        }
      },
      list: async (prefix, shared) => {
        if (!db) return { keys: [], prefix, shared };
        try {
          const snapshot = await db.collection("data").get();
          const keys = [];
          snapshot.forEach(doc => { if (!prefix || doc.id.startsWith(prefix)) keys.push(doc.id); });
          return { keys, prefix, shared };
        } catch (e) {
          console.error("Storage list error:", e);
          return { keys: [], prefix, shared };
        }
      }
    };

    // Favorite counters live in their own real Firestore collection (not the
    // flat "data" blob store) so counts are atomic (FieldValue.increment,
    // safe under concurrent favorites from many users) and queryable/
    // batch-fetchable by document id - neither is possible when everything
    // is JSON-stringified into one opaque field.
    window.favCounts = {
      key: (originalOwner, recipeId) => (originalOwner || "").toLowerCase() + "_" + recipeId,
      increment: async (recipe) => {
        if (!db || !recipe || !recipe.originalOwner || !recipe.recipeId) return null;
        const key = window.favCounts.key(recipe.originalOwner, recipe.recipeId);
        try {
          // set(...,{merge:true}) with FieldValue.increment handles both the
          // first-ever favorite (field starts at 0) and every one after in
          // a single atomic write - no separate create-vs-increment branch.
          await db.collection("favoriteCounts").doc(key).set({
            count: firebase.firestore.FieldValue.increment(1),
            recipeId: recipe.recipeId,
            originalOwner: (recipe.originalOwner || "").toLowerCase(),
            name: recipe.name || "",
            photo: recipe.photo || "",
            emoji: recipe.emoji || "",
            time: recipe.time || "",
            recipeType: recipe.recipeType || "other",
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
          }, { merge: true });
          return true;
        } catch (e) {
          console.error("favCounts increment error:", key, e);
          return null;
        }
      },
      decrement: async (recipe) => {
        if (!db || !recipe || !recipe.originalOwner || !recipe.recipeId) return null;
        const key = window.favCounts.key(recipe.originalOwner, recipe.recipeId);
        try {
          await db.collection("favoriteCounts").doc(key).set({
            count: firebase.firestore.FieldValue.increment(-1),
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
          }, { merge: true });
          return true;
        } catch (e) {
          console.error("favCounts decrement error:", key, e);
          return null;
        }
      },
      // pairs: [{originalOwner, recipeId}, ...] -> {key: count}. Chunked into
      // groups of 30 (Firestore's max for an "in" query) so this stays a
      // handful of queries no matter how many recipes are on screen.
      fetchMany: async (pairs) => {
        if (!db || !pairs || pairs.length === 0) return {};
        const uniqueKeys = Array.from(new Set(pairs.map((p) => window.favCounts.key(p.originalOwner, p.recipeId))));
        const result = {};
        const chunks = [];
        for (let i = 0; i < uniqueKeys.length; i += 30) chunks.push(uniqueKeys.slice(i, i + 30));
        try {
          await Promise.all(chunks.map(async (chunk) => {
            const snap = await db.collection("favoriteCounts")
              .where(firebase.firestore.FieldPath.documentId(), "in", chunk)
              .get();
            snap.forEach((doc) => { result[doc.id] = doc.data().count || 0; });
          }));
        } catch (e) {
          console.error("favCounts fetchMany error:", e);
        }
        return result;
      }
    };

    // Public username -> email lookup, one small doc per username.
    //
    // Login and signup both need to resolve a typed username BEFORE the user
    // is authenticated (login needs the email to sign in with; signup needs to
    // know if the name is taken). That requirement is the only reason the old
    // rules had to make the whole dm_users blob world-readable - and since
    // that blob holds every user's email, phone and profile picture, one
    // unauthenticated read dumped the entire user base.
    //
    // Splitting the pre-auth lookup into its own collection lets the rules say
    // "get: if true, list: if false": you can resolve one username you already
    // know, but you cannot enumerate them. Nothing here is secret beyond the
    // email tied to a guessed username, and dm_users itself goes auth-only.
    window.usernames = {
      lookup: async (username) => {
        if (!db || !username) return null;
        try {
          const doc = await db.collection("usernames").doc(username.trim().toLowerCase()).get();
          return doc.exists ? doc.data() : null;
        } catch (e) {
          console.error("usernames lookup error:", e);
          throw e;
        }
      },
      // Called after the Firebase account exists, so request.auth.uid is set
      // and the rules can verify the claimer owns the uid they're writing.
      claim: async (username, email, firebaseUid) => {
        if (!db || !username) return null;
        try {
          await db.collection("usernames").doc(username.trim().toLowerCase()).set({
            username: username.trim(),
            email: email,
            uid: firebaseUid
          });
          return true;
        } catch (e) {
          console.error("usernames claim error:", e);
          return null;
        }
      }
    };

    // Per-user profile docs, keyed by Firebase uid.
    //
    // Replaces dm_users: a single Firestore document holding every user's
    // profile as one JSON string. That shape had three separate problems, all
    // of which this fixes:
    //   - a 1 MiB document limit, which capped the whole app's signups;
    //   - read-modify-write with no transaction on every profile change, so
    //     two concurrent writes silently lost one of them;
    //   - a ~1 write/sec limit on that one doc, shared by every user.
    // Keying by uid (not username) also lets the rules enforce ownership with
    // a plain request.auth.uid == uid check.
    window.users = {
      get: async (uid) => {
        if (!db || !uid) return null;
        try {
          const doc = await db.collection("users").doc(uid).get();
          return doc.exists ? doc.data() : null;
        } catch (e) {
          console.error("users get error:", e);
          return null;
        }
      },

      // Targeted merge into one user's own doc. Two users updating their
      // profiles at the same time now touch different documents, so neither
      // can clobber the other.
      upsert: async (uid, fields) => {
        if (!db || !uid) return null;
        try {
          await db.collection("users").doc(uid).set(fields, { merge: true });
          return true;
        } catch (e) {
          console.error("users upsert error:", e);
          return null;
        }
      },

      // Every profile, returned keyed by username to match the shape the app
      // already expects.
      //
      // This is still O(number of users) per call and has to become a real
      // paginated/prefix query before it can serve a large user base - but it
      // reads a queryable collection now rather than parsing one opaque blob,
      // which is the part that has to change first.
      all: async () => {
        if (!db) return {};
        try {
          const snap = await db.collection("users").get();
          const out = {};
          snap.forEach((doc) => {
            const d = doc.data();
            if (d && d.username) out[d.username] = Object.assign({ firebaseUid: doc.id }, d);
          });
          return out;
        } catch (e) {
          console.error("users all error:", e);
          return {};
        }
      }
    };

    // Photo storage.
    //
    // Photos used to be base64 data URIs embedded directly in Firestore docs.
    // That put a ~62KB image inside every recipe document and a ~25KB one
    // inside the single shared dm_users doc - which is what capped signups at
    // roughly a hundred accounts (1 MiB doc limit) and made Explore download
    // every photo of every public user just to render a list.
    //
    // Files are keyed by the owner's Firebase uid rather than their username,
    // so the Storage rules can enforce ownership with a plain
    // request.auth.uid == uid check - no username lookup needed. The doc then
    // stores only the resulting https download URL, which <img src> consumes
    // identically to the old data URIs, so read paths need no changes and old
    // un-migrated photos keep rendering.
    window.photoStore = {
      isDataUrl: (v) => typeof v === "string" && v.indexOf("data:") === 0,
      isStorageUrl: (v) => typeof v === "string" && v.indexOf("https://") === 0,

      // ownerUid defaults to the signed-in user. It's passed explicitly when
      // migrating, so a photo lands under the uid of whoever actually owns it.
      uploadDataUrl: async (dataUrl, pathParts, ownerUid) => {
        if (!storage || !window.photoStore.isDataUrl(dataUrl)) return null;
        const uid = ownerUid || (auth.currentUser && auth.currentUser.uid);
        if (!uid) return null;
        try {
          const path = [pathParts[0], uid].concat(pathParts.slice(1)).join("/");
          const ref = storage.ref(path);
          // uploadString handles the data: prefix and base64 decoding for us.
          await ref.putString(dataUrl, "data_url");
          return await ref.getDownloadURL();
        } catch (e) {
          console.error("photoStore upload error:", e.code || e.message, "path:", pathParts.join("/"));
          return null;
        }
      },

      uploadRecipePhoto: (dataUrl, recipeId, ownerUid) =>
        window.photoStore.uploadDataUrl(dataUrl, ["recipePhotos", String(recipeId) + ".jpg"], ownerUid),

      uploadProfilePic: (dataUrl, ownerUid) =>
        window.photoStore.uploadDataUrl(dataUrl, ["profilePics", "avatar.jpg"], ownerUid)
    };

    const DEFAULT_FIREBASE_CONFIG = {
      apiKey: "AIzaSyA36eS5Dv0WfkU6RZoE9NLWVhf0SacmMFI",
      authDomain: "the-family-table-81b4d.firebaseapp.com",
      projectId: "the-family-table-81b4d",
      storageBucket: "the-family-table-81b4d.firebasestorage.app",
      messagingSenderId: "545124366675",
      appId: "1:545124366675:web:7afb40a8206cba045b09a6"
    };
    
    // Always use the config from the HTML, never from localStorage
    // (caching config caused stale API keys to persist after deploys)
    localStorage.removeItem("firebase_config");
    initFirebase(DEFAULT_FIREBASE_CONFIG);
    console.log("Firebase initialized");
    
    // Verify connection
    setTimeout(function() {
      if (db) {
        console.log("Firebase DB is connected");
      } else {
        console.warn("Firebase not connected - data may not save!");
      }
    }, 1000);

    // Register the service worker for offline app-shell support
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function() {
        navigator.serviceWorker.register("sw.js")
          .then(function(reg) { console.log("Service worker registered:", reg.scope); })
          .catch(function(err) { console.warn("Service worker registration failed:", err); });
      });
    }
  </script>
  
  <script type="text/babel" data-presets="react">
const { useState, useEffect, useCallback, useRef } = React;


const DAYS_FULL = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];

// A stored image is either a legacy base64 data URI or an https Storage URL.
// A profile picture may instead hold a plain emoji, which renders as text, so
// "is this an image?" has to accept both URL forms - testing only for "data:"
// would render a migrated https avatar as literal URL text on the page.
//
// Deliberately distinct from photoStore.isDataUrl, which answers the narrower
// "is this still un-migrated base64?" and must stay data:-only.
function isImageSrc(v){
  return typeof v === "string" && (v.indexOf("data:") === 0 || v.indexOf("https://") === 0);
}

// Simple QR Code generator component
function QRCode({data, size=200, darkColor="#000", lightColor="#fff"}){
  // Simple alphanumeric encoding - converts text to a visual pattern
  var text = (data||"").toUpperCase();
  var gridSize = 21; // QR-like grid
  var cellSize = size/gridSize;
  
  // Generate deterministic pattern from text
  function hashChar(str, i){
    var h=0;
    for(var j=0;j<str.length;j++){
      h=((h<<5)-h)+str.charCodeAt(j)+i;
      h=h&h;
    }
    return h;
  }
  
  var cells=[];
  
  // Finder patterns (corners)
  function addFinderPattern(x,y){
    for(var i=0;i<7;i++){
      for(var j=0;j<7;j++){
        var isBorder=(i===0||i===6||j===0||j===6);
        var isInner=(i>=2&&i<=4&&j>=2&&j<=4);
        if(isBorder||isInner){
          cells.push({x:x+j,y:y+i,dark:true});
        }
      }
    }
  }
  
  addFinderPattern(0,0);
  addFinderPattern(gridSize-7,0);
  addFinderPattern(0,gridSize-7);
  
  // Timing patterns
  for(var i=8;i<gridSize-8;i++){
    if(i%2===0){
      cells.push({x:i,y:6,dark:true});
      cells.push({x:6,y:i,dark:true});
    }
  }
  
  // Data area - encode the text
  var dataPositions=[];
  for(var y=0;y<gridSize;y++){
    for(var x=0;x<gridSize;x++){
      var inFinder=(x<8&&y<8)||(x>=gridSize-8&&y<8)||(x<8&&y>=gridSize-8);
      var inTiming=(x===6||y===6);
      if(!inFinder&&!inTiming){
        dataPositions.push({x:x,y:y});
      }
    }
  }
  
  // Fill data positions based on text hash
  for(var i=0;i<dataPositions.length;i++){
    var pos=dataPositions[i];
    var charIdx=i%text.length;
    var hash=hashChar(text,i);
    if((hash%3)!==0){
      cells.push({x:pos.x,y:pos.y,dark:true});
    }
  }
  
  return React.createElement("svg",{width:size,height:size,viewBox:"0 0 "+size+" "+size,style:{background:lightColor}},
    cells.map(function(cell,idx){
      return React.createElement("rect",{
        key:idx,
        x:cell.x*cellSize,
        y:cell.y*cellSize,
        width:cellSize,
        height:cellSize,
        fill:darkColor
      });
    })
  );
}

function getGCat(item){
  var l=(typeof item==="string"?item:item.name||"").toLowerCase();
  // Build all keyword matches with their categories
  var matches=[];
  for(var c in GCATS){
    GCATS[c].forEach(function(k){
      if(l.includes(k)){
        matches.push({cat:c,keyword:k,len:k.length});
      }
    });
  }
  // Sort by keyword length descending - longer/more specific matches win
  matches.sort(function(a,b){return b.len-a.len});
  // Return the category with the longest matching keyword
  if(matches.length>0)return matches[0].cat;
  return"📦 Other"
}

// Extract a short time estimate from a recipe's time field
// Returns just a clean total/cook duration like "20 min" or "1 hr 30 min"
function shortTime(timeStr){
  if(!timeStr) return "";
  var s = String(timeStr).trim();
  if(!s) return "";
  // Priority 1: explicit Total: X
  var totalMatch = s.match(/total\s*:?\s*([0-9.]+\s*(?:h(?:ours?|rs?)?|min(?:utes?)?|m\b)(?:\s+[0-9.]+\s*(?:min(?:utes?)?|m\b))?)/i);
  if(totalMatch) return cleanDur(totalMatch[1]);
  // Priority 2: explicit Cook: X
  var cookMatch = s.match(/cook\s*:?\s*([0-9.]+\s*(?:h(?:ours?|rs?)?|min(?:utes?)?|m\b)(?:\s+[0-9.]+\s*(?:min(?:utes?)?|m\b))?)/i);
  if(cookMatch) return cleanDur(cookMatch[1]);
  // Priority 3: first duration found in the string
  var anyMatch = s.match(/([0-9.]+\s*(?:h(?:ours?|rs?)?|min(?:utes?)?))/i);
  if(anyMatch) return cleanDur(anyMatch[1]);
  // Fallback: truncate the original
  return s.length > 20 ? s.slice(0,18).trim()+"..." : s;
}
function cleanDur(d){
  // Normalize "hours"/"hour"/"hrs" -> "hr", "minutes"/"min" -> "min"
  return d.replace(/\s*hours?|\s*hrs?/gi," hr").replace(/\s*minutes?/gi," min").replace(/\s+/g," ").trim();
}

// ============================================================================
// RECIPE DATA MODEL
// ============================================================================
// Every recipe has immutable identity fields set once at creation:
//   recipeId          - globally unique, never changes across saves/shares
//   originalOwner     - who first added it to the app
//   originalCreatedAt - when it was first added
//   sourceMethod      - "manual" | "scan" | "url"
//   sourceUrl         - the URL (only for url imports)
//
// Plus per-copy fields that change per save:
//   id       - per-copy storage id
//   savedBy  - who owns this copy (equals originalOwner if it's the original)
//   savedAt  - when this copy was made
// ============================================================================

function genRecipeId(username){
  return (username||"unknown").toLowerCase()+"-"+Date.now()+"-"+Math.random().toString(36).slice(2,7);
}

// Stamp a NEW recipe (first time being added to the app)
// method = "manual" | "scan" | "url"
function stampNewRecipe(recipe, username, method, url){
  var now = Date.now();
  var stamped = Object.assign({}, recipe);
  if(!stamped.recipeId) stamped.recipeId = genRecipeId(username);
  if(!stamped.originalOwner) stamped.originalOwner = username;
  if(!stamped.originalCreatedAt) stamped.originalCreatedAt = now;
  if(!stamped.sourceMethod && method) stamped.sourceMethod = method;
  if(url && !stamped.sourceUrl) stamped.sourceUrl = url;
  stamped.savedBy = username;
  if(!stamped.savedAt) stamped.savedAt = now;
  if(!stamped.id) stamped.id = now;
  return stamped;
}

// Make a COPY of an existing recipe (saving/receiving from another user)
// Preserves ALL immutable fields, updates only per-copy fields
function copyRecipeFor(sourceRecipe, savedByUser, sourceUser){
  var copy = Object.assign({}, sourceRecipe);
  // Preserve immutable fields exactly - if they're missing, backfill from sourceUser
  if(!copy.originalOwner) copy.originalOwner = sourceRecipe.originalOwner || sourceUser || savedByUser;
  if(!copy.recipeId) copy.recipeId = genRecipeId(copy.originalOwner);
  if(!copy.originalCreatedAt) copy.originalCreatedAt = sourceRecipe.createdAt || sourceRecipe.id || Date.now();
  // Update per-copy fields
  copy.id = Date.now();
  copy.savedBy = savedByUser;
  copy.savedAt = Date.now();
  copy.savedFrom = sourceUser;
  // Clean up transient display fields
  delete copy.ownerUsername;
  delete copy.ownerProfilePic;
  return copy;
}

// Migrate a recipe from the OLD schema to the new one
// storageUser = username whose storage this recipe is loaded from
// Returns { recipe, changed } where changed = true if migration modified fields
function migrateRecipe(recipe, storageUser){
  var changed = false;
  var r = Object.assign({}, recipe);
  
  // Determine what this recipe IS: original or copy?
  // Signals it is a COPY:
  //   - savedFrom is set
  //   - credit contains "From @" or "Shared by @"
  //   - originalOwner is set and differs from storageUser
  var creditStr = (r.credit || "");
  var isSavedFromField = !!r.savedFrom;
  var isCreditCopy = /\b(From|Shared by)\s+@/i.test(creditStr);
  var isOwnerMismatch = !!(r.originalOwner && r.originalOwner.toLowerCase() !== (storageUser||"").toLowerCase());
  var isCopy = isSavedFromField || isCreditCopy || isOwnerMismatch;
  
  // Determine the TRUE original owner - ONLY from strong signals, never guess
  var trueOwner = null;
  if(r.originalOwner){
    trueOwner = r.originalOwner;
  } else if(r.addedBy){
    trueOwner = r.addedBy;
  } else if(r.savedFrom){
    trueOwner = r.savedFrom;
  } else if(isCreditCopy){
    var m = creditStr.match(/(?:From|Shared by)\s+@(\w+)/i);
    if(m) trueOwner = m[1];
  }
  // If no signals at all, leave trueOwner as null - don't guess
  
  if(!r.originalOwner && trueOwner){
    r.originalOwner = trueOwner;
    changed = true;
  }
  if(!r.recipeId && trueOwner){
    r.recipeId = genRecipeId(trueOwner);
    changed = true;
  }
  if(!r.originalCreatedAt){
    r.originalCreatedAt = r.createdAt || r.id || Date.now();
    changed = true;
  }
  if(!r.savedBy){
    r.savedBy = storageUser;
    changed = true;
  }
  if(!r.savedAt){
    r.savedAt = r.createdAt || Date.now();
    changed = true;
  }
  if(isCopy && !r.savedFrom && trueOwner && trueOwner.toLowerCase() !== (storageUser||"").toLowerCase()){
    r.savedFrom = trueOwner;
    changed = true;
  }

  // Repair ingredients imported before parseIng stripped leading list-bullet
  // characters: qty/unit ended up empty and the whole line (bullet
  // included) landed in `name` - which silently breaks recipe scaling since
  // there's no quantity to scale. Re-parsing the raw name (now bullet-
  // aware) heals these in place without requiring a re-import.
  if(Array.isArray(r.ingredients)){
    var repairedAny = false;
    var repairedIngredients = r.ingredients.map(function(ing){
      if(!ing || typeof ing !== "object") return ing;
      if((ing.qty||"").trim()) return ing;
      var name = ing.name || "";
      if(!/^[•●▪▸]/.test(name)) return ing;
      var reparsed = parseIng(name);
      if(!reparsed.qty && !reparsed.unit) return ing;
      repairedAny = true;
      return reparsed;
    });
    if(repairedAny){
      r.ingredients = repairedIngredients;
      changed = true;
    }
  }

  return { recipe: r, changed: changed };
}

function parseQtyNum(str){
  // AI-imported recipes sometimes return qty as a JSON number (e.g. 2)
  // instead of a string ("2") despite the prompt asking for a string -
  // coerce defensively so scaling doesn't crash on those recipes.
  str=(str==null?"":String(str)).trim();

  var total=0,matchedAny=false;
  // Pull off a trailing/standalone unicode fraction char first

function formatQtyNum(num){

  denoms.forEach(function(d){

    var err=Math.abs(frac-n/d);

  // to sum, just keep one row, same as the old dedup-by-name behavior.
  if(!(aQty||"").trim()&&!(bQty||"").trim())return{qty:aQty,unit:aUnit};

// Formats an ingredient at a given scale multiplier (1 = unscaled), reusing
// the same parse/format machinery as grocery consolidation. Falls back to
// the plain unscaled display for ingredients with no parseable quantity
// (e.g. "salt to taste") rather than showing a broken/blank amount.
function formatScaledIng(ing,scale){
  if(typeof ing==="string")ing=parseIng(ing);
  if(!scale||scale===1)return formatIng(ing);
  var num=parseQtyNum(ing.qty);
  if(num===null)return formatIng(ing);
  var q=formatQtyNum(num*scale);

// Splits an instructions blob into individual steps, tolerating whatever
// numbering/bullet style the source used (AI-generated "1. 2. 3.", manual
// bullets, "Step 1:", inconsistent spacing, or none at all) so it can be
// re-rendered with clean, consistent numbering no matter how it was typed.
function parseInstructionSteps(text){
  if(!text)return[];
  var raw=String(text).trim();
  if(!raw)return[];
  var STEP_MARKER=/^(?:step\s*)?\d+\s*[.):]\s*|^[•●▪▸*]\s*|^-\s+/i;
  var lines=raw.split(/\r?\n+/).map(function(l){return l.trim();}).filter(Boolean);

  // newlines ("1. Preheat oven. 2. Mix batter.") - if a numbered marker
  // repeats within a single chunk, split on it instead.

function AuthScreen(p){
  var [mode,setMode]=useState("login"); // login, signup, forgot
  var [username,setUsername]=useState("");
  var [email,setEmail]=useState("");
  var [password,setPassword]=useState("");

  var [phone,setPhone]=useState("");
  var [error,setError]=useState("");
  var [success,setSuccess]=useState("");
  var [loading,setLoading]=useState(false);

  function validateEmail(e){
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e);
  }
  
  function validatePhone(p){
    if(!p)return true; // Optional
    var cleaned=p.replace(/\D/g,"");
    return cleaned.length>=10;
  }
  
  function formatPhone(p){
    var cleaned=p.replace(/\D/g,"");
    if(cleaned.length===0)return "";
    if(cleaned.length<=3)return cleaned;
    if(cleaned.length<=6)return cleaned.slice(0,3)+"-"+cleaned.slice(3);
    return cleaned.slice(0,3)+"-"+cleaned.slice(3,6)+"-"+cleaned.slice(6,10);
  }

  function handleSubmit(){
    setError("");
    setSuccess("");
    
    if(mode==="signup"){
      if(!username.trim()||!email.trim()||!password.trim()){setError("Please fill in all required fields");return}
      if(username.trim().length<3){setError("Username must be at least 3 characters");return}
      if(!/^[a-zA-Z0-9_]+$/.test(username.trim())){setError("Username can only contain letters, numbers, and underscores");return}
      if(!validateEmail(email.trim())){setError("Please enter a valid email address");return}
      if(!validatePhone(phone)){setError("Please enter a valid phone number");return}
      if(password.length<6){setError("Password must be at least 6 characters");return}
      if(password!==confirm){setError("Passwords don't match");return}
      
      var uid=username.trim();
      var userEmail=email.trim().toLowerCase();
      var userPhone=phone.replace(/\D/g,"");
      
      setLoading(true);
      
      // Check whether the username is taken by getting that one username's
      // doc, rather than downloading every user and scanning the keys.
      window.usernames.lookup(uid).then(function(existing){
        if(existing){
          setLoading(false);
          setError("Username '"+uid+"' is already taken. Please choose another.");
          return Promise.reject("username_taken");
        }

        // Create Firebase Auth account
        return auth.createUserWithEmailAndPassword(userEmail, password);
      }).then(function(userCredential){
        if(!userCredential)return;
        
        // Send verification email
        return userCredential.user.sendEmailVerification().then(function(){
          return userCredential;
        });
      }).then(function(userCredential){
        if(!userCredential)return;
        
        // Claim the username first: it's what login resolves against, so a
        // profile without it would be unreachable. Runs after the Firebase
        // account exists so the rules can check the uid being claimed is ours.
        return window.usernames.claim(uid,userEmail,userCredential.user.uid).then(function(){
          // Write this account's own profile doc. Previously this read the
          // single dm_users document, added a key, and wrote the whole thing
          // back - which raced with any other concurrent signup and would have
          // started failing outright once that doc reached 1 MiB.
          return window.users.upsert(userCredential.user.uid,{
            username:uid,
            usernameLower:uid.toLowerCase(),
            email:userEmail,
            phone:userPhone||null,
            firebaseUid:userCredential.user.uid,
            created:Date.now(),
            emailVerified:false
          });
        }).then(function(){
          setLoading(false);
          setSuccess("Account created! Please check your email to verify your account.");
          // Auto-login after signup
          setTimeout(function(){p.onLogin(uid)},2000);
        });
      }).catch(function(e){
        setLoading(false);
        if(e==="username_taken")return;
        if(e.code==="auth/email-already-in-use"){
          setError("An account with this email already exists.");
        }else if(e.code==="auth/weak-password"){
          setError("Password is too weak. Please use a stronger password.");
        }else if(e.code==="auth/invalid-email"){
          setError("Invalid email address.");
        }else{
          setError("Error creating account: "+(e.message||"Please try again"));
        }
      });
      
    }else if(mode==="login"){
      if(!username.trim()||!password.trim()){setError("Please fill in all fields");return}
      
      var typedUid=username.trim();
      setLoading(true);
      
      // Resolve just this one username to its email, rather than reading the
      // whole user list. Errors here are deliberately generic: the old copy
      // ("not found in user list of N accounts. Available: ...") printed other
      // people's usernames to anyone who typed a wrong one.
      window.usernames.lookup(typedUid).then(function(rec){
        if(!rec||!rec.email){
          setLoading(false);
          setError("Incorrect username or password.");
          return Promise.reject("user_not_found");
        }
        // Preserve the canonical casing the account was created with
        var uid=rec.username||typedUid;
        return auth.signInWithEmailAndPassword(rec.email, password).then(function(){
          return {uid:uid, migrated:false};
        });
      }).then(function(result){
        if(result && result.uid){
          setLoading(false);
          if(result.migrated){
            setSuccess("Account migrated! Logging in...");
            setTimeout(function(){p.onLogin(result.uid)},1000);
          }else{
            p.onLogin(result.uid);
          }
        }
      }).catch(function(e){
        setLoading(false);
        if(e==="no_users"||e==="user_not_found"||e==="wrong_password"||e==="migration_failed")return;
        if(e.code==="auth/wrong-password"||e.code==="auth/invalid-credential"){
          setError("Incorrect password. Forgot your password?");
        }else if(e.code==="auth/user-not-found"){
          setError("User not found. Check your username or sign up.");
        }else if(e.code==="auth/too-many-requests"){
          setError("Too many failed attempts. Please try again later.");
        }else{
          setError("Login failed: "+(e.message||"Please try again"));
        }
      });
      
    }else if(mode==="forgot"){
      if(!email.trim()){setError("Please enter your email address");return}
      if(!validateEmail(email.trim())){setError("Please enter a valid email address");return}
      
      var userEmail=email.trim().toLowerCase();
      setLoading(true);
      
      // Send password reset email via Firebase
      auth.sendPasswordResetEmail(userEmail).then(function(){
        setLoading(false);
        setSuccess("Password reset email sent! Check your inbox (and spam folder).");
      }).catch(function(e){
        setLoading(false);
        if(e.code==="auth/user-not-found"){
          setError("No account found with this email address.");
        }else{
          setError("Error sending reset email: "+(e.message||"Please try again"));
        }
      });
    }
  }

      React.createElement("div",{style:{fontSize:13,opacity:.5,marginTop:6}},titles[mode])
    ),

  // Generate grocery list from current week's meals
  // Items to exclude from grocery list (common pantry staples everyone has)
  var GROCERY_EXCLUDE = ["water","tap water","cold water","warm water","hot water","boiling water","ice water"];

  // Grocery items don't need recipe prep instructions - "celery, diced" and
  // "celery, chopped" are both just "celery" on a shopping list, and merging
  // on the cleaned name lets those two recipes' celery consolidate together.
  var GROCERY_PREP_WORD=/^(diced|minced|chopped|sliced|shredded|grated|crushed|julienned|cubed|peeled|seeded|deveined|halved|quartered|trimmed|rinsed|drained|softened|melted|packed|divided|separated|cored|stemmed|zested|juiced|toasted|beaten|whisked|smashed|pitted|browned|cooled|warmed|chilled|thawed|cooked|sifted|boneless|skinless|deboned|unpeeled|freshly|lightly|gently|evenly|well|extra|very|fine|coarse|half|quarter|third|and|into|to|at|the|small|large|thin|thinly|finely|roughly|coarsely|pieces|piece|cubes|cube|cut|size|sized|bite|wedges|wedge|strips|strip|chunks|chunk|room|temp|temperature)$/i;
  // Matches size tokens like "1-inch", "2-inches", "1/2-inch", "inch" on their own
  function isNumericSizeToken(w){
    return /^[\d.\/]*-?(inch(es)?|in|cm|mm|centimeters?)$/i.test(w);
  }
  function isGroceryPrepWord(w){
    if(!w)return false;
    if(GROCERY_PREP_WORD.test(w))return true;
    if(isNumericSizeToken(w))return true;
    if(w.indexOf("-")!==-1){
      // Hyphenated compound like "bite-sized" or "half-inch" - every part must qualify
      var parts=w.split("-").filter(Boolean);
      return parts.length>1 && parts.every(function(p){return GROCERY_PREP_WORD.test(p)||isNumericSizeToken(p)||/^\d+$/.test(p)});
    }
    return false;
  }
  function isGroceryPrepClause(tail){
    if(!tail)return false;
    var words=tail.replace(/\.+$/,"").split(/\s+/).filter(Boolean);
    if(!words.length)return false;
    return words.every(isGroceryPrepWord);
  }
  function cleanGroceryItemName(rawName){
    var name=(rawName||"").trim();
    if(!name)return name;
    // Strip a standalone "(optional)" tag anywhere in the name
    name=name.replace(/\s*\(\s*optional\s*\)\s*/gi," ").trim();
    // Trailing "for serving/garnish/..." doesn't need a comma to strip
    name=name.replace(/\s+for\s+(serving|garnish(?:ing)?|topping|frying|greasing|dusting|drizzling|brushing|dipping)\s*$/i,"");
    // "to taste" / "as needed" are seasoning instructions, not shopping items -
    // strip them whether they lead ("to taste, black pepper") or trail
    // ("black pepper, to taste" / "black pepper to taste").
    name=name.replace(/^(to\s+taste|as\s+needed)\s*,?\s*/i,"").replace(/\s*,?\s*(to\s+taste|as\s+needed)\s*$/i,"");
    // Strip a trailing comma-separated prep clause, e.g. "celery, diced" -> "celery".
    // Runs last so the phrase-strips above have already cleared out anything
    // that would otherwise make an all-prep-word tail check fail.
    var commaIdx=name.indexOf(",");
    if(commaIdx!==-1){
      var head=name.slice(0,commaIdx).trim();
      var tail=name.slice(commaIdx+1).trim();
      if(head&&isGroceryPrepClause(tail))name=head;
    }
    return name.trim();
  }
  // "Salt and pepper" (with or without "to taste") is shorthand for two
  // separate items - a shopper needs to grab both, not look for one product
  // called "salt and pepper".
  function splitGroceryItemNames(name){
    var n=(name||"").trim();
    var pepperDesc="((?:freshly )?(?:cracked|ground)\\s+)?(black|white)?\\s*pepper";
    var saltPepper=n.match(new RegExp("^salt\\s*(?:and|&|\\/|,)\\s*"+pepperDesc+"$","i"));
    if(saltPepper)return["salt",(saltPepper[2]?saltPepper[2]+" ":"")+"pepper"];
    var pepperSalt=n.match(new RegExp("^"+pepperDesc+"\\s*(?:and|&|\\/|,)\\s*salt$","i"));
    if(pepperSalt)return[(pepperSalt[2]?pepperSalt[2]+" ":"")+"pepper","salt"];
    return[n];
  }
  // "Ground black pepper", "freshly cracked black pepper", "cracked pepper",
  // etc. are all the same product to a shopper - "cracked"/"ground"/"freshly"
  // describe how it's prepped at the table, not a different item to buy. Only
  // pepper is handled specially (not folded into GROCERY_PREP_WORD) because
  // "ground" isn't a prep word everywhere - "ground beef"/"ground cinnamon"
  // are genuinely distinct products, so this stays anchored to whole-string
  // pepper phrasing rather than stripping "ground" from any ingredient.
  function normalizeGroceryPepperName(name){
    var m=(name||"").trim().match(/^(?:freshly\s+)?(?:cracked|ground)?\s*(black|white)?\s*pepper$/i);
    if(!m)return name;
    return m[1]?m[1].toLowerCase()+" pepper":"pepper";
  }
  // Some ingredients are functionally interchangeable for shopping purposes -
  // merge them under one name so they don't show up as separate list items.
  // Deliberately excludes anything where the "synonym" might actually be a
  // different product a recipe author chose on purpose - e.g. onion varieties
  // (yellow/white/sweet are genuinely different) and cilantro/coriander (in
  // US recipes "coriander" often means the dried seed, not the fresh leaf).
  var GROCERY_SYNONYMS={
    "chicken stock":"chicken broth","beef stock":"beef broth","vegetable stock":"vegetable broth",
    "green onions":"scallions",
    "corn starch":"cornstarch",
    "garbanzo beans":"chickpeas",
    "half-and-half":"half and half",
    "confectioners sugar":"powdered sugar","confectioners' sugar":"powdered sugar","icing sugar":"powdered sugar",
    "flour":"all-purpose flour","ap flour":"all-purpose flour",
    "granulated sugar":"sugar",
    "heavy whipping cream":"heavy cream",
    "parmesan cheese":"parmesan"
  };
  function grocerySynonymKey(nameLower){
    return GROCERY_SYNONYMS[nameLower]||nameLower;
  }

  function generateFromWeeks(weekStartDates, mode){
    // mode: "replace" (default) starts fresh, "append" adds to existing list
    mode = mode || "replace";
    var items = mode==="append" ? generatedItems.slice() : [];
    var seenNames = {}; // name -> array of item refs ("variants") that share this name
    // Seed with existing items so regenerating can still merge into them
    items.forEach(function(it){
      var n=grocerySynonymKey((it.name||"").trim().toLowerCase());
      if(!n)return;
      if(!seenNames[n])seenNames[n]=[];
      seenNames[n].push(it);
    });
    // Find the next available index for new gen-X ids
    var idx = 0;
    items.forEach(function(it){
      var m = (it.id||"").match(/^gen-(\d+)$/);
      if(m){ var n=parseInt(m[1]); if(n>=idx) idx=n+1; }
    });
    var weekLabels=[];
    weekStartDates.forEach(function(ws){
      var dates=weekDatesOf(ws);
      var wl=dates[0].toLocaleDateString("en-US",{month:"short",day:"numeric"})+" – "+dates[6].toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
      weekLabels.push(wl);
      dates.forEach(function(d){
        var v=p.meals[dk(d)];
        if(!v)return;
        var list=Array.isArray(v)?v:[v];
        list.forEach(function(m){
          if(m&&m.ingredients){
            m.ingredients.forEach(function(g){
              var ing=typeof g==="string"?parseIng(g):g;
              var cleanedName=cleanGroceryItemName(ing.name||"");
              // "Salt and pepper" is shorthand for two items, not one line
              var itemNames=splitGroceryItemNames(cleanedName).map(normalizeGroceryPepperName);
              itemNames.forEach(function(itemName){
                var name=grocerySynonymKey(itemName.trim().toLowerCase());
                if(GROCERY_EXCLUDE.some(function(ex){return name===ex||name.replace(/\s+/g," ")===ex})) return;
                // Try to merge into an existing variant of this ingredient name
                var variants=seenNames[name];
                var merged=false;
                if(variants){
                  for(var vi=0;vi<variants.length;vi++){
                    var v=variants[vi];
                    var mergeResult=tryMergeQty(v.qty,v.unit,ing.qty||"",ing.unit||"");
                    if(mergeResult){
                      v.qty=mergeResult.qty;
                      v.unit=mergeResult.unit;
                      merged=true;
                      break;
                    }
                  }
                }
                if(!merged){
                  var newItem={id:"gen-"+idx,name:itemName||ing.name||"",qty:ing.qty||"",unit:ing.unit||""};
                  items.push(newItem);
                  if(!seenNames[name])seenNames[name]=[];
                  seenNames[name].push(newItem);
                  idx++;
                }
              });
            });
          }
        });
      });
    });
    var newWeeksLabel = weekLabels.length===1 ? weekLabels[0] : weekLabels.length+" weeks ("+weekLabels[0].split(" – ")[0]+" – "+weekLabels[weekLabels.length-1].split(" – ")[1]+")";
    var combinedLabel = (mode==="append" && generatedWeekLabel) ? (generatedWeekLabel + " + " + newWeeksLabel) : newWeeksLabel;
    setGeneratedItems(items);
    setGeneratedWeekLabel(combinedLabel);
    if(mode==="replace"){
      // Clear checked status for old generated items
      var newChecked={};
      Object.keys(checked).forEach(function(k){
        if(!k.startsWith("gen-")){newChecked[k]=checked[k]}
      });
      setChecked(newChecked);
      window.storage.set("dm_gcheck_"+p.userId,JSON.stringify(newChecked),true).catch(function(){});
      // Clear hidden for old generated items
      var newHidden={};
      Object.keys(hiddenItems).forEach(function(k){
        if(!k.startsWith("gen-")){newHidden[k]=hiddenItems[k]}
      });
      setHiddenItems(newHidden);
      // Clear item-specific store overrides (so category defaults apply to new list)
      p.setItemStore&&p.setItemStore("__clear_all__",null);
    }
    // Save generated items
    window.storage.set("dm_generated_"+p.userId,JSON.stringify({items:items,weekLabel:combinedLabel}),true).catch(function(){});
    return items.length - (mode==="append" ? (generatedItems.length) : 0);
  }

  // Import grocery list from photo or text
  function parseGroceryText(text){
    // Normalize text: handle different line endings, tabs
    text = text.replace(/\r\n/g, "\n").replace(/\r/g, "\n").replace(/\t/g, " ");
    
    var lines=text.split(/\n+/);
    var items=[];
    
    lines.forEach(function(line){
      line=line.trim();
      if(!line||line.length<2)return;
      
      // Skip header-like lines (all caps, ends with colon, etc.)
      if(/^[A-Z\s]+:?$/.test(line) && line.length < 30) return;
      if(/^(grocery|groceries|shopping|list|items|notes|reminders):?$/i.test(line)) return;
      
      // Remove common list prefixes: bullets, dashes, checkboxes, numbers
      var cleaned = line.replace(/^[\s\-\*\[\]]+/, "").trim();
      // Remove leading numbers like "1." "1)" "1:"
      cleaned = cleaned.replace(/^\d+[\.\)\:]\s*/, "").trim();
      // Remove checkbox-style characters at start
      cleaned = cleaned.replace(/^[^\w\d]+/, "").trim();
      
      if(!cleaned || cleaned.length < 2) return;
      
      // Try to parse quantity at start: "2 lbs chicken" or "1/2 cup flour"
      var match = cleaned.match(/^([\d\/\.]+)\s*(oz|lb|lbs|kg|g|cups?|tbsp|tsp|gal|gallons?|liters?|l|ml|dozen|doz|pack|packs|ct|count|pcs?|pieces?|bunch|bunches|head|heads|bag|bags|box|boxes|can|cans|jar|jars|bottle|bottles)?\s+(.+)$/i);
      if(match && match[3]){
        items.push({name:match[3].trim(),qty:match[1],unit:(match[2]||"").toLowerCase()});
        return;
      }
      
      // Try quantity in parentheses at end: "Eggs (1 dozen)" or "Chicken (2 lbs)"
      var match2 = cleaned.match(/^(.+?)\s*\((\d+\.?\d*)\s*(oz|lb|lbs|kg|g|cups?|tbsp|tsp|dozen|doz|pack|packs|ct|count|pcs?|pieces?)?\)$/i);
      if(match2){
        items.push({name:match2[1].trim(),qty:match2[2],unit:(match2[3]||"").toLowerCase()});
        return;
      }
      
      // Try quantity after dash/colon: "Chicken breast - 2 lbs" or "Milk: 1 gal"
      var match3 = cleaned.match(/^(.+?)\s*[-–:x]\s*(\d+\.?\d*)\s*(oz|lb|lbs|kg|g|cups?|tbsp|tsp|gal|gallons?|liters?|l|ml|dozen|doz|pack|packs|ct|count|pcs?|pieces?)?$/i);
      if(match3){
        items.push({name:match3[1].trim(),qty:match3[2],unit:(match3[3]||"").toLowerCase()});
        return;
      }
      
      // Try "Nx item" format: "2x Avocados" or "3x Bananas"
      var match4 = cleaned.match(/^(\d+)\s*x\s+(.+)$/i);
      if(match4){
        items.push({name:match4[2].trim(),qty:match4[1],unit:"ct"});
        return;
      }
      
      // Just the item name
      items.push({name:cleaned,qty:"",unit:""});
    });
    
    return items;
  }

    var followingNames=following.map(function(f){return typeof f==="string"?f:f.username});
    var followerNames=followers.map(function(f){return typeof f==="string"?f:f.username});
    
    // Get users who have shared recipes with me (from inbox)
    var sharedWithMe={};
    userInbox.forEach(function(item){
      if(item.fromUser&&item.fromUser!==userId){
        sharedWithMe[item.fromUser]=(sharedWithMe[item.fromUser]||0)+1;

      var score=0;
      var userInfo=allUsers[username];
      
      // Priority 1: Users who interacted with me (shared recipes)
      if(sharedWithMe[username]){
        score+=50*sharedWithMe[username];

      // Priority 2: Users who follow me but I don't follow back
      if(followerNames.some(function(f){return f.toLowerCase()===username.toLowerCase()})){

      // Only add if there's some reason to suggest

        suggestions.push({
          username:username,
          profilePic:userInfo?userInfo.profilePic:null,
          score:score

  // Search for users

    if(!allUsers||Object.keys(allUsers).length===0){
      console.log("searchFriends: No users loaded, allUsers=",allUsers);

    }

      return;
    }
    setFriendSearching(true);
    var q=query.trim().toLowerCase().replace(/^@/,"");
    var followingNames=following.map(function(f){return typeof f==="string"?f:f.username});
    var myUsernameLower=userId.toLowerCase();
    
    console.log("searchFriends: query=",q,"userId=",userId,"allUsers keys=",Object.keys(allUsers));
    
    var results=[];
    Object.keys(allUsers).forEach(function(username){
      // Skip self - check both exact and lowercase
      if(username===userId||username.toLowerCase()===myUsernameLower)return;
      if(username==="guest")return;
      if(username.toLowerCase().includes(q)){
        var isFollowing=followingNames.some(function(f){return f===username||f.toLowerCase()===username.toLowerCase()});
        var isPending=myPendingRequests.includes(username);
        results.push({
          username:username,
          profilePic:allUsers[username]?allUsers[username].profilePic:null,
          isFollowing:isFollowing,
          isPending:isPending
        });
      }

    // Sort exact matches first
    results.sort(function(a,b){
      if(a.username.toLowerCase()===q)return -1;
      if(b.username.toLowerCase()===q)return 1;
      return a.username.localeCompare(b.username);
    });
    
    setFriendSearchResults(results.slice(0,10));
    setFriendSearching(false);
  }

          }).map(function(recipe){

              ownerUsername: displayOwner,
              ownerProfilePic: f.profilePic

          });
          allRecipes=allRecipes.concat(publicRecipes);
        }
      }).catch(function(){});

    Promise.all(promises).then(function(){
      // Filter out re-saved recipes and dedupe by original owner + name
      allRecipes = allRecipes.filter(function(r){
        if(r.savedFrom) return false;
        if(r.originalOwner && r.ownerUsername && r.originalOwner.toLowerCase()!==r.ownerUsername.toLowerCase()) return false;

      // Sort by most recent first
      allRecipes.sort(function(a,b){return (b.id||0)-(a.id||0)});
      setFriendRecipes(allRecipes.slice(0,20)); // Limit to 20
      setLoadingFriendRecipes(false);
    });
  }

  // Send follow request to another user
  // Follow a user (instant, no approval needed)
  function followUser(targetUsername){
    if(!user){setFollowStatus("error:Please sign in first");return}
    var target=targetUsername.trim().replace(/^@/,"");
    if(!target){setFollowStatus("error:Please enter a username");return}
    // Check for self-follow (case-insensitive)
    var targetLower=target.toLowerCase();
    if(targetLower===userId.toLowerCase()){setFollowStatus("error:You can't follow yourself");return}
    if(following.some(function(f){var uname=typeof f==="string"?f:f.username;return uname.toLowerCase()===targetLower})){return} // Already following - no error needed
    // Check if already sent a request
    if(myPendingRequests.some(function(r){return r.toUser.toLowerCase()===targetLower})){setFollowStatus("error:You already sent a request to @"+target);return}
    
    // Check if user exists first
    window.users.all().then(function(users){
      if(!users){
        setFollowStatus("error:No users found");
        return;
      }

      // Find user (case-insensitive lookup)
      var foundUser=null;
      if(users[target]){
        foundUser=target;
      }else{
        Object.keys(users).forEach(function(u){
          if(u.toLowerCase()===targetLower)foundUser=u;
        });
      }
      
      if(!foundUser){
        setFollowStatus("error:User @"+target+" not found");
        return;
      }
      
      // Double-check not following self (in case foundUser resolves to current user)
      if(foundUser.toLowerCase()===userId.toLowerCase()){
        setFollowStatus("error:You can't follow yourself");
        return;
      }
      
      // Check if target user is private
      var targetIsPrivate=users[foundUser].isPrivate;
      
      if(targetIsPrivate){
        // Send follow request instead of directly following
        sendFollowRequest(foundUser, users[foundUser].profilePic);
      }else{
        // Public profile - follow directly
        completeFollow(foundUser, users[foundUser].profilePic);
      }
    }).catch(function(){
      setFollowStatus("error:Failed to follow user");
    });
  }
  
  // Send a follow request to a private account
  function sendFollowRequest(targetUser, targetProfilePic){
    var requestId=Date.now();
    var request={
      id:requestId,
      fromUser:userId,
      fromProfilePic:userProfilePic,
      toUser:targetUser,
      requestedAt:Date.now()
    };
    
    // Add to target's follow requests
    var requestKey="dm_followrequests_"+targetUser.toLowerCase();
    window.storage.get(requestKey,true).catch(function(){return null}).then(function(r){
      var theirRequests=r&&r.value?JSON.parse(r.value):[];
      // Don't add duplicate
      if(!theirRequests.some(function(req){return req.fromUser.toLowerCase()===userId.toLowerCase()})){
        theirRequests.push(request);
        return window.storage.set(requestKey,JSON.stringify(theirRequests),true);
      }
    }).then(function(){
      // Add to my pending requests
      var myRequest={id:requestId,toUser:targetUser,toProfilePic:targetProfilePic,requestedAt:Date.now()};
      var newPending=myPendingRequests.concat([myRequest]);
      setMyPendingRequests(newPending);
      window.storage.set("dm_mypending_"+userId.toLowerCase(),JSON.stringify(newPending),true);
      
      setFollowStatus("success:Follow request sent to @"+targetUser);
      setFollowRequestUser("");
      
      // Update search results
      setFriendSearchResults(function(prev){
        return prev.map(function(r){
          if(r.username===targetUser){
            return Object.assign({},r,{isPending:true});
          }
          return r;
        });
      });
      
      setTimeout(function(){setFollowStatus("")},3000);
    }).catch(function(){
      setFollowStatus("error:Failed to send follow request");
    });
  }
  
  // Complete the follow (for public accounts or after approval)
  function completeFollow(foundUser, profilePic){
    // Add to my following list
    var newFollowingEntry={
      username:foundUser,
      profilePic:profilePic||null,
      followedAt:Date.now()
    };
    var newFollowing=following.concat([newFollowingEntry]);
    setFollowing(newFollowing);
    window.storage.set("dm_following_"+userId,JSON.stringify(newFollowing),true).catch(function(){});
    
    // Add me to their followers list
    var followerKey="dm_followers_"+foundUser.toLowerCase();
    window.storage.get(followerKey,true).then(function(r){
      var theirFollowers=r&&r.value?JSON.parse(r.value):[];
      if(!theirFollowers.some(function(f){return f.username.toLowerCase()===userId.toLowerCase()})){
        theirFollowers.push({
          username:userId,
          profilePic:userProfilePic,
          followedAt:Date.now()
        });
        window.storage.set(followerKey,JSON.stringify(theirFollowers),true);
      }
    }).catch(function(){
      // Key doesn't exist yet, create it
      var theirFollowers=[{
        username:userId,
        profilePic:userProfilePic,
        followedAt:Date.now()
      }];
      window.storage.set(followerKey,JSON.stringify(theirFollowers),true);
    });
    
    setFollowStatus("success:You are now following @"+foundUser+"!");
    setFollowRequestUser("");
    
    // Update search results
    setFriendSearchResults(function(prev){
      return prev.map(function(r){
        if(r.username===foundUser){
          return Object.assign({},r,{isFollowing:true,isPending:false});
        }
        return r;
      });
    });
    
    // Remove from suggested friends
    setSuggestedFriends(function(prev){
      return prev.filter(function(s){return s.username!==foundUser});
    });
    
    // Remove from my pending requests if it was there
    setMyPendingRequests(function(prev){
      var filtered=prev.filter(function(r){return r.toUser.toLowerCase()!==foundUser.toLowerCase()});
      window.storage.set("dm_mypending_"+userId.toLowerCase(),JSON.stringify(filtered),true);
      return filtered;
    });
    
    setTimeout(function(){setFollowStatus("")},3000);
  }
  
  // Accept a follow request
  function acceptFollowRequest(request){
    // Check if already a follower (prevent duplicates)
    if(followers.some(function(f){return f.username===request.fromUser})){
      // Already a follower, just remove the request
      var newRequests=followRequests.filter(function(req){return req.id!==request.id});
      setFollowRequests(newRequests);
      window.storage.set("dm_followrequests_"+userId,JSON.stringify(newRequests),true).catch(function(){});
      return;
    }
    
    // Add to my followers
    var newFollower={
      username:request.fromUser,
      profilePic:request.fromProfilePic,
      followedAt:Date.now()
    };
    var newFollowers=followers.concat([newFollower]);
    setFollowers(newFollowers);
    window.storage.set("dm_followers_"+userId,JSON.stringify(newFollowers),true).catch(function(){});
    
    // Add me to their following list - try both exact and lowercase keys
    var fromUser=request.fromUser;
    var fromUserLower=fromUser.toLowerCase();
    
    // Try to get their existing following list
    window.storage.get("dm_following_"+fromUser,true).catch(function(){return null}).then(function(r){
      if(r&&r.value){
        return {key:fromUser,data:JSON.parse(r.value)};
      }
      // Try lowercase
      return window.storage.get("dm_following_"+fromUserLower,true).catch(function(){return null}).then(function(r2){
        if(r2&&r2.value){
          return {key:fromUserLower,data:JSON.parse(r2.value)};
        }
        // No existing data, use the fromUser key
        return {key:fromUser,data:[]};
      });
    }).then(function(result){
      var theirFollowing=result.data;
      var storageKey=result.key;
      // Only add if not already following
      if(!theirFollowing.some(function(f){return f.username===userId||f.username===userId.toLowerCase()})){
        theirFollowing.push({
          username:userId,
          profilePic:userProfilePic,
          followedAt:Date.now()
        });
        return window.storage.set("dm_following_"+storageKey,JSON.stringify(theirFollowing),true);
      }
    }).then(function(){
      // Remove from their pending requests - try both keys
      return window.storage.get("dm_mypending_"+fromUser,true).catch(function(){return null}).then(function(r){
        if(r&&r.value){
          return {key:fromUser,data:JSON.parse(r.value)};
        }
        return window.storage.get("dm_mypending_"+fromUserLower,true).catch(function(){return null}).then(function(r2){
          if(r2&&r2.value){
            return {key:fromUserLower,data:JSON.parse(r2.value)};
          }
          return null;
        });
      });
    }).then(function(result){
      if(result){
        var theirPending=result.data.filter(function(u){return u!==userId&&u!==userId.toLowerCase()});
        return window.storage.set("dm_mypending_"+result.key,JSON.stringify(theirPending),true);
      }
    }).catch(function(){});
    
    // Remove from my follow requests
    var newRequests=followRequests.filter(function(req){return req.id!==request.id});
    setFollowRequests(newRequests);
    window.storage.set("dm_followrequests_"+userId,JSON.stringify(newRequests),true).catch(function(){});
    
    // Also check if I had a pending request to them - if so, clear it
    if(myPendingRequests.includes(request.fromUser)){
      var newPending=myPendingRequests.filter(function(u){return u!==request.fromUser});
      setMyPendingRequests(newPending);
      window.storage.set("dm_mypending_"+userId,JSON.stringify(newPending),true).catch(function(){});
    }
  }

  // Share recipe directly to another user
  function shareToUserDirect(recipe,targetUsername){
    var target=targetUsername.trim().replace(/^@/,"");
    if(!target){setShareToStatus("error:Please enter a username");return}
    var targetLower=target.toLowerCase();
    if(targetLower===userId.toLowerCase()){setShareToStatus("error:You can't share to yourself");return}
    
    // Check if user exists
    window.users.all().then(function(users){
      if(!users){setShareToStatus("error:User not found");return}

      // Find user case-insensitively
      var foundUsername=null;
      Object.keys(users).forEach(function(u){
        if(u.toLowerCase()===targetLower){
          foundUsername=u;
        }
      });
      
      if(!foundUsername){setShareToStatus("error:User @"+target+" not found");return}
      
      // Get target user's inbox (use lowercase for storage key)
      return window.storage.get("dm_inbox_"+foundUsername.toLowerCase(),true).catch(function(){return null}).then(function(inboxR){
        var inbox=[];
        try {
          if(inboxR&&inboxR.value){
            inbox=JSON.parse(inboxR.value);
          }
        } catch(e){
          console.error("Failed to parse inbox:",e);
          inbox=[];
        }
        
        // Add recipe to their inbox
        var sharedItem={
          id:Date.now(),
          recipe:recipe,
          fromUser:userId,
          fromProfilePic:userProfilePic,
          sharedAt:Date.now()
        };
        inbox.unshift(sharedItem);
        
        // Keep inbox to max 50 items
        if(inbox.length>50)inbox=inbox.slice(0,50);
        
        console.log("Saving to inbox dm_inbox_"+foundUsername.toLowerCase(), "items:", inbox.length);
        return window.storage.set("dm_inbox_"+foundUsername.toLowerCase(),JSON.stringify(inbox),true);
      }).then(function(result){
        console.log("Inbox save result:", result);
        if(result){
          setShareToStatus("success:Recipe sent to @"+foundUsername+"!");
          setShareToUser("");
        } else {
          setShareToStatus("error:Failed to save. Try again.");
        }
      });
    }).catch(function(err){
      console.error("Share error:",err);
      setShareToStatus("error:Failed to share. Try again.");
    });
  }

  // `pic` is either an emoji (stored as-is) or an image data URI. Images go to
  // Storage and only the URL is kept: dm_users is a single shared document, so
  // a ~25KB avatar inlined here was consuming ~9.6KB per user of a 1 MiB
  // budget and capping the whole app at roughly a hundred accounts.
  function saveProfilePic(pic){
    var uploading = window.photoStore.isDataUrl(pic)
      ? window.photoStore.uploadProfilePic(pic)
      : Promise.resolve(null);

    uploading.then(function(url){
      // Fall back to inlining if the upload failed, so a Storage problem
      // doesn't block someone setting an avatar.
      var stored = url || pic;
      var uid = firebase.auth().currentUser && firebase.auth().currentUser.uid;
      if(!uid) throw new Error("not signed in");
      // Targeted write to this user's own doc - no read-modify-write of a
      // document shared with every other user.
      return window.users.upsert(uid,{profilePic:stored}).then(function(result){
        if(result){
          setUserProfilePic(stored);
          setProfileSuccess("Profile picture updated!");
          setTimeout(function(){setProfileSuccess("")},2000);
        }
      });
    }).catch(function(){
      setProfileError("Error saving profile picture");
    });
  }
  
  function handleProfilePicUpload(e){
    var f=e.target.files&&e.target.files[0];
    if(!f)return;
    setProfileError("");
    
    var reader=new FileReader();
    reader.onload=function(ev){
      var originalData = ev.target.result;
      
      // Compress profile pics to smaller size (200x200 max, good for avatars)
      var img = new Image();
      img.onload = function() {
        var canvas = document.createElement("canvas");
        var maxSize = 200; // Profile pics don't need to be large
        var width = img.width;
        var height = img.height;
        
        // Make it square (crop to center)
        var size = Math.min(width, height);
        var offsetX = (width - size) / 2;
        var offsetY = (height - size) / 2;
        
        canvas.width = maxSize;
        canvas.height = maxSize;
        var ctx = canvas.getContext("2d");
        
        // Draw cropped and scaled image
        ctx.drawImage(img, offsetX, offsetY, size, size, 0, 0, maxSize, maxSize);
        
        // Compress to JPEG with decent quality
        var compressed = canvas.toDataURL("image/jpeg", 0.7);
        console.log("Profile pic compressed from", originalData.length, "to", compressed.length);
        
        saveProfilePic(compressed);
      };
      img.onerror = function() {
        setProfileError("Failed to process image. Please try another.");
      };
      img.src = originalData;
    };
    reader.onerror = function() {
      setProfileError("Failed to read image. Please try another.");
    };
    reader.readAsDataURL(f);
  }

  function changePassword(){
    setPasswordError("");
    setPasswordSuccess("");
    
    if(!currentPassword.trim()||!newPassword.trim()||!confirmNewPassword.trim()){
      setPasswordError("Please fill in all fields");
      return;
    }
    if(newPassword.length<6){
      setPasswordError("New password must be at least 6 characters");
      return;
    }
    if(newPassword!==confirmNewPassword){
      setPasswordError("New passwords don't match");
      return;
    }
    
    // Reauthenticate with the current password. The signed-in Firebase user
    // already carries the email, so this needs no Firestore read at all -
    // it previously downloaded every user's profile just to find its own.
    Promise.resolve().then(function(){
      var currentUser = auth.currentUser;
      if(!currentUser || !currentUser.email){
        setPasswordError("Account not found");
        return Promise.reject("no_email");
      }
      var credential=firebase.auth.EmailAuthProvider.credential(currentUser.email, currentPassword);
      return currentUser.reauthenticateWithCredential(credential);
    }).then(function(){
      // Update password
      return auth.currentUser.updatePassword(newPassword);
    }).then(function(){
      setPasswordSuccess("Password changed successfully!");
      setCurrentPassword("");
      setNewPassword("");
      setConfirmNewPassword("");
      setTimeout(function(){
        setShowChangePassword(false);
        setPasswordSuccess("");
      },2000);
    }).catch(function(e){
      if(e==="no_users"||e==="no_email")return;
      if(e.code==="auth/wrong-password"){
        setPasswordError("Current password is incorrect");
      }else if(e.code==="auth/weak-password"){
        setPasswordError("New password is too weak");
      }else{
        setPasswordError("Error changing password: "+(e.message||"Please try again"));
      }
    });
  }

  function deleteMealAt(dateKey, mealIndex){
    var newMeals = Object.assign({}, meals);
    var dayMeals = newMeals[dateKey];
    if(!dayMeals) return;
    var list = Array.isArray(dayMeals) ? dayMeals.slice() : [dayMeals];
    list.splice(mealIndex, 1);
    if(list.length === 0){
      delete newMeals[dateKey];
    } else {
      newMeals[dateKey] = list;
    }
    setSwipedMeal(null);
    setSwipeOffset(0);
    svM(newMeals);
  }
  
  function svM(m){
    setMeals(m);
    var key = "dm_meals_"+userIdLowerForSave;
    
    // Strip large photos from meals to avoid storage limits
    // Photos should be stored with recipes, not duplicated in calendar
    var mealsToSave = {};
    Object.keys(m).forEach(function(dateKey) {
      var dayMeals = m[dateKey];
      if (Array.isArray(dayMeals)) {
        mealsToSave[dateKey] = dayMeals.map(function(meal) {
          var copy = Object.assign({}, meal);
          // Remove photo if it's a large base64 string (keep external URLs)
          if (copy.photo && copy.photo.length > 1000) {
            delete copy.photo;
          }
          return copy;
        });
      } else if (dayMeals) {
        var copy = Object.assign({}, dayMeals);
        if (copy.photo && copy.photo.length > 1000) {
          delete copy.photo;
        }
        mealsToSave[dateKey] = copy;
      }
    });
    
    var data = JSON.stringify(mealsToSave);
    console.log("Saving meals to key:", key, "meal dates:", Object.keys(mealsToSave), "data length:", data.length);
    
    // Check if data is too large (Firestore doc limit is ~1MB)
    if (data.length > 900000) {
      alert("Meal data too large to save! Try removing some old meals.");
      return;
    }
    
    window.storage.set(key,data,true).then(function(result){
      if(!result){
        console.error("Failed to save meals - result was null/false");
        alert("Failed to save meals! Check Firebase connection.");
      }
      else{console.log("Successfully saved meals, size:", data.length)}
    }).catch(function(err){
      console.error("Error saving meals:",err);
      alert("Error saving meals: " + (err.message || err));
    });
  }
  function svR(r){
    // Backfill any recipes missing the new schema (should be rare after migration on load)
    var stamped = r.map(function(recipe){
      if(recipe.recipeId && recipe.originalOwner && recipe.savedBy) return recipe;
      return migrateRecipe(recipe, userId).recipe;
    });
    r = stamped;
    setRecipes(r);
    
    // Check if any photos need compression
    var hasPhotos = r.some(function(recipe) {
      return recipe.photo && recipe.photo.startsWith("data:");
    });
    
    if (hasPhotos) {
      // Compress all photos then save
      compressRecipePhotos(r, function(compressedRecipes) {
        // Update state with compressed versions
        setRecipes(compressedRecipes);
        saveRecipesIndividually(compressedRecipes);
      });
    } else {
      // No photos to compress, save directly
      saveRecipesIndividually(r);
    }
  }
  
  // Save each recipe as its own document - no more 1MB total limit!
  function saveRecipesIndividually(recipes) {
    var baseKey = "dm_recipe_" + userIdLowerForSave + "_";
    
    // Save index of recipe IDs (small, just IDs)
    var recipeIds = recipes.map(function(r) { return r.id; });
    window.storage.set("dm_recipe_index_" + userIdLowerForSave, JSON.stringify(recipeIds), true)
      .catch(function(err) { console.error("Error saving recipe index:", err); });
    
    // Save each recipe individually
    recipes.forEach(function(recipe) {
      var key = baseKey + recipe.id;
      var data = JSON.stringify(recipe);
      window.storage.set(key, data, true)
        .then(function(result) {
          if (!result) console.error("Failed to save recipe:", recipe.name);
        })
        .catch(function(err) {
          console.error("Error saving recipe " + recipe.name + ":", err);
        });
    });
    
    // Update public recipe count in user profile. This fires on every recipe
    // save, so it used to rewrite the whole shared user document each time.
    var publicCount = recipes.filter(function(r) { return r.isPublic !== false; }).length;
    var countUid = firebase.auth().currentUser && firebase.auth().currentUser.uid;
    if (countUid) window.users.upsert(countUid, { publicRecipeCount: publicCount });
    
    console.log("Saved", recipes.length, "recipes individually");
  }

  // Compress any base64 photo, hand it to Storage, and keep only the returned
  // URL on the recipe. This doubles as the migration for recipes saved before
  // photos moved out of Firestore: they load as base64 and get written back as
  // URLs, shrinking a ~62KB document to ~2KB.
  //
  // Only ever runs over the signed-in user's own recipes (Explore's loader
  // doesn't call it), so uploads always land under the uploader's own uid,
  // which is what the Storage rules require.
  function compressRecipePhotos(recipes, callback) {
    var results = recipes.slice();
    var targets = [];
    recipes.forEach(function(recipe, idx) {
      if (recipe.photo && window.photoStore.isDataUrl(recipe.photo)) targets.push(idx);
    });

    if (targets.length === 0) { callback(results); return; }

    var completed = 0;
    targets.forEach(function(idx) {
      var recipe = recipes[idx];
      compressPhoto(recipe.photo, function(compressed) {
        window.photoStore.uploadRecipePhoto(compressed, recipe.id).then(function(url) {
          // Keep the compressed data URI if the upload failed, so a Storage
          // outage degrades to the old inline behaviour rather than dropping
          // someone's photo on the floor.
          results[idx] = Object.assign({}, recipe, {photo: url || compressed});
          if (++completed === targets.length) callback(results);
        });
      });
    });
  }

  // Fire-and-forget the atomic Firestore counter write, plus an immediate
  // optimistic local update so the badge on screen reflects the change

  function bumpFavCount(recipe,delta){
    if(!recipe||!recipe.originalOwner||!recipe.recipeId)return;
    var key=(recipe.originalOwner||"").toLowerCase()+"_"+recipe.recipeId;
    setFavCounts(function(prev){
