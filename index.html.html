<body>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;
    
    // ============ FIREBASE STORAGE ADAPTER ============
    // This replaces window.storage with Firebase Firestore
    
    let db = null;
    let firebaseInitialized = false;
    
    function initFirebase(config) {
      try {
        const app = firebase.initializeApp(config);
        db = firebase.firestore();
        firebaseInitialized = true;
        
        // Enable offline persistence
        db.enablePersistence({ synchronizeTabs: true }).catch(err => {
          console.log("Persistence error:", err.code);
        });
        
        return true;
      } catch (error) {
        console.error("Firebase init error:", error);
        return false;
      }
    }
    
    // Storage adapter that mimics the window.storage API but uses Firestore
    const firebaseStorage = {
      get: async function(key, shared) {
        if (!db) throw new Error("Firebase not initialized");
        try {
          const doc = await db.collection("data").doc(key).get();
          if (doc.exists) {
            return { key: key, value: doc.data().value, shared: shared };
          }
          return null;
        } catch (error) {
          console.error("Firebase get error:", key, error);
          throw error;
        }
      },
      
      set: async function(key, value, shared) {
        if (!db) throw new Error("Firebase not initialized");
        try {
          await db.collection("data").doc(key).set({ 
            value: value, 
            updatedAt: firebase.firestore.FieldValue.serverTimestamp() 
          });
          return { key: key, value: value, shared: shared };
        } catch (error) {
          console.error("Firebase set error:", key, error);
          throw error;
        }
      },
      
      delete: async function(key, shared) {
        if (!db) throw new Error("Firebase not initialized");
        try {
          await db.collection("data").doc(key).delete();
          return { key: key, deleted: true, shared: shared };
        } catch (error) {
          console.error("Firebase delete error:", key, error);
          throw error;
        }
      },
      
      list: async function(prefix, shared) {
        if (!db) throw new Error("Firebase not initialized");
        try {
          // Firestore doesn't support prefix queries easily, so we'll do a collection query
          const snapshot = await db.collection("data").get();
          const keys = [];
          snapshot.forEach(doc => {
            if (!prefix || doc.id.startsWith(prefix)) {
              keys.push(doc.id);
            }
          });
          return { keys: keys, prefix: prefix, shared: shared };
        } catch (error) {
          console.error("Firebase list error:", error);
          throw error;
        }
      }
    };
    
    // Set window.storage to use Firebase
    window.storage = firebaseStorage;
    
    // ============ CONFIG SCREEN ============
    function ConfigScreen({ onConfigured }) {
      const [configText, setConfigText] = useState("");
      const [error, setError] = useState("");
      const [testing, setTesting] = useState(false);
      
      // Check for saved config on mount
      useEffect(() => {
        const saved = localStorage.getItem("firebase_config");
        if (saved) {
          try {
            const config = JSON.parse(saved);
            if (initFirebase(config)) {
              onConfigured();
            }
          } catch (e) {
            localStorage.removeItem("firebase_config");
          }
        }
      }, []);
      
      function handleSubmit() {
        setError("");
        setTesting(true);
        
        try {
          // Try to parse the config
          let config;
          let text = configText.trim();
          
          // Extract just the object if there's extra stuff
          const match = text.match(/\{[\s\S]*\}/);
          if (match) {
            text = match[0];
          }
          
          // Try direct JSON parse first
          try {
            config = JSON.parse(text);
          } catch (e) {
            // Convert JS object notation to JSON
            // Handle unquoted keys like: apiKey: "value"
            let jsonStr = text
              .replace(/([{,]\s*)(\w+)\s*:/g, '$1"$2":')  // Quote unquoted keys
              .replace(/'/g, '"')                          // Single to double quotes
              .replace(/,(\s*[}\]])/g, '$1')               // Remove trailing commas
              .replace(/:\s*"([^"]*)"(\s*[,}])/g, ':"$1"$2'); // Ensure values are quoted
            
            config = JSON.parse(jsonStr);
          }
          
          // Validate required fields
          if (!config.apiKey || !config.projectId) {
            throw new Error("Missing apiKey or projectId");
          }
          
          // Try to initialize Firebase
          if (initFirebase(config)) {
            // Test write to verify permissions
            db.collection("data").doc("_test").set({ test: true, time: Date.now() })
              .then(() => {
                // Success! Save config and proceed
                localStorage.setItem("firebase_config", JSON.stringify(config));
                setTesting(false);
                onConfigured();
              })
              .catch(err => {
                setError("Firebase connected but write failed. Check Firestore rules allow read/write. Error: " + (err.message || err));
                setTesting(false);
              });
          } else {
            throw new Error("Failed to initialize Firebase");
          }
        } catch (e) {
          setError("Invalid config: " + e.message);
          setTesting(false);
        }
      }
      
      return (
        <div className="config-screen">
          <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='48' fill='%23F5EBE6' stroke='%23A08679' stroke-width='2'/%3E%3Cg transform='translate(50,50)'%3E%3Cellipse cx='-18' cy='-12' rx='14' ry='9' fill='none' stroke='%23A08679' stroke-width='1.5' transform='rotate(-25)'/%3E%3Cellipse cx='18' cy='-12' rx='14' ry='9' fill='none' stroke='%23A08679' stroke-width='1.5' transform='rotate(25)'/%3E%3Cellipse cx='0' cy='8' rx='12' ry='18' fill='none' stroke='%23A08679' stroke-width='2'/%3E%3Cline x1='-8' y1='0' x2='8' y2='0' stroke='%23A08679' stroke-width='1.5'/%3E%3Cline x1='-10' y1='8' x2='10' y2='8' stroke='%23A08679' stroke-width='1.5'/%3E%3Cline x1='-8' y1='16' x2='8' y2='16' stroke='%23A08679' stroke-width='1.5'/%3E%3Ccircle cx='0' cy='-18' r='7' fill='none' stroke='%23A08679' stroke-width='2'/%3E%3Cpath d='M-4,-24 Q-5,-32 -8,-34' fill='none' stroke='%23A08679' stroke-width='1.5' stroke-linecap='round'/%3E%3Cpath d='M4,-24 Q5,-32 8,-34' fill='none' stroke='%23A08679' stroke-width='1.5' stroke-linecap='round'/%3E%3C/g%3E%3C/svg%3E" 
            alt="Logo" style={{width: 80, height: 80, marginBottom: 20}} />
          <h1>The Family Table</h1>
          <p>One-time setup: Connect to Firebase</p>
          
          <div className="step">
            <h3>Step 1: Create Firebase Project</h3>
            <p>Go to <a href="https://console.firebase.google.com" target="_blank">console.firebase.google.com</a> and create a new project (free tier).</p>
          </div>
          
          <div className="step">
            <h3>Step 2: Enable Firestore</h3>
            <p>In your project, go to "Firestore Database" and click "Create database". Choose "Start in test mode" for now.</p>
          </div>
          
          <div className="step">
            <h3>Step 3: Get Your Config</h3>
            <p>Go to Project Settings (gear icon) → scroll to "Your apps" → click web icon (&lt;/&gt;) → Register app → Copy the firebaseConfig object.</p>
          </div>
          
          <div className="step">
            <h3>Step 4: Paste Config Below</h3>
            {error && <div className="error">{error}</div>}
            <textarea 
              value={configText}
              onChange={e => setConfigText(e.target.value)}
              placeholder='Paste your Firebase config here, e.g.:
{
  apiKey: "AIza...",
  authDomain: "your-app.firebaseapp.com",
  projectId: "your-app",
  storageBucket: "your-app.appspot.com",
  messagingSenderId: "123456789",
  appId: "1:123456789:web:abc123"
}'
            />
            <button onClick={handleSubmit} disabled={!configText.trim() || testing}>
              {testing ? "Testing connection..." : "Connect to Firebase"}
            </button>
          </div>
        </div>
      );
    }
    
    // ============ MAIN APP CODE ============
    // (This would be the full app - for now showing a simplified version)
    
const DAYS_FULL = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
const DAYS_SHORT = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const EMOJIS = ["🍝","🍕","🌮","🍔","🥘","🍲","🐟","🥩","🍗","🥗","🍜","🥧","🧀","🍚","🥪","🫔","🍖","🥦","🍽️"];
const BEE_LOGO = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='48' fill='%23F5EBE6' stroke='%23A08679' stroke-width='2'/%3E%3Cg transform='translate(50,50)'%3E%3Cellipse cx='-18' cy='-12' rx='14' ry='9' fill='none' stroke='%23A08679' stroke-width='1.5' transform='rotate(-25)'/%3E%3Cellipse cx='18' cy='-12' rx='14' ry='9' fill='none' stroke='%23A08679' stroke-width='1.5' transform='rotate(25)'/%3E%3Cellipse cx='0' cy='8' rx='12' ry='18' fill='none' stroke='%23A08679' stroke-width='2'/%3E%3Cline x1='-8' y1='0' x2='8' y2='0' stroke='%23A08679' stroke-width='1.5'/%3E%3Cline x1='-10' y1='8' x2='10' y2='8' stroke='%23A08679' stroke-width='1.5'/%3E%3Cline x1='-8' y1='16' x2='8' y2='16' stroke='%23A08679' stroke-width='1.5'/%3E%3Ccircle cx='0' cy='-18' r='7' fill='none' stroke='%23A08679' stroke-width='2'/%3E%3Cpath d='M-4,-24 Q-5,-32 -8,-34' fill='none' stroke='%23A08679' stroke-width='1.5' stroke-linecap='round'/%3E%3Cpath d='M4,-24 Q5,-32 8,-34' fill='none' stroke='%23A08679' stroke-width='1.5' stroke-linecap='round'/%3E%3C/g%3E%3C/svg%3E";

const C = {dark:"#8B7355",light:"#A69485",blush:"#F5EBE6",blushMed:"#E8DDD6",blushDeep:"#D4C4B8",blushAccent:"#B8A090",blushDark:"#96806C",card:"#FBF7F4",bdr:"rgba(139,115,85,0.2)"};

function hashPass(p){var h=0;for(var i=0;i<p.length;i++){h=((h<<5)-h)+p.charCodeAt(i);h=h&h}return"h"+Math.abs(h).toString(36)}

function AuthScreen({onLogin}){
  const [mode,setMode]=useState("login");
  const [username,setUsername]=useState("");
  const [email,setEmail]=useState("");
  const [password,setPassword]=useState("");
  const [confirm,setConfirm]=useState("");
  const [error,setError]=useState("");
  const [loading,setLoading]=useState(false);
  
  function validateEmail(e){return/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e)}
  
  async function handleSubmit(){
    setError("");
    setLoading(true);
    
    try {
      if(mode==="signup"){
        if(!username.trim()||!email.trim()||!password.trim()){setError("Please fill in all fields");setLoading(false);return}
        if(!validateEmail(email.trim())){setError("Please enter a valid email");setLoading(false);return}
        if(password.length<6){setError("Password must be at least 6 characters");setLoading(false);return}
        if(password!==confirm){setError("Passwords don't match");setLoading(false);return}
        
        const uid=username.trim();
        const userEmail=email.trim().toLowerCase();
        
        const r=await window.storage.get("dm_users",true).catch(()=>null);
        const users=r&&r.value?JSON.parse(r.value):{};
        
        if(users[uid]){setError("Username taken");setLoading(false);return}
        
        const emailExists=Object.keys(users).some(u=>users[u].email===userEmail);
        if(emailExists){setError("Email already registered");setLoading(false);return}
        
        users[uid]={passHash:hashPass(password),email:userEmail,created:Date.now()};
        await window.storage.set("dm_users",JSON.stringify(users),true);
        onLogin(uid);
        
      }else if(mode==="login"){
        if(!username.trim()||!password.trim()){setError("Please fill in all fields");setLoading(false);return}
        
        const typedUid=username.trim();
        const r=await window.storage.get("dm_users",true).catch(()=>null);
        
        if(!r||!r.value){setError("No accounts exist. Please sign up.");setLoading(false);return}
        
        const users=JSON.parse(r.value);
        let uid=null;
        
        if(users[typedUid]){
          uid=typedUid;
        }else{
          const typedLower=typedUid.toLowerCase();
          Object.keys(users).forEach(u=>{
            if(u.toLowerCase()===typedLower)uid=u;
          });
        }
        
        if(!uid){setError("User not found");setLoading(false);return}
        if(users[uid].passHash!==hashPass(password)){setError("Incorrect password");setLoading(false);return}
        
        onLogin(uid);
      }
    } catch(e) {
      setError("Error: "+(e.message||"Please try again"));
      setLoading(false);
    }
  }
  
  return(
    <div style={{maxWidth:420,margin:"0 auto",padding:20}}>
      <div style={{textAlign:"center",marginBottom:30}}>
        <img src={BEE_LOGO} alt="Logo" style={{width:70,height:70,marginBottom:16}}/>
        <h1 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:28,color:C.dark,marginBottom:8,letterSpacing:2}}>THE FAMILY TABLE</h1>
        <p style={{color:C.light,fontSize:14}}>{mode==="login"?"Welcome back!":"Create your account"}</p>
      </div>
      
      <div style={{background:"#fff",borderRadius:16,padding:24,boxShadow:"0 2px 12px rgba(0,0,0,0.08)"}}>
        {error&&<div style={{background:"#FEE8E8",color:"#C33",padding:12,borderRadius:8,marginBottom:16,fontSize:14}}>{error}</div>}
        
        <input value={username} onChange={e=>setUsername(e.target.value)} placeholder="Username" 
          style={{width:"100%",padding:14,borderRadius:10,border:"1px solid #ddd",fontSize:16,marginBottom:12,boxSizing:"border-box"}}/>
        
        {mode==="signup"&&<input value={email} onChange={e=>setEmail(e.target.value)} placeholder="Email" type="email"
          style={{width:"100%",padding:14,borderRadius:10,border:"1px solid #ddd",fontSize:16,marginBottom:12,boxSizing:"border-box"}}/>}
        
        <input value={password} onChange={e=>setPassword(e.target.value)} placeholder="Password" type="password"
          style={{width:"100%",padding:14,borderRadius:10,border:"1px solid #ddd",fontSize:16,marginBottom:12,boxSizing:"border-box"}}/>
        
        {mode==="signup"&&<input value={confirm} onChange={e=>setConfirm(e.target.value)} placeholder="Confirm password" type="password"
          style={{width:"100%",padding:14,borderRadius:10,border:"1px solid #ddd",fontSize:16,marginBottom:12,boxSizing:"border-box"}}/>}
        
        <button onClick={handleSubmit} disabled={loading}
          style={{width:"100%",padding:16,borderRadius:10,border:"none",background:C.dark,color:"#fff",fontSize:16,fontWeight:600,cursor:loading?"wait":"pointer",marginBottom:16}}>
          {loading?"Please wait...":(mode==="login"?"Sign In":"Create Account")}
        </button>
        
        <div style={{textAlign:"center"}}>
          {mode==="login"?(
            <p style={{fontSize:14,color:C.light}}>Don't have an account? <span onClick={()=>setMode("signup")} style={{color:C.dark,fontWeight:600,cursor:"pointer"}}>Create Account</span></p>
          ):(
            <p style={{fontSize:14,color:C.light}}>Already have an account? <span onClick={()=>setMode("login")} style={{color:C.dark,fontWeight:600,cursor:"pointer"}}>Sign In</span></p>
          )}
        </div>
        
        <div style={{borderTop:"1px solid #eee",marginTop:16,paddingTop:16,textAlign:"center"}}>
          <button onClick={()=>onLogin("guest")} style={{padding:"12px 24px",borderRadius:10,border:"1px solid "+C.bdr,background:"#fff",color:C.dark,fontSize:14,cursor:"pointer"}}>
            Continue as Guest
          </button>
        </div>
      </div>
    </div>
  );
}

function MainApp({user,onLogout}){
  const [meals,setMeals]=useState({});
  const [recipes,setRecipes]=useState([]);
  const [view,setView]=useState("calendar");
  const [loading,setLoading]=useState(true);
  
  const userId=user||"guest";
  
  useEffect(()=>{
    async function loadData(){
      try{
        const [mealsR,recipesR]=await Promise.all([
          window.storage.get("dm_meals_"+userId,true).catch(()=>null),
          window.storage.get("dm_recipes_"+userId,true).catch(()=>null)
        ]);
        if(mealsR&&mealsR.value)setMeals(JSON.parse(mealsR.value));
        if(recipesR&&recipesR.value)setRecipes(JSON.parse(recipesR.value));
      }catch(e){
        console.error("Load error:",e);
      }
      setLoading(false);
    }
    loadData();
  },[userId]);
  
  function saveMeals(m){setMeals(m);window.storage.set("dm_meals_"+userId,JSON.stringify(m),true).catch(()=>{})}
  function saveRecipes(r){setRecipes(r);window.storage.set("dm_recipes_"+userId,JSON.stringify(r),true).catch(()=>{})}
  
  if(loading){
    return(
      <div style={{textAlign:"center",padding:60}}>
        <img src={BEE_LOGO} alt="Logo" style={{width:60,height:60,marginBottom:16,animation:"pulse 1.5s infinite"}}/>
        <p style={{color:C.light}}>Loading your data...</p>
        <style>{`@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}`}</style>
      </div>
    );
  }
  
  return(
    <div style={{maxWidth:600,margin:"0 auto",padding:16}}>
      {/* Header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <img src={BEE_LOGO} alt="Logo" style={{width:50,height:50}}/>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:14,color:C.dark,fontWeight:600}}>{userId==="guest"?"Guest":"@"+userId}</span>
          <button onClick={onLogout} style={{padding:"6px 12px",borderRadius:8,border:"1px solid "+C.bdr,background:"#fff",fontSize:12,cursor:"pointer"}}>
            Logout
          </button>
        </div>
      </div>
      
      {/* Title */}
      <h1 style={{textAlign:"center",fontFamily:"'Cormorant Garamond',serif",fontSize:24,color:C.dark,marginBottom:8,letterSpacing:2}}>THE FAMILY TABLE</h1>
      <p style={{textAlign:"center",color:C.light,fontSize:13,marginBottom:20}}>Plan Meals · Save Recipes · Streamline Shopping</p>
      
      {/* Tabs */}
      <div style={{display:"flex",gap:8,justifyContent:"center",marginBottom:24,flexWrap:"wrap"}}>
        {["calendar","recipes","grocery"].map(t=>(
          <button key={t} onClick={()=>setView(t)} 
            style={{padding:"10px 20px",borderRadius:20,border:"none",background:view===t?C.dark:C.blush,color:view===t?"#fff":C.dark,fontWeight:600,fontSize:14,cursor:"pointer"}}>
            {t==="calendar"?"📅 Calendar":t==="recipes"?"📖 Recipes":"🛒 Grocery"}
          </button>
        ))}
      </div>
      
      {/* Content */}
      {view==="calendar"&&(
        <div style={{background:"#fff",borderRadius:16,padding:20,border:"1px solid "+C.bdr}}>
          <h2 style={{color:C.dark,marginBottom:16}}>📅 This Week</h2>
          <p style={{color:C.light,fontSize:14}}>Your meal calendar will appear here.</p>
          <p style={{color:C.light,fontSize:14,marginTop:10}}>Meals saved: {Object.keys(meals).length}</p>
        </div>
      )}
      
      {view==="recipes"&&(
        <div style={{background:"#fff",borderRadius:16,padding:20,border:"1px solid "+C.bdr}}>
          <h2 style={{color:C.dark,marginBottom:16}}>📖 My Recipes</h2>
          {recipes.length===0?(
            <p style={{color:C.light,fontSize:14}}>No recipes yet. Add your first recipe!</p>
          ):(
            <div>
              {recipes.map(r=>(
                <div key={r.id} style={{padding:12,borderBottom:"1px solid "+C.bdr,display:"flex",alignItems:"center",gap:12}}>
                  <span style={{fontSize:24}}>{r.emoji||"🍽️"}</span>
                  <div>
                    <div style={{fontWeight:600,color:C.dark}}>{r.name}</div>
                    {r.time&&<div style={{fontSize:12,color:C.light}}>{r.time}</div>}
                  </div>
                </div>
              ))}
            </div>
          )}
          <button onClick={()=>{
            const newRecipe={id:Date.now(),name:"New Recipe",emoji:EMOJIS[Math.floor(Math.random()*EMOJIS.length)],time:"30 min"};
            saveRecipes([...recipes,newRecipe]);
          }} style={{marginTop:16,padding:"12px 24px",borderRadius:10,border:"none",background:C.dark,color:"#fff",fontWeight:600,cursor:"pointer"}}>
            + Add Recipe
          </button>
        </div>
      )}
      
      {view==="grocery"&&(
        <div style={{background:"#fff",borderRadius:16,padding:20,border:"1px solid "+C.bdr}}>
          <h2 style={{color:C.dark,marginBottom:16}}>🛒 Grocery List</h2>
          <p style={{color:C.light,fontSize:14}}>Your grocery list will appear here.</p>
        </div>
      )}
      
      {/* Footer */}
      <div style={{textAlign:"center",marginTop:40,padding:20}}>
        <p style={{fontSize:12,color:C.light}}>✅ Connected to Firebase - Data syncs across all devices</p>
      </div>
    </div>
  );
}

function App(){
  const [configured,setConfigured]=useState(false);
  const [user,setUser]=useState(null);
  const [checkingSession,setCheckingSession]=useState(true);
  
  useEffect(()=>{
    // Check if Firebase is already configured
    const saved=localStorage.getItem("firebase_config");
    if(saved){
      try{
        const config=JSON.parse(saved);
        if(initFirebase(config)){
          setConfigured(true);
          // Check for saved session
          window.storage.get("dm_session",true).then(r=>{
            if(r&&r.value)setUser(r.value);
            setCheckingSession(false);
          }).catch(()=>setCheckingSession(false));
        }else{
          setCheckingSession(false);
        }
      }catch(e){
        localStorage.removeItem("firebase_config");
        setCheckingSession(false);
      }
    }else{
      setCheckingSession(false);
    }
  },[]);
  
  function handleLogin(uid){
    setUser(uid);
    window.storage.set("dm_session",uid,true).catch(()=>{});
  }
  
  function handleLogout(){
    setUser(null);
    window.storage.delete("dm_session",true).catch(()=>{});
  }
  
  if(!configured){
    return <ConfigScreen onConfigured={()=>setConfigured(true)}/>;
  }
  
  if(checkingSession){
    return(
      <div style={{textAlign:"center",padding:60}}>
        <img src={BEE_LOGO} alt="Logo" style={{width:60,height:60,marginBottom:16}}/>
        <p style={{color:C.light}}>Loading...</p>
      </div>
    );
  }
  
  if(!user){
    return <AuthScreen onLogin={handleLogin}/>;
  }
  
  return <MainApp user={user} onLogout={handleLogout}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
