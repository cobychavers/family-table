  // Load all public recipes from all users
  function loadPublicRecipes(){
    if(!user)return; // No public recipes without sign-in
    if(publicRecipesLoaded)return;
    setPublicRecipesLoaded(true);
    console.log("Loading public recipes...");
    
    window.users.all().then(function(users){
      if(!users || Object.keys(users).length===0){
        console.log("No users found for public recipes");
        return;
      }
      var allPublicRecipes=[];
      var usernames=Object.keys(users).filter(function(u){
        // Only include public accounts
        return !users[u].isPrivate;
      });
      console.log("Public users to load recipes from:", usernames);
      
      var loadPromises=usernames.map(function(uname){
        var unameL=uname.toLowerCase();
        return window.storage.get("dm_recipe_index_"+unameL,true)
          .catch(function(){return null})
          .then(function(indexR){
            if(!indexR||!indexR.value)return[];
            var recipeIds=JSON.parse(indexR.value);
            console.log("User", uname, "has", recipeIds.length, "recipes");
            if(recipeIds.length===0)return[];
            
            return Promise.all(recipeIds.map(function(id){
              return window.storage.get("dm_recipe_"+unameL+"_"+id,true)
                .catch(function(){return null})
                .then(function(r){
                  if(r&&r.value){
                    var recipe=JSON.parse(r.value);
                    // Must be marked public
                    if(recipe.isPublic===false) return null;
                    // Migrate if needed
                    var mig = migrateRecipe(recipe, unameL);
                    recipe = mig.recipe;
                    // STRICT: require explicit originalOwner (ambiguous recipes are hidden from Explore)
                    if(!recipe.originalOwner) return null;
                    var creator = recipe.originalOwner.toLowerCase();
                    var owner = (recipe.savedBy || unameL).toLowerCase();
                    if(creator !== unameL) return null;      // not their recipe
                    if(owner !== creator) return null;        // this is a copy, not the original
                    recipe.ownerUsername = uname;
                    recipe.ownerProfilePic = users[uname]?users[uname].profilePic:null;
                    return recipe;
                  }
                  return null;
                });
            }));
          })
          .then(function(recipes){
            return recipes.filter(function(r){return r!==null});
          });
      });
      
      Promise.all(loadPromises).then(function(results){
        results.forEach(function(userRecipes){
          allPublicRecipes=allPublicRecipes.concat(userRecipes);
        });
        // No safety net needed - the loader is now bulletproof
        // Dedup by recipeId (immutable global identifier).
        // If two recipes share a recipeId, keep the one whose savedBy === originalOwner (the actual original)
        var byRecipeId = {};
        allPublicRecipes.forEach(function(r){
          var key = r.recipeId || ("__legacy__" + (r.name || "").toLowerCase());
          var existing = byRecipeId[key];
          if(!existing){ byRecipeId[key] = r; return; }
          // Prefer the copy where savedBy matches originalOwner (the true original)
          var rIsOriginal = (r.savedBy && r.originalOwner && r.savedBy.toLowerCase()===r.originalOwner.toLowerCase());
          var eIsOriginal = (existing.savedBy && existing.originalOwner && existing.savedBy.toLowerCase()===existing.originalOwner.toLowerCase());
          if(rIsOriginal && !eIsOriginal) byRecipeId[key] = r;
        });
        allPublicRecipes = Object.values(byRecipeId);
        // Sort by newest first
        allPublicRecipes.sort(function(a,b){
          return (b.createdAt||0)-(a.createdAt||0);
        });
        console.log("Loaded", allPublicRecipes.length, "unique public recipes");
        setPublicRecipes(allPublicRecipes);
        // Batch-fetch favorite counts for everything just loaded - chunked
        // "in" queries, so this is a handful of reads regardless of how many
        // public recipes exist, not one read per recipe.
        window.favCounts.fetchMany(allPublicRecipes.map(function(r){return{originalOwner:r.originalOwner,recipeId:r.recipeId}}))
          .then(function(counts){setFavCounts(function(prev){return Object.assign({},prev,counts)})});
      });
    }).catch(function(e){
      console.error("Error loading public recipes:", e);
    });
  }

  function handlePhoto(e,setter){
    var f=e.target.files&&e.target.files[0];
    if(!f)return;
    var r=new FileReader();
    r.onload=function(ev){
      var originalData = ev.target.result;
      // Compress if larger than 100KB
      if (originalData.length > 100000) {
        compressPhoto(originalData, function(compressed) {
          setter(function(m){return Object.assign({},m,{photo:compressed})});
        });
      } else {
        setter(function(m){return Object.assign({},m,{photo:originalData})});
      }
    };
    r.readAsDataURL(f);
  }
  
  function compressPhoto(dataUrl, callback) {
    var img = new Image();
    img.onload = function() {
      var canvas = document.createElement("canvas");
      var maxSize = 600; // Reduced from 800 to 600
      var width = img.width;
      var height = img.height;
      
      // Scale down if needed
      if (width > maxSize || height > maxSize) {
        if (width > height) {
          height = Math.round(height * maxSize / width);
          width = maxSize;
        } else {
          width = Math.round(width * maxSize / height);
          height = maxSize;
        }
      }
      
      canvas.width = width;
      canvas.height = height;
      var ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, width, height);
      
      // Compress to JPEG with 0.5 quality (reduced from 0.6)
      var compressed = canvas.toDataURL("image/jpeg", 0.5);
      console.log("Compressed photo from", dataUrl.length, "to", compressed.length);
      callback(compressed);
    };
    img.onerror = function() {
      // If compression fails, use original
      callback(dataUrl);
    };
    img.src = dataUrl;
  }

  // A chat reply is only "save"-able once it's ONE fully detailed recipe (multiple
  // numbered steps + multiple quantity lines), not a menu of 2-4 bolded idea names
  // with one-line blurbs. Bold-marker counting was tried and dropped: real recipes
  // often bold more than just the dish name (a technique, a time), which made
  // genuine full recipes get misclassified as idea lists.
  function chefReplyIsFullRecipe(text){
    if(!text)return false;
    var stepMatches=text.match(/(^|\n)\s*\d+\.\s/g)||[];
    var qtyMatches=text.match(/(^|\n)\s*[-•]?\s*\d+(\/\d+)?\s*(cup|cups|tbsp|tablespoons?|tsp|teaspoons?|oz|ounces?|lbs?|pounds?|g|kg|ml|clove|cloves|can|cans|slice|slices|pinch)\b/gi)||[];
    return stepMatches.length>=2&&qtyMatches.length>=2;
  }

  // --- Ingredient swap: recipe-source helpers ---
  // A "Chef-suggested recipe" is a full-recipe assistant reply in the current
  // conversation that hasn't been saved yet - the swap picker and the
  // natural-language detector both need its title/ingredients without a
  // network round-trip, so these are pulled locally from chefMessages.
  function extractChefRecipeTitle(text){
    var firstLine=(text||"").split("\n").map(function(l){return l.trim()}).filter(Boolean)[0]||"";
    return firstLine.replace(/^#+\s*/,"").replace(/\*\*/g,"").replace(/:$/,"").trim()||"Chef suggestion";
  }
  function extractChefIngredientLines(text){
    var lines=(text||"").split("\n").map(function(l){return l.replace(/^[-•*]\s*/,"").trim()}).filter(Boolean);
    return lines.filter(function(l){
      if(/^\d+\.\s/.test(l))return false; // numbered instruction step, not an ingredient - parseIng would otherwise mistake "1." for a quantity
      var p=parseIng(l);
      return !!(p.qty||p.unit);
    });
  }
  function getSwapRecipeOptions(){
    var mine=recipes.map(function(r){return {key:"saved:"+r.id,label:r.name,source:"saved",recipe:r}});
    var chef=[];
    chefMessages.forEach(function(m,i){
      if(m.role==="assistant"&&chefReplyIsFullRecipe(m.text)){
        chef.push({key:"chef:"+i,label:extractChefRecipeTitle(m.text)+" (this chat)",source:"chef",msgIndex:i,text:m.text});
      }
    });
    return mine.concat(chef);
  }
  function getSwapIngredientNames(opt){
    if(!opt)return[];
    if(opt.source==="saved")return (opt.recipe.ingredients||[]).map(function(i){return i.name}).filter(Boolean);
    return extractChefIngredientLines(opt.text).map(function(l){return parseIng(l).name}).filter(Boolean);
  }

  // Ask the Chef for substitutes for one ingredient in a recipe. Shared by
  // the structured picker (ingredientName already known) and the free-typed
  // chat path (ingredientName left blank - the AI infers it from `request`).
  function requestIngredientSwap(opt,ingredientName,note,displayUserText,baseHistory){
    var recipeName=opt.source==="saved"?opt.recipe.name:opt.source==="chef"?extractChefRecipeTitle(opt.text):"";
    var ingredients=opt.source==="saved"?opt.recipe.ingredients:null;
    var recipeText=opt.source==="chef"?opt.text:null;
    var request=ingredientName?('Suggest substitutes for "'+ingredientName+'"'+(note?(" - "+note):"")):(note||displayUserText);

    var userMsg={role:"user",text:displayUserText};
    var history=(baseHistory||chefMessages).concat([userMsg]);
    setChefMessages(history);
    setChefLastActive(Date.now());

    if(!isOnline){
      setChefMessages(history.concat([{role:"assistant",text:"I need an internet connection for that - try again once you're back online."}]));
      return;
    }

    setChefLoading(true);
    fetch(RECIPE_PROXY_URL,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({type:"ingredient_swap",recipeName:recipeName,ingredients:ingredients,recipeText:recipeText,request:request})
    })
    .then(function(r){return r.json()})
    .then(function(data){
      setChefLoading(false);
      setChefLastActive(Date.now());
      if(data.error)throw new Error(data.error);
      if(data.success===false){
        setChefMessages(history.concat([{role:"assistant",text:data.message||(recipeName?"I couldn't find a matching ingredient in that recipe.":"I couldn't tell which ingredient you meant - want to try rephrasing?")}]));
        return;
      }
      if(!data.success||!data.suggestions||!data.suggestions.length)throw new Error("No suggestions found");
      setChefMessages(history.concat([{
        role:"assistant",
        kind:"swap",
        text:"Here's what I'd swap for "+data.original+(recipeName?(" in "+recipeName):"")+":",
        original:data.original,
        suggestions:data.suggestions,
        applyTarget:opt.source==="saved"?{type:"saved",recipeId:opt.recipe.id}:opt.source==="chef"?{type:"chef",msgIndex:opt.msgIndex}:{type:"none"}
      }]));
    })
    .catch(function(err){
      setChefLoading(false);
      setChefMessages(history.concat([{role:"assistant",text:"Sorry, I had trouble finding substitutes - "+err.message+". Try again?"}]));
    });
  }

  // Natural-language detection: "replace/substitute/swap X" style phrasing.
  // First tries to match a recipe name mentioned in the same message (for
  // "swap the butter in my cookies" precision); if none matches, it still
  // counts as a swap request for a standalone ingredient with no recipe
  // context ("what can I use instead of buttermilk") - the worker itself
  // decides whether the message is really about an ingredient substitution
  // and degrades to a plain clarifying reply (success:false) if not.
  // No trailing \b: "replace"/"substitut"/"swap" are prefixes meant to also
  // catch "replacement", "substitution", "swapping", etc.
  var SWAP_TRIGGER=/\b(replace|substitut|swap|instead of|alternative (for|to)|what can i use (for|instead)|something else for)/i;
  function detectSwapRequest(text){
    if(!SWAP_TRIGGER.test(text||""))return null;
    var lower=text.toLowerCase();
    var matches=getSwapRecipeOptions().filter(function(o){
      var name=(o.source==="saved"?o.recipe.name:extractChefRecipeTitle(o.text))||"";
      return name.length>2&&lower.indexOf(name.toLowerCase())!==-1;
    });
    if(matches.length===1)return matches[0];
    if(matches.length===0)return{source:"none",key:"__any__",label:"Any ingredient"};
    return null;
  }

  function applySwapSuggestion(applyTarget,original,substitute){
    if(applyTarget.type==="saved"){
      var recipe=recipes.find(function(r){return r.id===applyTarget.recipeId});
      if(!recipe)return;
      setRecipeSwap({recipeId:recipe.id,original:original,substitute:substitute});
      setViewRecipe(recipe);
    }else{
      setChefSwaps(function(prev){
        var next=Object.assign({},prev);
        next[applyTarget.msgIndex]={original:original,substitute:substitute};
        return next;
      });
    }
  }

  // Chef chat: recipe-idea brainstorming
  function sendChefMessage(text){
    if(!text||!text.trim())return;
    // Start fresh if the last exchange was too long ago, rather than bolting
    // a new question onto a stale, forgotten conversation
    var isStale=chefLastActive&&(Date.now()-chefLastActive>CHEF_IDLE_CLEAR_MS);
    var baseHistory=isStale?[]:chefMessages;
    setChefInput("");

    var swapOpt=detectSwapRequest(text);
    if(swapOpt){
      requestIngredientSwap(swapOpt,null,null,text.trim(),baseHistory);
      return;
    }

    var userMsg={role:"user",text:text.trim()};
    var history=baseHistory.concat([userMsg]);
    setChefMessages(history);
    setChefLastActive(Date.now());

    if(!isOnline){
      setChefMessages(history.concat([{role:"assistant",text:"I need an internet connection for that - try again once you're back online."}]));
      return;
    }

    setChefLoading(true);

    fetch(RECIPE_PROXY_URL,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({type:"chef_chat",messages:history.slice(-10)})
    })
    .then(function(response){return response.json()})
    .then(function(data){
      if(data.error)throw new Error(data.error);
      if(!data.success||!data.reply)throw new Error("No reply from assistant");
      setChefLastActive(Date.now());
      setChefMessages(history.concat([{role:"assistant",text:data.reply}]));
      setChefLoading(false);
    })
    .catch(function(err){
      setChefMessages(history.concat([{role:"assistant",text:"Sorry, I had trouble answering that - "+err.message+". Try again?"}]));
      setChefLoading(false);
    });
  }

      {/* VIEW PROFILE MODAL */}
      {viewProfileUser&&<div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:C.blush,zIndex:999,overflow:"auto",display:"flex",flexDirection:"column",paddingTop:"env(safe-area-inset-top)",paddingBottom:"env(safe-area-inset-bottom)"}}>

                )

        {/* Recipes section - scrollable */}

              var savedCopy = recipes.find(function(r){
                if(!r.savedFrom) return false;
                if((r.savedFrom||"").toLowerCase() !== (viewProfileUser||"").toLowerCase()) return false;
                return (r.name||"").trim().toLowerCase() === (recipe.name||"").trim().toLowerCase();
              });
              var alreadySaved = !!savedCopy;
              var cookTime = shortTime(recipe.time);
              return <div key={recipe.id} className="ft-card-tap" onClick={function(){setViewFriendRecipe(Object.assign({},recipe,{ownerUsername:viewProfileUser,ownerProfilePic:viewProfileData?viewProfileData.profilePic:null}))}} style={{background:"var(--surface)",borderRadius:20,overflow:"hidden",boxShadow:C.shadowMd,cursor:"pointer"}}>

                  <button onClick={function(e){
                    e.stopPropagation();

                        var newRecipes=recipes.filter(function(r){return r.id!==savedCopy.id});
                        svR(newRecipes);

          </div>:null}
          
          {/* Ingredients */}
          {viewFriendRecipe.ingredients&&viewFriendRecipe.ingredients.length>0?<div style={{marginBottom:16}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>

              <div style={{fontSize:16,fontWeight:700,color:C.dark,letterSpacing:1,textTransform:"uppercase"}}>Ingredients</div>

                  <div style={{fontSize:17,lineHeight:1.6,color:C.dark,paddingTop:2}}>{step}</div>

              </div>
            </div>:null}
          </div>:null}
          
          {/* Credit/Source - shows who originally added it + how */}
          {(function(){

            var addedBy = viewFriendRecipe.originalOwner;

      {showScanModal&&<div style={ovl} onClick={function(){if(!aiScanLoading){setShowScanModal(false);setScanPhotos([])}}}><div style={Object.assign({},mdl,{padding:0,overflow:"hidden",display:"flex",flexDirection:"column"})} onClick={function(e){e.stopPropagation()}}>
        <div style={{padding:"16px 20px",borderBottom:"1px solid "+C.bdr,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{display:"flex",alignItems:"center",gap:9,fontWeight:700,fontSize:18,color:C.dark}}><Icon name="camera" size={17} strokeWidth={1.75}/>Photo</div>
          <button onClick={function(){setShowScanModal(false);setScanPhotos([])}} style={{background:"none",border:"none",cursor:"pointer",opacity:.4,display:"flex"}} disabled={aiScanLoading}><Icon name="x" size={20} strokeWidth={2}/></button>
        </div>
        
        <div style={{flex:1,overflowY:"auto",padding:16}}>
          <div style={{fontSize:13,color:C.light,marginBottom:12}}>
            Take a photo or choose from your photo library. You can add multiple photos (front & back of recipe cards).
          </div>
          
          {/* Photo grid */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:10,marginBottom:16}}>
            {scanPhotos.map(function(photo,idx){
              return <div key={idx} style={{position:"relative",aspectRatio:"1",borderRadius:10,overflow:"hidden",border:"2px solid "+C.bdr}}>
                <img src={photo} style={{width:"100%",height:"100%",objectFit:"cover"}} alt={"Photo "+(idx+1)}/>
                <button onClick={function(){setScanPhotos(function(prev){return prev.filter(function(_,i){return i!==idx})})}} style={{position:"absolute",top:4,right:4,width:24,height:24,borderRadius:12,border:"none",background:"rgba(0,0,0,0.6)",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><Icon name="x" size={12} color="#fff" strokeWidth={2.5}/></button>
                <div style={{position:"absolute",bottom:4,left:4,background:"rgba(0,0,0,0.6)",color:"#fff",fontSize:10,padding:"2px 6px",borderRadius:4}}>{idx+1}</div>
              </div>
            })}
            
            {/* Add photo button */}
            <label htmlFor="scanPhotoInput" style={{aspectRatio:"1",borderRadius:10,border:"2px dashed "+C.bdr,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:"pointer",background:C.blush}}>
              <Icon name="camera" size={26} color="var(--light)" strokeWidth={1.5}/>
              <span style={{fontSize:11,color:C.dark,marginTop:4}}>{scanPhotos.length===0?"Add Photo":"Add More"}</span>
            </label>
            <input id="scanPhotoInput" type="file" accept="image/*" multiple style={{display:"none"}} onChange={function(ev){
              var files = ev.target.files;
              if (!files || files.length === 0) return;
              Array.from(files).forEach(function(file) {
                var rd = new FileReader();
                rd.onload = function(e) {
                  setScanPhotos(function(prev) { return prev.concat([e.target.result]); });
                };
                rd.readAsDataURL(file);
              });
              ev.target.value = "";
            }}/>
          </div>
          
          {aiScanStatus?<div style={{textAlign:"center",padding:16,color:C.dark,fontWeight:600}}>{aiScanStatus}</div>:null}
        </div>
        
        <div style={{padding:16,borderTop:"1px solid "+C.bdr}}>
          <button 
            onClick={function(){
              if(scanPhotos.length===0){alert("Please add at least one photo");return}
              processScanPhotos(scanPhotos);
            }} 
            disabled={aiScanLoading||scanPhotos.length===0}
            style={{width:"100%",padding:"14px",borderRadius:12,border:"none",background:scanPhotos.length>0&&!aiScanLoading?C.dark:"var(--disabled)",color:"#fff",fontWeight:600,fontSize:15,cursor:scanPhotos.length>0&&!aiScanLoading?"pointer":"not-allowed"}}
          >
            {aiScanLoading?"Analyzing...":"Scan"}
          </button>
        </div>
      </div></div>}

      {showImport&&<div style={ovl} onClick={function(){if(!importLoading){setShowImport(false);setImportUrl("");setImportCode("");setImportStatus("");setImportPasteName("");setImportPasteIngredients("");setImportPasteDirections("")}}}><div style={Object.assign({},mdl,{padding:0,overflow:"hidden",display:"flex",flexDirection:"column"})} onClick={function(e){e.stopPropagation()}}>
        {/* Header */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"16px 20px",borderBottom:"1px solid "+C.bdr,flexShrink:0}}>
          <div style={{display:"flex",alignItems:"center",gap:8,fontWeight:700,fontSize:17,color:C.dark}}><Icon name="inbox" size={17} strokeWidth={1.75}/>Import Recipe</div>
          <button onClick={function(){if(!importLoading){setShowImport(false);setImportUrl("");setImportCode("");setImportStatus("");setImportPasteName("");setImportPasteIngredients("");setImportPasteDirections("")}}} style={{background:"none",border:"none",cursor:"pointer",opacity:.4,display:"flex"}}><Icon name="x" size={18} strokeWidth={2}/></button>
        </div>
        
        {/* Tabs */}
        <div style={{display:"flex",borderBottom:"1px solid "+C.bdr,flexShrink:0}}>
          {[["text","filetext","Text"],["url","globe","URL"],["pdf","filetext","PDF"]].map(function(t){
            var active=importTab===t[0];
            return <button key={t[0]} onClick={function(){setImportTab(t[0])}} style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6,flex:1,padding:"12px",border:"none",borderBottom:active?"2px solid "+C.dark:"2px solid transparent",background:active?C.blush:"var(--surface)",cursor:"pointer",fontSize:13,fontWeight:active?700:500,color:active?C.dark:C.light}}><Icon name={t[1]} size={13} strokeWidth={1.75}/>{t[2]}</button>
          })}
        </div>
        
        <div style={{padding:20,overflowY:"auto",flex:1}}>
          {/* Loading state */}
          {importLoading?<div style={{textAlign:"center",padding:30}}>
            <div style={{marginBottom:12}}><Icon name="hourglass" size={28} color="var(--dark)" strokeWidth={1.75}/></div>
            <div style={{fontSize:14,fontWeight:600,color:C.dark,marginBottom:4}}>Importing Recipe...</div>
            <div style={{fontSize:12,color:C.light}}>{importStatus}</div>
          </div>:null}
          
          {/* Text/Paste Tab */}
          {!importLoading&&importTab==="text"?<div>
            <div style={{fontSize:14,color:C.light,marginBottom:16,lineHeight:1.5}}>
              Paste the entire recipe - name, ingredients, instructions - all in one box. AI will organize it for you.
            </div>
            <div style={{marginBottom:16}}>
              <textarea 
                value={importPasteAll} 
                onChange={function(e){setImportPasteAll(e.target.value)}} 
                placeholder="Paste your recipe here...&#10;&#10;Example:&#10;&#10;Grandma's Chocolate Chip Cookies&#10;&#10;Ingredients:&#10;2 cups flour&#10;1 cup sugar&#10;1/2 cup butter&#10;2 eggs&#10;1 cup chocolate chips&#10;&#10;Instructions:&#10;1. Preheat oven to 350°F&#10;2. Mix dry ingredients&#10;3. Add wet ingredients&#10;4. Fold in chocolate chips&#10;5. Bake for 12 minutes" 
                style={{width:"100%",padding:"14px",borderRadius:10,border:"1px solid "+C.bdr,fontSize:14,boxSizing:"border-box",minHeight:250,resize:"vertical",fontFamily:"inherit",lineHeight:1.6,background:C.card,color:C.ink}}
              />
            </div>
            <button 
              onClick={function(){
                if(!importPasteAll.trim())return;
                if(!isOnline){ alert("Importing a recipe requires an internet connection. Please try again once you're back online."); return; }
                setImportLoading(true);
                setImportStatus("Organizing recipe with AI...");
                
                // Send to Cloudflare worker to parse with AI
                fetch(RECIPE_PROXY_URL, {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({ type: "parse_text", text: importPasteAll })
                })
                .then(function(response) { return response.json(); })
                .then(function(data) {
                  if (data.error) throw new Error(data.error);
                  if (!data.success || !data.recipe) throw new Error("Could not parse recipe");
                  
                  var parsed = data.recipe;
                  setImportStatus("Recipe parsed!");
                  
                  var newRecipe = {
                    id: Date.now(),
                    name: parsed.name || "Imported Recipe",
                    time: parsed.time || "",
                    emoji: "🍽️",
                    ingredients: (parsed.ingredients || []).map(sanitizeIng),
                    notes: parsed.notes || "",
                    recipeType: parsed.recipeType || "other",
                    credit: parsed.credit || "",
                    isPublic: true
                  };
                  
                  svR(recipes.concat([newRecipe]));
                  setShowImport(false);
                  setImportPasteAll("");
                  setImportLoading(false);
                  setImportStatus("");
                  setExpR(newRecipe.id);
                })
                .catch(function(err) {
                  setImportLoading(false);
                  setImportStatus("");
                  alert("Import failed: " + err.message);
                });
              }} 
              disabled={!importPasteAll.trim()}
              className="ft-card-tap"
              style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,width:"100%",padding:"14px",borderRadius:10,border:"none",background:importPasteAll.trim()?C.dark:"var(--disabled)",color:"#fff",fontSize:15,fontWeight:600,cursor:importPasteAll.trim()?"pointer":"not-allowed"}}
            >
              <Icon name="sparkle" size={15} strokeWidth={2}/> Parse & Save Recipe
            </button>
            
            <div style={{marginTop:16,padding:12,background:C.blush,borderRadius:10}}>
              <div style={{fontSize:12,fontWeight:600,color:C.dark,marginBottom:6}}>Or enter manually:</div>
              <button 
                onClick={function(){setImportTab("manual")}}
                style={{fontSize:13,color:C.dark,background:"none",border:"none",textDecoration:"underline",cursor:"pointer",padding:0}}
              >
                Use separate fields for name, ingredients, instructions
              </button>
            </div>
          </div>:null}
          
          {/* Manual Entry Tab (separate fields) */}
          {!importLoading&&importTab==="manual"?<div>
            <div style={{fontSize:13,color:C.light,marginBottom:16,lineHeight:1.5}}>
              Enter recipe details in separate fields.
            </div>
            <div style={{marginBottom:14}}>
              <label style={{fontSize:12,fontWeight:600,color:C.dark,marginBottom:6,display:"block"}}>Recipe Name *</label>
              <input 
                value={importPasteName} 
                onChange={function(e){setImportPasteName(e.target.value)}} 
                placeholder="e.g., Grandma's Chocolate Chip Cookies"
                style={{width:"100%",padding:"12px 14px",borderRadius:10,border:"1px solid "+C.bdr,fontSize:14,boxSizing:"border-box",background:C.card,color:C.ink}}
              />
            </div>
            <div style={{marginBottom:14}}>
              <label style={{fontSize:12,fontWeight:600,color:C.dark,marginBottom:6,display:"block"}}>Ingredients</label>
              <textarea 
                value={importPasteIngredients} 
                onChange={function(e){setImportPasteIngredients(e.target.value)}} 
                placeholder="One per line:&#10;2 cups flour&#10;1 cup sugar&#10;1/2 cup butter"
                style={{width:"100%",padding:"12px 14px",borderRadius:10,border:"1px solid "+C.bdr,fontSize:13,boxSizing:"border-box",minHeight:100,resize:"vertical",fontFamily:"inherit",lineHeight:1.5,background:C.card,color:C.ink}}
              />
            </div>
            <div style={{marginBottom:16}}>
              <label style={{fontSize:12,fontWeight:600,color:C.dark,marginBottom:6,display:"block"}}>Instructions</label>
              <textarea 
                value={importPasteDirections} 
                onChange={function(e){setImportPasteDirections(e.target.value)}} 
                placeholder="Paste directions/instructions here..."
                style={{width:"100%",padding:"12px 14px",borderRadius:10,border:"1px solid "+C.bdr,fontSize:13,boxSizing:"border-box",minHeight:100,resize:"vertical",fontFamily:"inherit",lineHeight:1.5,background:C.card,color:C.ink}}
              />
            </div>
            <div style={{display:"flex",gap:8}}>
              <button 
                onClick={function(){setImportTab("text")}}
                style={{flex:1,padding:"14px",borderRadius:10,border:"1px solid "+C.bdr,background:"var(--surface)",color:C.dark,fontSize:14,fontWeight:600,cursor:"pointer"}}
              >
                ← Back
              </button>
              <button 
                onClick={function(){
                  if(!importPasteName.trim())return;
                  var ingList=importPasteIngredients.split("\n").filter(function(line){return line.trim()}).map(function(line){
                    return parseIng(line.trim());
                  });
                  var newRecipe={
                    id:Date.now(),
                    name:importPasteName.trim(),
                    emoji:"🍽️",
                    ingredients:ingList,
                    notes:importPasteDirections.trim(),
                    recipeType:"other",
                    isPublic:true
                  };
                  svR(recipes.concat([newRecipe]));
                  setShowImport(false);
                  setImportPasteName("");
                  setImportPasteIngredients("");
                  setImportPasteDirections("");
                  setExpR(newRecipe.id);
                }} 
                disabled={!importPasteName.trim()} 
                style={{flex:2,padding:"14px",borderRadius:10,border:"none",background:importPasteName.trim()?C.dark:"var(--disabled)",color:"#fff",fontSize:14,fontWeight:600,cursor:importPasteName.trim()?"pointer":"not-allowed"}}
              >
                Save Recipe
              </button>
            </div>
          </div>:null}
          
          {/* URL Tab */}
          {!importLoading&&importTab==="url"?<div>
            <div style={{fontSize:14,color:C.light,marginBottom:16,lineHeight:1.5}}>
              Import a recipe from any cooking website or recipe blog.
            </div>
            <div style={{marginBottom:12}}>
              <div style={{display:"flex",gap:8}}>
                <input 
                  type="url" 
                  value={importUrl} 
                  onChange={function(e){setImportUrl(e.target.value)}} 
                  placeholder="https://..."
                  style={{flex:1,padding:"14px 16px",borderRadius:10,border:"1px solid "+C.bdr,fontSize:15,boxSizing:"border-box",background:C.card,color:C.ink}}
                />
                <button 
                  onClick={function(){
                    navigator.clipboard.readText().then(function(text){
                      if(text&&text.trim()){
                        setImportUrl(text.trim());
                        // Auto-import if it looks like a URL
                        if(text.trim().startsWith("http")){
                          importFromUrl(text.trim());
                        }
                      }
                    }).catch(function(){
                      alert("Could not access clipboard. Please paste manually.");
                    });
                  }}
                  style={{display:"flex",alignItems:"center",gap:6,padding:"14px 16px",borderRadius:10,border:"1px solid "+C.bdr,background:C.blush,cursor:"pointer",fontSize:14,fontWeight:600,color:C.dark,whiteSpace:"nowrap"}}
                >
                  <Icon name="clipboard" size={14} strokeWidth={1.75}/> Paste
                </button>
              </div>
              <div style={{fontSize:13,color:C.light,marginTop:10,lineHeight:1.5}}>
                <strong>Works with:</strong> AllRecipes, Food Network, Bon Appétit, recipe blogs, etc.
              </div>
              <div style={{fontSize:13,color:C.light,marginTop:6,lineHeight:1.5,background:C.blush,padding:"10px 12px",borderRadius:8}}>
                <strong>Instagram/TikTok?</strong> Screenshot the recipe and use <strong>Scan</strong> instead!
              </div>
            </div>
            <button 
              onClick={function(){importFromUrl(importUrl)}} 
              disabled={!importUrl.trim()} 
              style={{width:"100%",padding:"14px",borderRadius:10,border:"none",background:importUrl.trim()?C.dark:"var(--disabled)",color:"#fff",fontSize:15,fontWeight:600,cursor:importUrl.trim()?"pointer":"not-allowed"}}
            >
              Import
            </button>
          </div>:null}
          
          {/* PDF Tab */}
          {!importLoading&&importTab==="pdf"?<div>
            <div style={{fontSize:13,color:C.light,marginBottom:16,lineHeight:1.5}}>
              Upload a PDF containing a recipe. Works great with recipe cards, cookbook pages, or printed recipes.
            </div>
            <input 
              ref={pdfImportRef}
              type="file" 
              accept=".pdf,application/pdf" 
              style={{display:"none"}} 
              onChange={function(e){var f=e.target.files&&e.target.files[0];if(f)importFromPdf(f);e.target.value=""}}
            />
            <div 
              onClick={function(){pdfImportRef.current&&pdfImportRef.current.click()}}
              style={{width:"100%",padding:"40px 20px",borderRadius:12,border:"2px dashed "+C.bdr,background:C.blush,textAlign:"center",cursor:"pointer"}}
            >
              <div style={{marginBottom:8,display:"flex",justifyContent:"center",opacity:.5}}><Icon name="filetext" size={34} strokeWidth={1.5}/></div>
              <div style={{fontSize:14,fontWeight:600,color:C.dark,marginBottom:4}}>Click to upload PDF</div>
              <div style={{fontSize:12,color:C.light}}>or drag and drop</div>
            </div>
          </div>:null}
        </div>
      </div></div>}
    </div>
  );
}


function ConfigScreen(props) {
  var onDone = props.onDone;
  var _txt = useState("");
  var txt = _txt[0];
  var setTxt = _txt[1];
  var _err = useState("");
  var err = _err[0];
  var setErr = _err[1];
  var _busy = useState(false);
  var busy = _busy[0];
  var setBusy = _busy[1];
  
  function submit() {
    setErr(""); setBusy(true);
    try {
      var t = txt.trim();
      var match = t.match(/\{[\s\S]*\}/);
      if (match) t = match[0];
      var cfg;
      try { cfg = JSON.parse(t); } catch(e) { cfg = JSON.parse(t.replace(/([{,]\s*)(\w+)\s*:/g,'$1"$2":').replace(/'/g,'"').replace(/,(\s*[}\]])/g,'$1')); }
      if (!cfg.apiKey) throw new Error("Missing apiKey");
      if (initFirebase(cfg)) {
        db.collection("data").doc("_test").set({t:Date.now()}).then(function() {
          localStorage.setItem("firebase_config", JSON.stringify(cfg));
          setBusy(false); onDone();
        }).catch(function(e) { setErr("Write failed: "+e.message); setBusy(false); });
      } else throw new Error("Init failed");
    } catch(e) { setErr(e.message); setBusy(false); }
  }
  
  function reset() {
    localStorage.removeItem("firebase_config");
    location.reload();
  }
  
  return React.createElement("div",{style:{maxWidth:500,margin:"0 auto",padding:"40px 20px",textAlign:"center"}},
    React.createElement(BeeLogo,{size:80,style:{marginBottom:20}}),
    React.createElement("h1",{style:{fontSize:28,color:"var(--dark)",marginBottom:10}},"The Family Table"),
    React.createElement("p",{style:{color:"var(--light)",marginBottom:30}},"One-time Firebase setup"),
    React.createElement("div",{style:{background:"var(--surface)",borderRadius:12,padding:20,textAlign:"left",border:"1px solid rgba(139,115,85,0.2)"}},
      err?React.createElement("div",{style:{background:"#FEE",color:"#C00",padding:12,borderRadius:8,marginBottom:16}},err):null,
      React.createElement("textarea",{value:txt,onChange:function(e){setTxt(e.target.value)},placeholder:"Paste Firebase config...",style:{width:"100%",height:180,padding:12,border:"1px solid var(--border-strong)",borderRadius:8,fontFamily:"monospace",fontSize:12,marginBottom:16,background:"var(--surface)",color:"var(--ink)"}}),
      React.createElement("button",{onClick:submit,disabled:!txt.trim()||busy,style:{width:"100%",padding:16,background:txt.trim()&&!busy?"var(--dark)":"var(--disabled)",color:"#fff",border:"none",borderRadius:10,fontSize:16,fontWeight:600,cursor:txt.trim()&&!busy?"pointer":"not-allowed"}},busy?"Connecting...":"Connect"),
      React.createElement("button",{onClick:reset,style:{width:"100%",padding:12,background:"transparent",color:"var(--light)",border:"1px solid var(--border-strong)",borderRadius:10,fontSize:14,marginTop:10,cursor:"pointer"}},"Reset")
    )
  );
}

function AppWrapper() {
  var _ready = useState(false);
  var ready = _ready[0];
  var setReady = _ready[1];
  
  useEffect(function(){
    // Check if db is ready after a short delay
    var checkDb = function(){
      if(db){
        setReady(true);
      } else if(localStorage.getItem("firebase_config")){
        // Config exists but db not ready yet, wait a bit
        setTimeout(checkDb, 100);
      }
    };
    checkDb();
  },[]);
  
  if (!ready) return React.createElement(ConfigScreen,{onDone:function(){setReady(true)}});
  return React.createElement(App);
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(AppWrapper));
  </script>
</body>
